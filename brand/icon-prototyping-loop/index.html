<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="4">
  <title>Precept Overnight Icon Review</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121417;
      --panel: #1b1f25;
      --panel-2: #232934;
      --line: #3f4859;
      --text: #e5ecf5;
      --muted: #9ba8bc;
      --accent: #1fff7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Consolas, 'Courier New', monospace;
      background: radial-gradient(circle at top, #1c212b 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
    }

    main {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 20px 12px 32px;
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 78ch;
      line-height: 1.4;
      font-size: 13px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(35, 41, 52, 0.75);
    }

    .meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
    }

    .card a {
      display: block;
      background: #1f1f1f;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a303c;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #1f1f1f;
    }

    .rank {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      font-size: 11px;
      line-height: 1;
      color: var(--text);
      background: rgba(16, 19, 24, 0.88);
      border: 1px solid #445069;
      border-radius: 999px;
      padding: 5px 7px;
      backdrop-filter: blur(4px);
    }

    .label {
      margin-top: 8px;
      color: var(--text);
      font-size: 12px;
      word-break: break-word;
      line-height: 1.3;
    }

    .score {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .score .avg {
      color: var(--accent);
      font-weight: 600;
    }

    .card[title] {
      cursor: help;
    }
  </style>
</head>
<body>
  <main>
    <section class="header">
      <div>
        <h1>Precept Overnight Icon Review</h1>
        <p>Condensed ranked gallery of SVG candidates. Cards are sorted by score, highest first.</p>
      </div>
      <div class="meta"><strong>Auto refresh:</strong> 4s | <strong>Updated:</strong> 2026-03-28 12:28 | <strong>Sort:</strong> score desc</div>
    </section>
    <section class="grid">
      <article class="card">
        <div class="rank">#01</div>
        <a href="01-gated-decision.svg" target="_blank" rel="noreferrer">
          <img src="01-gated-decision.svg" alt="01-gated-decision.svg">
        </a>
        <div class="label">01-gated-decision.svg</div>
        <div class="score">Avg: <span class="avg">3.5</span></div>
      </article>
      <article class="card">
        <div class="rank">#02</div>
        <a href="02-arc-fork.svg" target="_blank" rel="noreferrer">
          <img src="02-arc-fork.svg" alt="02-arc-fork.svg">
        </a>
        <div class="label">02-arc-fork.svg</div>
        <div class="score">Avg: <span class="avg">3.0</span></div>
      </article>
      <article class="card">
        <div class="rank">#00</div>
        <a href="00-base.svg" target="_blank" rel="noreferrer">
          <img src="00-base.svg" alt="00-base.svg">
        </a>
        <div class="label">00-base.svg</div>
        <div class="score">Avg: <span class="avg">&mdash;</span></div>
      </article>
    </section>
  </main>
</body>
</html>
