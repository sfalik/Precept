<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Precept Icon Review</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121417;
      --panel: #1b1f25;
      --panel-2: #232934;
      --line: #3f4859;
      --text: #e5ecf5;
      --muted: #9ba8bc;
      --accent: #1fff7a;
      --accent-2: #6fa8ff;
      --error: #ff7a7a;
      --warn: #ffcc66;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Consolas, 'Courier New', monospace;
      background: radial-gradient(circle at top, #1c212b 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
    }

    main {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 20px 12px 32px;
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      max-width: 78ch;
      line-height: 1.4;
      font-size: 13px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(35, 41, 52, 0.75);
    }

    .meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .status {
      margin: 0 0 14px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--error);
    }

    .layout {
      display: flex;
      gap: 16px;
      align-items: start;
      min-height: 0;
    }

    .kanban-col {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .kanban-col.col-rejected {
      flex: 0 0 180px;
      min-width: 160px;
    }

    .kanban-col.col-rejected.is-collapsed .kanban-body {
      display: none;
    }

    .kanban-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: default;
      user-select: none;
    }

    .kanban-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kanban-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .kanban-count {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      padding: 2px 7px;
    }

    .kanban-toggle {
      font-size: 10px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .kanban-toggle:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .kanban-body {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .col-rejected .kanban-body {
      grid-template-columns: 1fr;
    }

    .col-rejected .card img {
      aspect-ratio: 1;
    }

    .card {
      position: relative;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
      cursor: pointer;
    }

    .thumb-frame {
      position: relative;
      display: block;
      background: #1f1f1f;
      border-radius: 10px;
      overflow: visible;
      border: 1px solid #2a303c;
    }

    .thumb-frame img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #1f1f1f;
      border-radius: 10px;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: #53627c;
    }

    .card.active {
      border-color: var(--accent);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(31, 255, 122, 0.18);
    }

    .rank {
      position: absolute;
      top: -6px;
      left: -4px;
      z-index: 2;
      font-size: 11px;
      line-height: 1;
      color: var(--text);
      background: rgba(16, 19, 24, 0.88);
      border: 1px solid #445069;
      border-radius: 999px;
      padding: 5px 7px;
      backdrop-filter: blur(4px);
    }

    .label {
      margin-top: 8px;
      color: var(--text);
      font-size: 12px;
      word-break: break-word;
      line-height: 1.3;
      font-weight: 600;
    }

    .summary {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .label {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card.is-reviewed {
      border-color: rgba(111, 168, 255, 0.5);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(111, 168, 255, 0.12);
    }

    .card.is-reviewed:hover {
      border-color: rgba(111, 168, 255, 0.65);
    }

    .review-badge {
      position: absolute;
      top: -6px;
      right: -4px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      line-height: 1;
      background: rgba(16, 19, 24, 0.88);
      border: 1px solid rgba(111, 168, 255, 0.35);
      border-radius: 999px;
      padding: 4px 7px;
      backdrop-filter: blur(4px);
      color: #6fa8ff;
    }

    .review-badge.has-boost {
      color: #a8ffd0;
      border-color: rgba(31, 255, 122, 0.3);
    }

    .review-badge.has-reduce {
      color: #ff9faf;
      border-color: rgba(255, 122, 138, 0.3);
    }

    .status-pill.is-override {
      border-style: dashed;
    }

    .score-pill {
      position: absolute;
      bottom: -6px;
      left: -4px;
      z-index: 2;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      border-radius: 999px;
      color: var(--accent);
      background: rgba(16, 19, 24, 0.88);
      border: 1px solid rgba(31, 255, 122, 0.25);
      backdrop-filter: blur(4px);
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .status-pill,
    .tag-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      white-space: nowrap;
    }

    .status-pill {
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status-shortlisted {
      color: #a8ffd0;
      background: rgba(31, 255, 122, 0.14);
      border-color: rgba(31, 255, 122, 0.25);
    }

    .status-exploring {
      color: #d6ddff;
      background: rgba(90, 138, 232, 0.16);
      border-color: rgba(90, 138, 232, 0.28);
    }

    .status-archived,
    .status-rejected {
      color: #c7cedb;
      background: rgba(92, 104, 132, 0.2);
      border-color: rgba(92, 104, 132, 0.34);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-chip {
      padding: 3px 7px;
      font-size: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }



    .details-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      padding: 24px 20px;
      overflow-y: auto;
    }

    .details-panel.is-open {
      display: flex;
    }

    .details-inner {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 0;
      background:
        radial-gradient(circle at top right, rgba(111, 168, 255, 0.12), transparent 36%),
        linear-gradient(180deg, rgba(27, 31, 37, 0.99) 0%, rgba(35, 41, 52, 0.99) 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    /* Header: image + metadata side by side */
    .details-head {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(63, 72, 89, 0.8);
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .details-head-image {
      flex: 0 0 120px;
      display: block;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a303c;
      background: #1f1f1f;
      pointer-events: none;
    }

    .details-head-image img {
      display: block;
      width: 120px;
      height: 120px;
      object-fit: contain;
    }

    .details-head-meta {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .details-head-scores {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .details-head-score-chip {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      font-size: 11px;
      color: var(--muted);
    }

    .details-head-score-chip strong {
      color: var(--accent);
      font-weight: 700;
    }

    /* Body: two equal columns */
    .details-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
      min-height: 0;
    }

    .details-body-left,
    .details-body-right {
      min-height: 0;
      overflow-y: auto;
      max-height: 60vh;
      padding-right: 4px;
    }

    .details-left {
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .details-right {
      min-height: 0;
      overflow-y: auto;
      padding-right: 4px;
    }

    .details-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
    }

    .details-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .details-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .details-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
    }

    .details-score {
      min-width: 72px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    .details-score .avg {
      color: var(--accent);
      font-weight: 700;
    }

    .preview-frame {
      display: block;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a303c;
      background: #1f1f1f;
      margin-bottom: 14px;
      pointer-events: none;
    }

    .preview-frame img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #1f1f1f;
    }

    .details-copy {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
    }

    .details-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .metric-card {
      padding: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .metric-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .metric-value {
      color: var(--text);
      font-size: 14px;
      line-height: 1.2;
      font-weight: 700;
    }

    .bridge-copy,
    .decision-copy {
      margin: 0;
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
    }

    .details-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(63, 72, 89, 0.8);
    }

    .details-kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .field-list {
      display: grid;
      gap: 8px;
    }

    .rubric-list {
      display: grid;
      gap: 8px;
    }

    .rubric-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .rubric-label {
      color: var(--text);
      font-size: 12px;
      line-height: 1.4;
    }

    .rubric-score {
      color: var(--muted);
      font-size: 11px;
    }

    .rubric-bar {
      grid-column: 1 / -1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .rubric-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #3d6fcc 0%, #1fff7a 100%);
    }

    .manual-review-box {
      display: grid;
      gap: 10px;
    }

    .manual-review-form {
      display: grid;
      gap: 10px;
    }

    .manual-note {
      width: 100%;
      min-height: 64px;
      resize: vertical;
    }

    .manual-note {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      font: inherit;
      padding: 8px 10px;
    }

    .manual-controls {
      display: grid;
      gap: 10px;
    }

    .manual-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .manual-weight-pill {
      min-width: 64px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .manual-status-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .manual-status-button {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .manual-status-button.is-active {
      color: var(--text);
      border-color: rgba(111, 168, 255, 0.36);
      background: rgba(111, 168, 255, 0.16);
    }

    .manual-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .manual-action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .manual-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .manual-icon-button {
      min-width: 44px;
      min-height: 44px;
      padding: 8px;
      font-size: 16px;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
    }

    .manual-button.primary {
      border-color: rgba(31, 255, 122, 0.28);
      background: rgba(31, 255, 122, 0.12);
    }

    .manual-button.warn {
      border-color: rgba(255, 122, 138, 0.28);
      background: rgba(255, 122, 138, 0.12);
    }

    .manual-button.danger {
      border-color: rgba(255, 122, 122, 0.28);
      background: rgba(255, 122, 122, 0.12);
    }

    .manual-button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .manual-button.is-active {
      border-color: rgba(111, 168, 255, 0.4);
      background: rgba(111, 168, 255, 0.18);
      box-shadow: inset 0 0 0 1px rgba(111, 168, 255, 0.18);
    }

    .folder-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 10px;
      border: 1px solid;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .folder-status--disconnected {
      border-color: rgba(255, 100, 100, 0.55);
      background: rgba(255, 80, 80, 0.10);
      color: #ff8a8a;
    }

    .folder-status--connected {
      border-color: rgba(31, 255, 122, 0.40);
      background: rgba(31, 255, 122, 0.09);
      color: #1fff7a;
    }

    .folder-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .folder-status--disconnected .folder-status-dot {
      background: #ff6464;
      box-shadow: 0 0 6px #ff6464;
    }

    .folder-status--connected .folder-status-dot {
      background: #1fff7a;
      box-shadow: 0 0 6px #1fff7a;
    }

    .folder-status-name {
      color: var(--text);
      font-weight: 600;
      font-family: monospace;
      font-size: 12px;
    }

    .folder-status-btn {
      margin-left: 4px;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .folder-status-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .card.is-dragging {
      opacity: 0.45;
      cursor: grabbing;
    }

    .kanban-col.is-drag-over > .kanban-body {
      outline: 2px dashed rgba(111, 168, 255, 0.6);
      outline-offset: -2px;
      background: rgba(111, 168, 255, 0.07);
      border-radius: 8px;
    }

    .kanban-col.is-drag-over.col-shortlisted > .kanban-body {
      outline-color: rgba(31, 255, 122, 0.6);
      background: rgba(31, 255, 122, 0.06);
    }

    .kanban-col.is-drag-over.col-rejected > .kanban-body {
      outline-color: rgba(255, 100, 100, 0.5);
      background: rgba(255, 100, 100, 0.05);
    }

    .manual-hint {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .manual-summary {
      color: var(--text);
      font-size: 12px;
      line-height: 1.6;
    }

    .snippet {
      margin: 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      font-size: 11px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .palette-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .swatch {
      display: grid;
      gap: 4px;
      justify-items: center;
    }

    .swatch-chip {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .swatch-label {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field-row {
      display: grid;
      gap: 2px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .field-name {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field-value {
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .placeholder {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      margin: 0;
    }

    @media (max-width: 980px) {
      .layout {
        flex-direction: column;
      }

      .kanban-col.col-rejected {
        flex: none;
        width: 100%;
      }

      .manual-row {
        align-items: stretch;
      }
    }

    @media (max-width: 680px) {
      .details-metrics {
        grid-template-columns: 1fr;
      }

      .details-panel {
        padding: 12px 8px;
        align-items: flex-start;
      }

      .details-body {
        grid-template-columns: 1fr;
      }

      .details-body-left,
      .details-body-right {
        max-height: none;
        overflow-y: visible;
      }
    }
  </style>
</head>
<body data-server-no-reload>
  <main>
    <section class="header">
      <div>
        <h1>Precept Icon Review</h1>
        <p>Kanban board of SVG candidates grouped by status. Click any card to inspect details.</p>
      </div>
      <div class="meta"><strong>Auto refresh:</strong> 4s | <strong>Sort:</strong> score desc per column</div>
      <div id="folder-status-widget" class="folder-status folder-status--disconnected">
        <span class="folder-status-dot"></span>
        <span id="folder-status-label">No folder connected</span>
        <button id="connect-folder-btn" class="folder-status-btn" type="button">Connect icon-prototyping-loop/…</button>
      </div>
    </section>
    <div id="status" class="status" aria-live="polite"></div>
    <section class="layout">
      <div class="kanban-col col-exploring" id="col-exploring" data-drop-status="exploring">
        <div class="kanban-header">
          <div class="kanban-header-left">
            <span class="kanban-title">Exploring</span>
            <span class="kanban-count" id="count-exploring">0</span>
          </div>
        </div>
        <div class="kanban-body" id="grid-exploring"></div>
      </div>
      <div class="kanban-col col-shortlisted" id="col-shortlisted" data-drop-status="shortlisted">
        <div class="kanban-header">
          <div class="kanban-header-left">
            <span class="kanban-title">Shortlisted</span>
            <span class="kanban-count" id="count-shortlisted">0</span>
          </div>
        </div>
        <div class="kanban-body" id="grid-shortlisted"></div>
      </div>
      <div class="kanban-col col-rejected is-collapsed" id="col-rejected" data-drop-status="rejected">
        <div class="kanban-header" id="toggle-rejected" style="cursor:pointer">
          <div class="kanban-header-left">
            <span class="kanban-title">Rejected</span>
            <span class="kanban-count" id="count-rejected">0</span>
          </div>
          <button class="kanban-toggle" id="toggle-rejected-btn" type="button" aria-label="Toggle rejected column">▸</button>
        </div>
        <div class="kanban-body" id="grid-rejected"></div>
      </div>
    </section>
    <div id="details" class="details-panel" aria-live="polite"></div>
  </main>
  <script>
    const gridExploring = document.getElementById('grid-exploring');
    const gridShortlisted = document.getElementById('grid-shortlisted');
    const gridRejected = document.getElementById('grid-rejected');
    const countExploring = document.getElementById('count-exploring');
    const countShortlisted = document.getElementById('count-shortlisted');
    const countRejected = document.getElementById('count-rejected');
    const colRejected = document.getElementById('col-rejected');
    const toggleRejectedHeader = document.getElementById('toggle-rejected');
    const toggleRejectedBtn = document.getElementById('toggle-rejected-btn');
    const status = document.getElementById('status');
    const details = document.getElementById('details');
    const defaultRefreshSeconds = 4;
    let selectedFilename = null;
    let lastSortedCandidates = [];
    let lastManifestCandidates = [];
    let refreshTimer = null;
    let currentRefreshMs = defaultRefreshSeconds * 1000;
    let manualReviewState = { step: 0.1, reviews: {} };
    let reviewFolderHandle = null;
    let manualReviewDrafts = {};
    const supportsFileSystemAccess = typeof window.showDirectoryPicker === 'function';

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatScore(value) {
      return typeof value === 'number' ? value.toFixed(1) : '—';
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function parseManualWeight(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? clamp(parsed, -5, 5) : 0;
    }

    function getManualStep() {
      const configured = Number(manualReviewState.step);
      return Number.isFinite(configured) && configured > 0 ? configured : 0.1;
    }

    function hasActiveDraftEditor() {
      const active = document.activeElement;
      return Boolean(
        active
        && details.contains(active)
        && active.id === 'manual-note'
      );
    }

    function scoreRankValue(value) {
      return typeof value === 'number' ? value : Number.NEGATIVE_INFINITY;
    }

    function summarize(text) {
      if (!text) {
        return '';
      }

      const collapsed = String(text).replace(/\s+/g, ' ').trim();
      if (collapsed.length <= 120) {
        return collapsed;
      }

      return `${collapsed.slice(0, 117)}...`;
    }

    function statusLabel(status) {
      return status ? String(status) : 'unknown';
    }

    function statusClass(status) {
      return `status-${statusLabel(status).toLowerCase()}`;
    }

    function normalizeReviewStatus(value) {
      const allowed = new Set(['exploring', 'shortlisted', 'rejected']);
      const normalized = typeof value === 'string' ? value.toLowerCase() : '';
      return allowed.has(normalized) ? normalized : null;
    }

    function normalizeManualReview(filename) {
      const reviews = manualReviewState && manualReviewState.reviews ? manualReviewState.reviews : {};
      const entry = reviews[filename] || {};
      const weight = parseManualWeight(entry.weight);
      return {
        status: normalizeReviewStatus(entry.status),
        weight,
        note: typeof entry.note === 'string' ? entry.note : ''
      };
    }

    function deriveCandidate(candidate) {
      const reviews = manualReviewState && manualReviewState.reviews ? manualReviewState.reviews : {};
      const manualReviewApplied = Object.prototype.hasOwnProperty.call(reviews, candidate.filename);
      const manualReview = normalizeManualReview(candidate.filename);
      const baseScore = typeof candidate.averageScore === 'number' ? candidate.averageScore : null;
      let effectiveScore = baseScore;
      let effectiveStatus = manualReview.status || candidate.status;
      let manualBadge = null;

      if (manualReview.weight > 0) {
        if (baseScore != null) {
          effectiveScore = clamp(baseScore + manualReview.weight, 0, 5);
        }
        manualBadge = `👍 +${manualReview.weight.toFixed(1)}`;
      } else if (manualReview.weight < 0) {
        if (baseScore != null) {
          effectiveScore = clamp(baseScore + manualReview.weight, 0, 5);
        }
        manualBadge = `👎 ${manualReview.weight.toFixed(1)}`;
      }

      return {
        ...candidate,
        manualReviewApplied,
        manualReview,
        effectiveScore,
        effectiveStatus,
        manualBadge
      };
    }

    function getReviewDraft(candidate) {
      const storedDraft = manualReviewDrafts[candidate.filename];
      if (storedDraft) {
        return {
          status: normalizeReviewStatus(storedDraft.status),
          weight: parseManualWeight(storedDraft.weight),
          note: storedDraft.note || ''
        };
      }

      const review = candidate.manualReview || normalizeManualReview(candidate.filename);
      return {
        status: review.status,
        weight: review.weight,
        note: review.note || ''
      };
    }

    function normalizeDraftReview(candidate, draft) {
      return {
        status: normalizeReviewStatus(draft.status) || normalizeReviewStatus(candidate.status) || 'exploring',
        weight: parseManualWeight(draft.weight),
        note: typeof draft.note === 'string' ? draft.note.trim() : ''
      };
    }

    function reviewsEqual(left, right) {
      return left.status === right.status
        && left.weight === right.weight
        && left.note === right.note;
    }

    function humanizeKey(key) {
      return String(key)
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .replace(/[_-]/g, ' ')
        .replace(/^./, (match) => match.toUpperCase());
    }

    function renderTagChips(tags, limit = tags.length) {
      const safeTags = Array.isArray(tags) ? tags.slice(0, limit) : [];
      if (!safeTags.length) {
        return '';
      }

      return `<div class="tag-list">${safeTags.map((tag) => `<span class="tag-chip">${escapeHtml(tag)}</span>`).join('')}</div>`;
    }

    function renderOverlayBadge(candidate) {
      if (!candidate.manualReviewApplied) return '';
      const w = candidate.manualReview ? candidate.manualReview.weight : 0;
      let arrow = '';
      let cls = '';
      let title = 'Reviewed';
      if (w > 0) {
        arrow = ' 👍';
        cls = ' has-boost';
        title = `Reviewed · weight +${w.toFixed(1)}`;
      } else if (w < 0) {
        arrow = ' 👎';
        cls = ' has-reduce';
        title = `Reviewed · weight ${w.toFixed(1)}`;
      }
      return `<div class="review-badge${cls}" title="${escapeHtml(title)}">◉${arrow}</div>`;
    }

    function hasManualStatusOverride(candidate) {
      return Boolean(candidate.manualReview && candidate.manualReview.status && candidate.manualReview.status !== candidate.status);
    }

    function renderPalette(palette) {
      if (!Array.isArray(palette) || !palette.length) {
        return '<p class="placeholder">No palette recorded.</p>';
      }

      return `<div class="palette-row">${palette.map((color) => `
        <div class="swatch">
          <div class="swatch-chip" style="background:${escapeHtml(color)}"></div>
          <div class="swatch-label">${escapeHtml(color)}</div>
        </div>
      `).join('')}</div>`;
    }

    function renderRubricScores(rubricScores, needsRescore, scoreDetailStatus) {
      if (!rubricScores || typeof rubricScores !== 'object' || !Object.keys(rubricScores).length) {
        const suffix = needsRescore ? ' Existing prototypes only have average scores and still need detailed rubric backfill.' : '';
        return `<p class="placeholder">No rubric breakdown recorded.${suffix}</p>`;
      }

      return `
        <div class="rubric-list">
          ${Object.entries(rubricScores).map(([key, value]) => {
            const numericValue = typeof value === 'number' ? value : 0;
            const width = Math.max(0, Math.min(100, (numericValue / 5) * 100));
            return `
              <div class="rubric-row">
                <div class="rubric-label">${escapeHtml(humanizeKey(key))}</div>
                <div class="rubric-score">${escapeHtml(String(numericValue))}/5</div>
                <div class="rubric-bar"><div class="rubric-bar-fill" style="width:${width}%"></div></div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function buildManualSnippet(candidate) {
      const step = getManualStep();
      return `"${candidate.filename}": {
  "status": "shortlisted",
  "weight": ${step.toFixed(1)},
  "note": "Stronger contender on review"
}`;
    }

    async function writeReviewFile(stem) {
      if (!reviewFolderHandle) {
        throw new Error('Folder access has not been granted yet');
      }

      const filename = `${stem}.svg`;
      const entry = manualReviewState.reviews[filename] || {};
      const fileHandle = await reviewFolderHandle.getFileHandle(`${stem}.review.json`, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(`${JSON.stringify(entry, null, 2)}\n`);
      await writable.close();
    }

    async function connectReviewFolder() {
      if (!supportsFileSystemAccess) {
        throw new Error('This browser does not support the Directory Picker API');
      }

      const handle = await window.showDirectoryPicker({ id: 'precept-review-folder', mode: 'readwrite' });
      if (!handle) {
        return false;
      }

      reviewFolderHandle = handle;
      updateFolderStatusUI();
      return true;
    }

    function updateFolderStatusUI() {
      const widget = document.getElementById('folder-status-widget');
      const label = document.getElementById('folder-status-label');
      const btn = document.getElementById('connect-folder-btn');
      if (reviewFolderHandle) {
        widget.className = 'folder-status folder-status--connected';
        label.innerHTML = 'Connected: <span class="folder-status-name">' + escapeHtml(reviewFolderHandle.name) + '</span>';
        btn.textContent = 'Change…';
      } else {
        widget.className = 'folder-status folder-status--disconnected';
        label.textContent = 'No folder connected';
        btn.textContent = 'Connect…';
      }
    }

    async function ensureManualReviewFileAccess() {
      if (reviewFolderHandle) {
        return true;
      }

      const connected = await connectReviewFolder();
      if (!connected) {
        throw new Error('candidates/ folder was not selected');
      }

      return true;
    }

    function rerenderFromCurrentState() {
      const candidates = lastManifestCandidates.map((candidate) => deriveCandidate(candidate));
      renderCandidates(candidates);
    }

    function renderManualReview(candidate) {
      const review = candidate.manualReview;
      const draft = getReviewDraft(candidate);
      const summary = review.weight > 0
        ? `Positive review adds +${review.weight.toFixed(1)} to the base score.`
        : review.weight < 0
          ? `Negative review subtracts ${review.weight.toFixed(1)} from the base score.`
          : 'No manual weight is currently applied.';
      const currentStatus = draft.status || candidate.status || 'exploring';

      return `
        <div class="manual-review-box">
          <div class="manual-summary">${escapeHtml(summary)}</div>
          <div class="manual-review-form">
            <div class="manual-controls">
              <div class="manual-row">
                <div class="manual-action-buttons">
                  <button id="manual-boost" class="manual-button manual-icon-button ${draft.weight > 0 ? 'is-active' : ''}" data-direction="positive" type="button" title="Increase manual weight" aria-label="Increase manual weight">👍</button>
                  <button id="manual-reduce" class="manual-button manual-icon-button ${draft.weight < 0 ? 'is-active' : ''}" data-direction="negative" type="button" title="Decrease manual weight" aria-label="Decrease manual weight">👎</button>
                </div>
                <div id="manual-weight-pill" class="manual-weight-pill">${escapeHtml(draft.weight.toFixed(1))}</div>
              </div>
              <div class="manual-status-buttons" role="group" aria-label="Manual status override">
                <button class="manual-status-button ${currentStatus === 'exploring' ? 'is-active' : ''}" data-status="exploring" type="button">Exploring</button>
                <button class="manual-status-button ${currentStatus === 'shortlisted' ? 'is-active' : ''}" data-status="shortlisted" type="button">Shortlisted</button>
                <button class="manual-status-button ${currentStatus === 'rejected' ? 'is-active' : ''}" data-status="rejected" type="button">Rejected</button>
              </div>
              <textarea id="manual-note" class="manual-note" placeholder="Optional review note">${escapeHtml(draft.note)}</textarea>
              <div class="manual-buttons">
                <button id="save-review" class="manual-button primary" type="button">Save Review</button>
                <button id="clear-review" class="manual-button warn" type="button">Clear Review</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function attachManualReviewHandlers(candidate) {
      const saveButton = document.getElementById('save-review');
      const clearButton = document.getElementById('clear-review');
      const actionButtons = Array.from(details.querySelectorAll('[data-direction]'));
      const statusButtons = Array.from(details.querySelectorAll('[data-status]'));
      const weightPill = document.getElementById('manual-weight-pill');
      const noteInput = document.getElementById('manual-note');
      if (!saveButton || !clearButton || !actionButtons.length || !statusButtons.length || !weightPill || !noteInput) {
        return;
      }

      const initialDraft = getReviewDraft(candidate);
      let currentWeight = parseManualWeight(initialDraft.weight);
      let currentStatus = normalizeReviewStatus(initialDraft.status) || normalizeReviewStatus(candidate.status) || 'exploring';

      const getPersistedReview = () => normalizeDraftReview(candidate, candidate.manualReview || normalizeManualReview(candidate.filename));

      const getCurrentDraft = () => normalizeDraftReview(candidate, {
        status: currentStatus,
        weight: currentWeight,
        note: noteInput.value
      });

      const syncStoredDraft = () => {
        manualReviewDrafts[candidate.filename] = {
          status: currentStatus,
          weight: currentWeight,
          note: noteInput.value
        };
      };

      const syncActionButtons = () => {
        for (const button of actionButtons) {
          button.classList.toggle(
            'is-active',
            (button.dataset.direction === 'positive' && currentWeight > 0)
              || (button.dataset.direction === 'negative' && currentWeight < 0)
          );
        }
      };

      const syncStatusButtons = () => {
        for (const button of statusButtons) {
          button.classList.toggle('is-active', button.dataset.status === currentStatus);
        }
      };

      const syncWeightPill = () => {
        weightPill.textContent = currentWeight.toFixed(1);
      };

      const syncSaveButtonState = () => {
        saveButton.disabled = reviewsEqual(getCurrentDraft(), getPersistedReview());
      };

      const persistCurrentReview = async (weightOverride = currentWeight, statusOverride = currentStatus) => {
        await ensureManualReviewFileAccess();
        const nextNote = noteInput.value.trim();
        const nextWeight = parseManualWeight(weightOverride);
        const nextStatus = normalizeReviewStatus(statusOverride) || normalizeReviewStatus(candidate.status);
        if (nextWeight === 0 && !nextNote && nextStatus === normalizeReviewStatus(candidate.status)) {
          delete manualReviewState.reviews[candidate.filename];
        } else {
          manualReviewState.reviews[candidate.filename] = {
            status: nextStatus,
            weight: nextWeight,
            note: nextNote
          };
        }
        manualReviewDrafts[candidate.filename] = {
          status: nextStatus,
          weight: nextWeight,
          note: nextNote
        };
        const stem = candidate.filename.replace(/\.svg$/i, '');
        await writeReviewFile(stem);
      };

      const markDraftDirty = (message) => {
        status.textContent = message;
        status.className = 'status';
        syncSaveButtonState();
      };

      const incrementWeight = (direction) => {
        const delta = direction === 'positive' ? getManualStep() : -getManualStep();
        currentWeight = parseManualWeight(currentWeight + delta);
        syncWeightPill();
        syncStoredDraft();
        syncActionButtons();
        markDraftDirty(`Manual review updated locally for ${candidate.filename}. Click Save to write it to disk.`);
      };

      for (const button of actionButtons) {
        button.addEventListener('click', () => {
          incrementWeight(button.dataset.direction);
        });
      }

      for (const button of statusButtons) {
        button.addEventListener('click', () => {
          currentStatus = button.dataset.status;
          syncStoredDraft();
          syncStatusButtons();
          markDraftDirty(`Manual review updated locally for ${candidate.filename}. Click Save to write it to disk.`);
        });
      }

      noteInput.addEventListener('input', () => {
        syncStoredDraft();
        markDraftDirty(`Manual review updated locally for ${candidate.filename}. Click Save to write it to disk.`);
      });

      syncWeightPill();
      syncActionButtons();
      syncStatusButtons();
      syncSaveButtonState();

      if (!supportsFileSystemAccess) {
        saveButton.disabled = true;
        clearButton.disabled = true;
        for (const button of actionButtons) {
          button.disabled = true;
        }
        for (const button of statusButtons) {
          button.disabled = true;
        }
        status.textContent = 'This browser cannot write local files from the page. Use a Chromium-based browser with File System Access support to review directly in the UI.';
        status.className = 'status error';
        return;
      }

      const setBusy = (busy) => {
        saveButton.disabled = busy || reviewsEqual(getCurrentDraft(), getPersistedReview());
        clearButton.disabled = busy;
        for (const button of actionButtons) {
          button.disabled = busy;
        }
        for (const button of statusButtons) {
          button.disabled = busy;
        }
      };

      saveButton.addEventListener('click', async () => {
        try {
          setBusy(true);
          await persistCurrentReview(currentWeight, currentStatus);
          rerenderFromCurrentState();
          closeDetails();
        } catch (error) {
          status.textContent = `Unable to save manual review: ${error.message}`;
          status.className = 'status error';
        } finally {
          setBusy(false);
        }
      });

      clearButton.addEventListener('click', async () => {
        try {
          setBusy(true);
          await ensureManualReviewFileAccess();
          delete manualReviewState.reviews[candidate.filename];
          delete manualReviewDrafts[candidate.filename];
          await writeManualReviewFile();
          rerenderFromCurrentState();
          status.textContent = `Cleared manual review for ${candidate.filename}.`;
          status.className = 'status';
        } catch (error) {
          status.textContent = `Unable to clear manual review: ${error.message}`;
          status.className = 'status error';
        } finally {
          setBusy(false);
        }
      });
    }

    function renderValue(value) {
      if (value == null) {
        return '—';
      }

      if (Array.isArray(value)) {
        return value.length ? value.join(', ') : '—';
      }

      if (typeof value === 'object') {
        return escapeHtml(JSON.stringify(value, null, 2));
      }

      if (typeof value === 'number') {
        return Number.isFinite(value) ? String(value) : '—';
      }

      return escapeHtml(String(value));
    }

    function buildAdditionalFieldRows(candidate) {
      const hiddenKeys = new Set([
        'filename',
        'title',
        'conceptualBridge',
        'status',
        'decision',
        'tags',
        'palette',
        'averageScore',
        'rubricScores',
        'effectiveScore',
        'effectiveStatus',
        'manualReview',
        'manualBadge'
      ]);
      const entries = Object.entries(candidate).filter(([key]) => !hiddenKeys.has(key));
      if (!entries.length) {
        return '<p class="placeholder">Additional manifest fields will appear here as the loop starts recording more context.</p>';
      }

      return `
        <div class="field-list">
          ${entries.map(([key, value]) => `
            <div class="field-row">
              <div class="field-name">${escapeHtml(humanizeKey(key))}</div>
              <div class="field-value">${renderValue(value)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderDetails(candidate) {
      if (!candidate) {
        details.classList.remove('is-open');
        details.innerHTML = '';
        return;
      }

      details.innerHTML = `
        <div class="details-inner">
          <button class="details-close" id="details-close-btn" type="button" aria-label="Close">&times;</button>
          <div class="details-head">
            <a class="details-head-image" href="${encodeURI(candidate.filename)}" target="_blank" rel="noreferrer" style="pointer-events:auto">
              <img src="${encodeURI(candidate.filename)}" alt="${escapeHtml(candidate.filename)}">
            </a>
            <div class="details-head-meta">
              <h2 class="details-title">${escapeHtml(candidate.filename)}</h2>
              <div class="card-meta">
                <span class="status-pill ${statusClass(candidate.effectiveStatus)}${hasManualStatusOverride(candidate) ? ' is-override' : ''}">${escapeHtml(statusLabel(candidate.effectiveStatus))}</span>
              </div>
              <div class="details-head-scores">
                <span class="details-head-score-chip">Effective <strong>${formatScore(candidate.effectiveScore)}</strong></span>
                <span class="details-head-score-chip">Base <strong>${formatScore(candidate.averageScore)}</strong></span>
              </div>
              <p class="details-copy" style="margin:6px 0 0">${escapeHtml(candidate.conceptualBridge || 'No bridge recorded yet.')}</p>
            </div>
          </div>
          <div class="details-body">
            <div class="details-body-left">
              <section>
                <p class="details-kicker">Decision</p>
                <p class="decision-copy">${escapeHtml(candidate.decision || 'No decision note recorded yet.')}</p>
              </section>
              <section class="details-section">
                <p class="details-kicker">Rubric Scores</p>
                ${renderRubricScores(candidate.rubricScores, candidate.needsRescore, candidate.scoreDetailStatus)}
              </section>
              <section class="details-section">
                <p class="details-kicker">Tags</p>
                ${renderTagChips(candidate.tags || [], candidate.tags ? candidate.tags.length : 0) || '<p class="placeholder">No tags recorded.</p>'}
              </section>
              <section class="details-section">
                <p class="details-kicker">Palette</p>
                ${renderPalette(candidate.palette)}
              </section>
            </div>
            <div class="details-body-right">
              <section>
                <p class="details-kicker">Manual Review</p>
                ${renderManualReview(candidate)}
              </section>
            </div>
          </div>
        </div>
      `;

      details.classList.add('is-open');
      const closeBtn = document.getElementById('details-close-btn');
      if (closeBtn) {
        closeBtn.addEventListener('click', closeDetails);
      }
      attachManualReviewHandlers(candidate);
    }

    function closeDetails() {
      details.classList.remove('is-open');
      selectedFilename = null;
      syncSelectedCardState();
    }

    details.addEventListener('click', (event) => {
      if (event.target === details) {
        closeDetails();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && details.classList.contains('is-open')) {
        closeDetails();
      }
    });

    function selectCandidate(filename) {
      selectedFilename = filename;
      const selectedCandidate = lastSortedCandidates.find((candidate) => candidate.filename === filename) || null;
      renderDetails(selectedCandidate);
      syncSelectedCardState();
    }

    function syncSelectedCardState() {
      for (const grid of [gridExploring, gridShortlisted, gridRejected]) {
        for (const card of grid.querySelectorAll('.card')) {
          card.classList.toggle('active', card.dataset.filename === selectedFilename);
        }
      }
    }

    function compareByScore(left, right) {
      const scoreDelta = scoreRankValue(right.effectiveScore) - scoreRankValue(left.effectiveScore);
      if (scoreDelta !== 0) return scoreDelta;
      const leftUnscored = typeof left.effectiveScore !== 'number';
      const rightUnscored = typeof right.effectiveScore !== 'number';
      if (leftUnscored !== rightUnscored) return leftUnscored ? 1 : -1;
      return left.filename.localeCompare(right.filename);
    }

    function renderCardHtml(candidate, rank) {
      const reviewedClass = candidate.manualReviewApplied ? ' is-reviewed' : '';
      return `
        <article class="card${reviewedClass}" data-filename="${escapeHtml(candidate.filename)}" tabindex="0" aria-label="${escapeHtml(candidate.filename)} ${formatScore(candidate.effectiveScore)}">
          <div class="thumb-frame">
            <img src="${encodeURI(candidate.filename)}" alt="${escapeHtml(candidate.filename)}">
            <div class="rank">#${rank}</div>
            ${renderOverlayBadge(candidate)}
            <span class="score-pill">${formatScore(candidate.effectiveScore)}</span>
          </div>
          <div class="label">${escapeHtml(candidate.filename)}</div>
          ${renderTagChips(candidate.tags || [], 2)}
          <div class="summary">${escapeHtml(summarize(candidate.conceptualBridge || candidate.title || ''))}</div>
        </article>
      `;
    }

    function attachCardListeners(container) {
      for (const card of container.querySelectorAll('.card')) {
        card.setAttribute('draggable', 'true');
        card.addEventListener('click', () => selectCandidate(card.dataset.filename));
        card.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            selectCandidate(card.dataset.filename);
          }
        });
        card.addEventListener('dragstart', (event) => {
          event.dataTransfer.setData('text/plain', card.dataset.filename);
          event.dataTransfer.effectAllowed = 'move';
          card.classList.add('is-dragging');
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('is-dragging');
        });
      }
    }

    function attachDropZone(col) {
      const targetStatus = col.dataset.dropStatus;
      if (!targetStatus) return;
      col.addEventListener('dragover', (event) => {
        event.preventDefault();
        event.dataTransfer.dropEffect = 'move';
        col.classList.add('is-drag-over');
      });
      col.addEventListener('dragleave', (event) => {
        if (!col.contains(event.relatedTarget)) {
          col.classList.remove('is-drag-over');
        }
      });
      col.addEventListener('drop', async (event) => {
        event.preventDefault();
        col.classList.remove('is-drag-over');
        const filename = event.dataTransfer.getData('text/plain');
        if (!filename) return;
        const candidate = lastManifestCandidates.find(c => c.filename === filename);
        if (!candidate) return;
        const stem = filename.replace(/\.svg$/i, '');
        // Update draft and write review file
        manualReviewDrafts[filename] = manualReviewDrafts[filename] || {};
        manualReviewDrafts[filename].status = targetStatus;
        const currentReview = (manualReviewState.reviews[filename] || {});
        manualReviewState.reviews[filename] = { ...currentReview, status: targetStatus };
        if (reviewFolderHandle) {
          try {
            const fileHandle = await reviewFolderHandle.getFileHandle(`${stem}.review.json`, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(`${JSON.stringify(manualReviewState.reviews[filename], null, 2)}\n`);
            await writable.close();
          } catch (e) {
            status.textContent = `Could not save review: ${e.message}`;
            status.className = 'status error';
          }
        }
        rerenderFromCurrentState();
      });
    }

    function renderCandidates(candidates) {
      const buckets = { exploring: [], shortlisted: [], rejected: [] };
      for (const c of candidates) {
        const key = buckets[c.effectiveStatus] ? c.effectiveStatus : 'exploring';
        buckets[key].push(c);
      }

      for (const key of Object.keys(buckets)) {
        buckets[key].sort(compareByScore);
      }

      lastSortedCandidates = [...buckets.shortlisted, ...buckets.exploring, ...buckets.rejected];

      gridExploring.innerHTML = buckets.exploring.map((c, i) => renderCardHtml(c, i + 1)).join('');
      gridShortlisted.innerHTML = buckets.shortlisted.map((c, i) => renderCardHtml(c, i + 1)).join('');
      gridRejected.innerHTML = buckets.rejected.map((c, i) => renderCardHtml(c, i + 1)).join('');

      countExploring.textContent = buckets.exploring.length;
      countShortlisted.textContent = buckets.shortlisted.length;
      countRejected.textContent = buckets.rejected.length;

      attachCardListeners(gridExploring);
      attachCardListeners(gridShortlisted);
      attachCardListeners(gridRejected);

      if (!lastSortedCandidates.length) {
        selectedFilename = null;
      } else if (details.classList.contains('is-open') && selectedFilename) {
        if (hasActiveDraftEditor()) {
          syncSelectedCardState();
        } else {
          selectCandidate(selectedFilename);
        }
      }

      syncSelectedCardState();
      status.textContent = lastSortedCandidates.length ? '' : 'No candidates in manifest yet.';
      status.className = 'status';
    }

    function scheduleRefresh(refreshSeconds) {
      const nextRefreshMs = Math.max(1, Number(refreshSeconds) || defaultRefreshSeconds) * 1000;
      if (refreshTimer && nextRefreshMs === currentRefreshMs) {
        return;
      }

      currentRefreshMs = nextRefreshMs;
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }

      refreshTimer = setInterval(() => {
        loadManifest();
      }, currentRefreshMs);
    }

    async function loadManifest() {
      if (!reviewFolderHandle) {
        status.textContent = 'Click \u201cConnect icon-prototyping-loop/ folder\u201d to load the gallery.';
        status.className = 'status';
        return;
      }

      try {
        const svgHandles = {};
        const jsonHandles = {};
        const reviewHandles = {};

        for await (const [name, handle] of reviewFolderHandle.entries()) {
          if (handle.kind !== 'file' || name.startsWith('_')) continue;
          if (name.endsWith('.review.json')) {
            reviewHandles[name] = handle;
          } else if (name.endsWith('.json')) {
            jsonHandles[name] = handle;
          } else if (name.endsWith('.svg')) {
            svgHandles[name] = handle;
          }
        }

        // Build one candidate per SVG; JSON metadata is optional enrichment
        const rawCandidates = [];
        for (const svgName of Object.keys(svgHandles).sort()) {
          const stem = svgName.replace(/\.svg$/i, '');
          let meta = {};
          const jh = jsonHandles[`${stem}.json`];
          if (jh) {
            try {
              const file = await jh.getFile();
              meta = JSON.parse(await file.text());
            } catch (e) { /* malformed json */ }
          }
          rawCandidates.push({
            filename: svgName,
            title: stem,
            status: 'exploring',
            averageScore: null,
            tags: [],
            palette: [],
            conceptualBridge: '',
            decision: '',
            ...meta,
            filename: svgName,
          });
        }

        const reviews = {};
        for (const candidate of rawCandidates) {
          const stem = candidate.filename.replace(/\.svg$/i, '');
          const rh = reviewHandles[`${stem}.review.json`];
          if (rh) {
            try {
              const file = await rh.getFile();
              reviews[candidate.filename] = JSON.parse(await file.text());
            } catch (e) { /* no review */ }
          }
        }

        manualReviewState = { step: 0.1, reviews };
        lastManifestCandidates = rawCandidates;
        const candidates = rawCandidates.map((candidate) => deriveCandidate(candidate));
        renderCandidates(candidates);
      } catch (error) {
        gridExploring.innerHTML = '';
        gridShortlisted.innerHTML = '';
        gridRejected.innerHTML = '';
        status.textContent = `Unable to load review data: ${error.message}`;
        status.className = 'status error';
      }
    }

    toggleRejectedHeader.addEventListener('click', () => {
      const isCollapsed = colRejected.classList.toggle('is-collapsed');
      toggleRejectedBtn.textContent = isCollapsed ? '\u25b8' : '\u25be';
    });

    for (const col of document.querySelectorAll('.kanban-col[data-drop-status]')) {
      attachDropZone(col);
    }

    document.getElementById('connect-folder-btn').addEventListener('click', async () => {
      try {
        await connectReviewFolder();
        await loadManifest();
      } catch (e) {
        if (e.name !== 'AbortError') {
          status.textContent = `Could not connect folder: ${e.message}`;
          status.className = 'status error';
        }
      }
    });

    scheduleRefresh(defaultRefreshSeconds);
    updateFolderStatusUI();
    loadManifest();
  </script>
</body>
</html>
