<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    A bold solid ring (annulus) with three precisely cut channels at 120° intervals.
    The ring = the complete, self-contained Precept definition.
    The channels = the only structural paths: CreateInstance, Fire, Inspect.
    Invalid states cannot exist because there is no structural opening for them.
    The highlighted channel shows full inspectability — the beam always passes through.
  -->

  <rect width="512" height="512" fill="#0D1018"/>

  <!-- The governed domain: solid ring -->
  <circle cx="256" cy="256" r="196" fill="#192A4A"/>
  <!-- Inner void: nothing leaks out, nothing enters except through the channels -->
  <circle cx="256" cy="256" r="124" fill="#0D1018"/>

  <!-- Channel 1 — top (primary: fire/transition path), highlighted -->
  <rect x="237" y="60" width="38" height="72" fill="#0D1018"/>
  <!-- Bright centerline: the inspection beam — always visible, always available -->
  <line x1="256" y1="62" x2="256" y2="130" stroke="#3D8FFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Channel 2 — 120° clockwise (inspect path) -->
  <rect x="237" y="60" width="38" height="72" fill="#0D1018"
        transform="rotate(120 256 256)"/>

  <!-- Channel 3 — 240° clockwise (update path) -->
  <rect x="237" y="60" width="38" height="72" fill="#0D1018"
        transform="rotate(240 256 256)"/>

  <!-- Outer ring edge: slight precision highlight -->
  <circle cx="256" cy="256" r="196" stroke="#213658" stroke-width="3" fill="none"/>
</svg>
