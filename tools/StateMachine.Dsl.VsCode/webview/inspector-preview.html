<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State Diagram</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1e1e;
      --panel: #252526;
      --state: #6D7F9B;
      --event: #8573A8;
      --border: #59657A;
      --text: #FFFFFF;
      --muted: #59657A;
      --ok: #1FFF7A;
      --err: #FF2A57;
      --node: #24262b;
      --edge: #1FFF7A;
      --edge-error: #FF2A57;
      --edge-muted: #6D7F9B;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      font: 13px/1.4 "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header,
    .layout {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .status {
      color: var(--state);
      font-weight: 600;
    }

    .muted { color: var(--muted); }

    .actions button {
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      padding: 4px 8px;
      cursor: pointer;
    }

    .action-btn {
      border-radius: 999px;
      background: #242730;
      transition: border-color 120ms ease, background 120ms ease, transform 90ms ease, box-shadow 120ms ease;
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      border-color: var(--event);
      box-shadow: 0 0 0 1px rgba(133, 115, 168, 0.26);
      outline: none;
    }

    .action-btn:active,
    .action-btn.is-clicked {
      border-color: var(--event);
      background: rgba(133, 115, 168, 0.22);
      transform: translateY(1px);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
      padding: 12px;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 0;
    }

    .left-stack {
      min-width: 0;
      min-height: 0;
      display: grid;
      gap: 10px;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .diagram-canvas {
      grid-row: 1;
      min-height: 220px;
      overflow: hidden;
      background: transparent;
      border: none;
      border-radius: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(190px, 32%, 280px);
      grid-template-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 0;
      align-items: stretch;
    }

    .diagram-scroll {
      position: relative;
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      border: 1px solid #34363a;
      border-radius: 8px;
      background: #1d1f23;
      display: grid;
      place-items: stretch;
    }

    .events-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .data-overlay {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 0;
      align-self: start;
      max-height: 100%;
      overflow: hidden;
    }

    .meta-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(31, 33, 37, 0.9);
      padding: 7px 8px;
      min-width: 0;
      min-height: 0;
    }

    .event-bar {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
      overflow: auto;
      max-height: clamp(120px, 30vh, 260px);
    }

    .event-btn {
      border: 1px solid var(--border);
      border-radius: 0;
      background: #242730;
      color: var(--text);
      padding: 4px 14px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 120px;
      transform: skewX(-14deg);
      margin-left: 8px;
    }

    .event-btn:hover {
      border-color: var(--event);
    }

    .event-btn.active {
      border-color: var(--event);
      background: rgba(133, 115, 168, 0.22);
    }

    .event-btn.enabled {
      border-color: var(--ok);
      color: var(--ok);
      background: rgba(31, 255, 122, 0.14);
    }

    .event-btn.noTransition {
      border-color: var(--ok);
      color: var(--ok);
      background: rgba(31, 255, 122, 0.14);
      opacity: 0.72;
    }

    .event-btn.undefined {
      border-color: var(--err);
      color: var(--err);
      background: rgba(255, 42, 87, 0.12);
      opacity: 0.72;
      cursor: not-allowed;
    }

    .event-btn.blocked {
      border-color: var(--err);
      color: var(--err);
      background: rgba(255, 42, 87, 0.12);
    }

    .event-entry {
      display: flex;
      align-items: stretch;
      gap: 6px;
      padding: 10px 0 2px;
      min-width: 0;
    }

    .event-btn {
      flex: 0 0 160px;
    }

    .event-content {
      display: flex;
      align-items: stretch;
      gap: 6px;
      flex: 1;
      min-width: 0;
      overflow: visible;
      margin-left: 8px;
    }

    .event-reason {
      color: var(--err);
      font-size: 11px;
      line-height: 1.25;
      opacity: 0.7;
      transition: opacity 120ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .event-entry.is-selected .event-reason,
    .event-entry:hover .event-reason {
      opacity: 0.98;
    }

    .diagram-toast {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(28, 30, 34, 0.92);
      font-size: 11px;
      padding: 4px 10px;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .diagram-toast.show {
      opacity: 0.96;
      transform: translateY(0);
    }

    .diagram-toast.ok {
      border-color: var(--ok);
      color: var(--ok);
      background: rgba(31, 255, 122, 0.10);
    }

    .diagram-toast.err {
      border-color: var(--err);
      color: var(--err);
      background: rgba(255, 42, 87, 0.10);
    }

    .event-label {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      opacity: 0.86;
      transition: opacity 120ms ease;
      transform: skewX(14deg);
    }

    .event-entry.is-selected .event-label,
    .event-entry:hover .event-label {
      opacity: 1;
    }

    .event-glyph {
      font-size: 11px;
      font-weight: 700;
      min-width: 10px;
      text-align: center;
      transform: skewX(14deg);
    }

    .event-args-inline {
      display: flex;
      flex-wrap: nowrap;
      align-items: stretch;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      overflow-y: visible;
    }

    .arg-field {
      position: relative;
      display: inline-flex;
      align-items: center;
      align-self: stretch;
      border: 1px solid var(--border);
      min-width: 70px;
      max-width: 140px;
    }

    .arg-field.is-null input {
      opacity: 0.3;
    }

    .arg-null-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      padding: 0 4px 0 0;
      margin: 0;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .arg-null-btn:hover {
      opacity: 1;
      color: var(--err);
    }

    .arg-field.is-null .arg-null-btn {
      opacity: 0.25;
      cursor: default;
      pointer-events: none;
    }

    .arg-label {
      position: absolute;
      top: -5px;
      left: 6px;
      background: #1f2125;
      font-size: 9px;
      color: var(--muted);
      padding: 0 2px;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
    }

    .event-args-inline input[type="text"] {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      padding: 3px 6px;
      font: inherit;
      font-size: 11px;
      outline: none;
      box-sizing: border-box;
    }

    .arg-field.boolean {
      min-width: auto;
      max-width: none;
    }

    .bool-seg {
      flex: 1;
      border: none;
      border-left: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 10px;
      padding: 0 7px;
      cursor: pointer;
      white-space: nowrap;
    }

    .bool-seg:first-of-type {
      border-left: none;
    }

    .bool-seg.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }
      transform: translate(-50%, -50%);
      font-size: 9px;
      color: var(--ok);
      line-height: 1;
    }

    #diagram {
      width: 100%;
      min-width: 0;
      height: 100%;
      display: block;
    }

    .data-list {
      margin: 0 0 12px;
      padding: 0;
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #1f2125;
      max-height: 180px;
      overflow: auto;
    }

    .data-overlay .data-list {
      margin: 0;
      max-height: none;
      background: rgba(20, 21, 26, 0.85);
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 1px solid #3a3a3a;
      font-size: 12px;
    }

    .data-key {
      display: inline-flex;
      align-items: center;
      gap: 0;
      min-width: 0;
    }

    .data-value-stack {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
    }

    .data-list li:last-child {
      border-bottom: none;
    }

    .data-value-toast {
      color: var(--ok);
      font-weight: 600;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 130ms ease, transform 130ms ease;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
      line-height: 1.2;
      font-size: 11px;
      pointer-events: none;
    }

    .data-value-toast.show {
      opacity: 0.98;
      transform: translateY(0);
    }

    .diagram-edge {
      cursor: default;
      transition: opacity 120ms ease, stroke-width 120ms ease;
    }

    .edge-annotation {
      user-select: none;
    }

    .edge-annotation.clickable {
      pointer-events: none;
      cursor: default;
    }

    .edge-chip {
      font-size: 11px;
    }

    .edge-annotation.clickable:hover .edge-chip {
      stroke-width: 1.6;
      filter: drop-shadow(0 0 2px rgba(133,115,168,.45));
    }

    .edge-label {
      font-size: 10px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .edge-guard {
      font-size: 9px;
      text-anchor: middle;
      dominant-baseline: central;
    }


    @media (max-width: 1180px) {
      .diagram-canvas {
        grid-template-columns: minmax(0, 1fr) clamp(176px, 30%, 260px);
      }

      .event-entry {
        gap: 5px;
      }

      .event-btn {
        flex: 0 0 146px;
      }

      .event-args-inline {
        flex-wrap: wrap;
        overflow: visible;
      }
    }

    @media (max-width: 900px) {
      .diagram-canvas {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .data-overlay {
        width: 100%;
      }

      .event-bar {
        max-height: clamp(112px, 26vh, 220px);
      }
    }

    @media (max-height: 860px) {
      .data-list {
        max-height: 140px;
      }

      .diagram-canvas {
        min-height: 200px;
      }

      #diagram {
        height: 100%;
      }



      .event-bar {
        max-height: clamp(104px, 24vh, 192px);
      }
    }

    @media (max-height: 740px) {
      body {
        font-size: 12px;
      }

      .header {
        padding: 8px 10px;
        margin-bottom: 8px;
      }

      .layout {
        gap: 8px;
        padding: 8px;
      }

      .event-btn {
        padding: 3px 12px;
        font-size: 11px;
      }

      .diagram-canvas {
        min-height: 170px;
      }

      #diagram {
        height: 100%;
      }



      .event-bar {
        max-height: clamp(96px, 22vh, 164px);
      }
    }

    @media (max-height: 660px) {
      .diagram-canvas {
        min-height: 150px;
      }

      #diagram {
        height: 100%;
      }

      .data-overlay {
        padding: 6px 7px;
      }



      .event-bar {
        max-height: clamp(88px, 20vh, 136px);
      }
    }

    .rule-violations-banner {
      background: rgba(255, 165, 0, 0.12);
      border: 1px solid rgba(255, 165, 0, 0.4);
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 6px;
      font-size: 11px;
      color: #ffb347;
      flex-shrink: 0;
    }

    .rule-violations-banner ul {
      margin: 4px 0 0;
      padding-left: 14px;
    }

    .rule-violations-banner li {
      border: none !important;
      padding: 2px 0 !important;
      justify-content: flex-start !important;
      font-size: 11px;
      background: transparent !important;
    }

    .data-rule-icon {
      font-size: 9px;
      opacity: 0.75;
      margin-left: 3px;
      cursor: help;
      color: #ffb347;
    }

    .state-rules-indicator {
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .state-rules-badge {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      color: #ffb347;
      border: 1px solid rgba(255, 165, 0, 0.35);
      border-radius: 3px;
      padding: 1px 5px;
      cursor: help;
    }

  </style>
</head>
<body>
  <div class="header">
    <div>
      <strong>State Diagram</strong>
      <span class="muted"> · __FILE_NAME__</span>
    </div>
    <div class="actions">
      <button id="reset-btn" class="action-btn" type="button" title="Restart from initial state and default data.">Reset</button>
    </div>
  </div>

  <div class="layout">
    <div class="left-stack">
      <div class="diagram-canvas">
        <div class="diagram-scroll" aria-label="diagram scroll area">
          <svg id="diagram" viewBox="0 0 920 430" preserveAspectRatio="xMidYMid meet" aria-label="state diagram"></svg>
          <div id="diagram-toast" class="diagram-toast" aria-live="polite"></div>
        </div>
        <div class="data-overlay" aria-label="data overlay">
          <div id="rule-violations-banner" class="rule-violations-banner" hidden></div>
          <div id="state-rules-indicator" class="state-rules-indicator" hidden></div>
          <ul id="data-list" class="data-list"></ul>
        </div>
      </div>
      <div class="meta-card events-pane" aria-label="event dock">
        <div id="event-bar" class="event-bar"></div>
      </div>
    </div>
  </div>

  <script>
    let stateOrder = [];
    let statePositions = {};
    let transitions = [];
    let eventDefinitionOrder = [];
    const FEEDBACK_DURATION_MS = 2200;
    const DOT_SPEED_PX_PER_MS = 0.264;  // pixels per millisecond — constant travel speed
    const ANIMATION_MIN_MS = 250;
    const ANIMATION_MAX_MS = 2000;
    const FADE_DURATION_MS = 220;  // fixed fade duration appended after dot arrives

    let initialState = '';
    let initialData = {};
    let currentState = initialState;
    const data = {
      ...initialData
    };
    const eventArgValues = {};

    function getEventArgDefinitions(eventName) {
      const status = currentEventStatuses.find((s) => s.name === eventName);
      return (status && Array.isArray(status.args)) ? status.args : [];
    }

    function normalizeArgValueForSend(argDef, rawValue) {
      if (rawValue === null) {
        return null;
      }

      if (argDef.type === 'boolean') {
        if (rawValue === true || rawValue === false) {
          return rawValue;
        }

        if (rawValue === 'true') {
          return true;
        }

        if (rawValue === 'false') {
          return false;
        }

        return rawValue;
      }

      if (argDef.type === 'number') {
        if (typeof rawValue === 'number') {
          return rawValue;
        }

        if (typeof rawValue === 'string') {
          if (rawValue.length === 0) {
            return rawValue;
          }

          const parsed = Number(rawValue);
          return Number.isFinite(parsed) ? parsed : rawValue;
        }

        return rawValue;
      }

      if (argDef.type === 'string') {
        return typeof rawValue === 'string' ? rawValue : String(rawValue);
      }

      return rawValue;
    }

    function collectEventArgs(eventName) {
      const argDefs = getEventArgDefinitions(eventName);
      if (argDefs.length === 0) return undefined;
      const args = {};
      argDefs.forEach((arg) => {
        const key = eventName + ':' + arg.name;
        const userRaw = eventArgValues[key];
        if (userRaw !== undefined) {
          args[arg.name] = normalizeArgValueForSend(arg, userRaw);
          return;
        }

        if (arg.hasDefaultValue) {
          args[arg.name] = arg.defaultValue;
          return;
        }

        if (arg.isNullable) {
          args[arg.name] = null;
          return;
        }

        args[arg.name] = '';
      });
      return args;
    }

    function clearEventArgs() {
      Object.keys(eventArgValues).forEach((key) => { delete eventArgValues[key]; });
    }

    let inspectDebounceTimer = null;
    function inspectEventOnServer(eventName) {
      if (inspectDebounceTimer) clearTimeout(inspectDebounceTimer);
      inspectDebounceTimer = setTimeout(async () => {
        const args = collectEventArgs(eventName);
        const response = await sendHostRequest('inspect', { eventName, args });
        if (!response.success) return;
        const raw = response.inspectResult ?? response.InspectResult;
        if (!raw) return;
        const updated = toHostEventStatus(raw);
        if (!updated) return;
        // Patch the live status for this event
        const idx = currentEventStatuses.findIndex((s) => s.name === eventName);
        if (idx >= 0) {
          currentEventStatuses[idx] = updated;
        } else {
          currentEventStatuses.push(updated);
        }
        // Re-evaluate and update UI
        const evaluation = evaluateEvent(currentState, eventName);
        if (evaluation.kind === 'enabled') {
          selectEvent(eventName);
        } else {
          syncSelectionToCurrentState();
        }
        // Preserve focus across re-render
        const focused = document.activeElement;
        const focusedArgName = focused?.dataset?.eventArg;
        const focusedEventName = focused?.dataset?.event;
        const caretPos = focused?.selectionStart;

        suppressArgBlur = true;
        renderEventBar();
        suppressArgBlur = false;

        if (focusedArgName && focusedEventName) {
          const refocus = eventBar.querySelector(`input[data-event="${focusedEventName}"][data-event-arg="${focusedArgName}"]`);
          if (refocus) {
            refocus.focus();
            if (typeof caretPos === 'number') {
              refocus.setSelectionRange(caretPos, caretPos);
            }
          }
        }
        drawDiagram();
      }, 30);
    }

    let eventStatusRefreshToken = 0;
    async function refreshCurrentEventStatusesFromInspect() {
      const refreshToken = ++eventStatusRefreshToken;
      const eventNames = getOrderedCurrentEvents();
      if (eventNames.length === 0) {
        return;
      }

      const refreshed = await Promise.all(eventNames.map(async (eventName) => {
        const args = collectEventArgs(eventName);
        const response = await sendHostRequest('inspect', { eventName, args });
        if (!response.success) {
          return null;
        }

        const raw = response.inspectResult ?? response.InspectResult;
        if (!raw) {
          return null;
        }

        const status = toHostEventStatus(raw);
        return status ? { eventName, status } : null;
      }));

      if (refreshToken !== eventStatusRefreshToken) {
        return;
      }

      let hasAnyUpdate = false;
      refreshed.forEach((item) => {
        if (!item) {
          return;
        }

        const idx = currentEventStatuses.findIndex((s) => s.name === item.eventName);
        if (idx >= 0) {
          currentEventStatuses[idx] = item.status;
        } else {
          currentEventStatuses.push(item.status);
        }

        hasAnyUpdate = true;
      });

      if (!hasAnyUpdate) {
        return;
      }

      syncSelectionToCurrentState();
      drawDiagram();
      renderEventBar();
    }

    const diagram = document.getElementById('diagram');
    const dataList = document.getElementById('data-list');
    const eventBar = document.getElementById('event-bar');
    const diagramToast = document.getElementById('diagram-toast');
    const resetButton = document.getElementById('reset-btn');

    let selectedTransitionIndex = 0;
    let hoveredEventName = null;
    let rowFeedbackTimer = null;
    let rowFeedback = null;
    let dataFieldToastTimer = null;
    let stateChangeAnimationFrame = null;
    let pendingFocusEventName = null;
    let dataFieldToasts = new Set();
    let dataFieldToastDetails = new Map();
    let stateChangeAnimation = null;
    let suppressHoverUntilAnimationComplete = false;
    let suppressArgBlur = false;
    let resetButtonFeedbackTimer = null;
    let currentEventStatuses = [];
    let currentActiveRuleViolations = [];
    let currentRuleDefinitions = [];
    let transitionPaths = new Map();
    let nodeSizes = {};
    let diagramBounds = { width: 920, height: 430 };

    const vscodeApi = acquireVsCodeApi();
    let previewRequestId = 1;
    const previewPendingRequests = new Map();
    let latestSnapshotSequence = 0;



    function pointsToSmoothPath(points) {
      if (!Array.isArray(points) || points.length < 2) {
        return '';
      }

      const normalized = points
        .map((point) => {
          if (!point || typeof point !== 'object') {
            return null;
          }

          const x = Number(point.x);
          const y = Number(point.y);
          if (!Number.isFinite(x) || !Number.isFinite(y)) {
            return null;
          }

          return { x, y };
        })
        .filter((point) => point !== null);

      if (normalized.length < 2) {
        return '';
      }

        const toHalfW = toSize.width / 2;

        if (transition.from === transition.to) {
          const loopX = from.x + fromHalfW;
          const loopReach = 60;
          return `M ${loopX} ${from.y - 8} C ${loopX + loopReach} ${from.y - 50}, ${loopX + loopReach} ${from.y + 46}, ${from.x + fromHalfW - 12} ${from.y + 16}`;
        }

        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const forward = dx >= 0;

        const startX = from.x + (forward ? fromHalfW : -fromHalfW);
        const endX = to.x - (forward ? toHalfW : -toHalfW);
        const startY = from.y;
        const endY = to.y;

        return `M ${startX} ${startY} L ${endX} ${endY}`;
      }

      function getEdgeVisual(transition, index, selectedTransition, selectedEventName, eventEvaluations) {
        const eventEvaluation = eventEvaluations[transition.event];
        const fromCurrent = transition.from === diagramState;
        const sameEventFromCurrent = selectedEventName !== null && fromCurrent && transition.event === selectedEventName;
        const selectedExact = selectedTransition !== null && index === selectedTransitionIndex;
        const hoveredMatch = activeHoverEventName !== null
          && transition.from === diagramState
          && transition.event === activeHoverEventName;

        let stroke = 'var(--edge-muted)';
        let marker = 'url(#arrow-muted)';
        let width = 1.8;
        let opacity = 0.5;
        let dash = '';

        if (fromCurrent && eventEvaluation && eventEvaluation.kind !== 'undefined') {
          if (eventEvaluation.kind === 'enabled') {
            if (eventEvaluation.to === transition.to) {
              stroke = 'var(--edge)';
              marker = 'url(#arrow)';
              width = 2.1;
              opacity = 0.68;
            } else {
              stroke = 'var(--edge-error)';
              marker = 'url(#arrow-error)';
              width = 2.0;
              opacity = 0.62;
              dash = '6 5';
            }
          } else if (eventEvaluation.kind === 'blocked') {
            stroke = 'var(--edge-error)';
            marker = 'url(#arrow-error)';
            width = 2.0;
            opacity = 0.62;
            dash = '5 4';
          }
        }

        if (sameEventFromCurrent) {
          if (eventEvaluation?.kind === 'enabled') {
            if (eventEvaluation.to === transition.to) {
              stroke = 'var(--edge)';
              marker = 'url(#arrow)';
              width = 2.15;
              opacity = 1;
            } else {
              stroke = 'var(--edge-error)';
              marker = 'url(#arrow-error)';
              width = 2.0;
              opacity = 0.8;
              dash = '6 5';
            }
          } else if (eventEvaluation?.kind === 'blocked') {
            stroke = 'var(--edge-error)';
            marker = 'url(#arrow-error)';
            width = 2.0;
            opacity = 0.8;
            dash = '5 4';
          }
        }

        if (selectedExact && !sameEventFromCurrent) {
          if (!fromCurrent) {
            stroke = 'var(--event)';
            marker = 'url(#arrow-selected)';
            width = 2.1;
            opacity = 1;
          } else {
            width = Math.max(width, 2.1);
            opacity = 1;
          }
        }

        if (activeHoverEventName !== null) {
          if (hoveredMatch) {
            width = Math.max(width, 2.15);
            opacity = Math.max(opacity, 1);
          } else {
            width = Math.max(1.6, width * 0.86);
            opacity = Math.min(opacity, 0.2);
          }
        }

        return { stroke, marker, width, opacity, dash };
      }

      function getEdgeAnnotation(transition, pathD, selectedEventName, eventEvaluations, pathFractionBias = 0) {
        const fromCurrent = transition.from === diagramState;
        const eventEvaluation = eventEvaluations[transition.event];
        const shouldShowBecauseCurrent = fromCurrent && eventEvaluation && eventEvaluation.kind !== 'undefined';
        const shouldShowBecauseSelected = selectedEventName !== null && transition.event === selectedEventName && transition.from === diagramState;

        if (!shouldShowBecauseCurrent && !shouldShowBecauseSelected) {
          return null;
        }

        const pathFraction = Math.max(0.12, Math.min(0.88, getChipPathFraction(transition) + pathFractionBias));
        const position = getPointOnPath(pathD, pathFraction);

        return {
          position,
          event: transition.event,
          guard: transition.guardExpression || null
        };
      }

      function getStateEventEvaluations(stateName) {
        return Object.fromEntries(
          getUniqueOutgoingEvents(stateName).map((eventName) => [eventName, evaluateEvent(stateName, eventName)])
        );
      }

      function getEdgeVisualForState(transition, eventEvaluations, stateName) {
        const eventEvaluation = eventEvaluations[transition.event];
        const fromCurrent = transition.from === stateName;

        let stroke = 'var(--edge-muted)';
        let marker = 'url(#arrow-muted)';
        let width = 1.6;
        let opacity = 0.2;
        let dash = '';

        if (fromCurrent && eventEvaluation && eventEvaluation.kind !== 'undefined') {
          if (eventEvaluation.kind === 'enabled') {
            if (eventEvaluation.to === transition.to) {
              stroke = 'var(--edge)';
              marker = 'url(#arrow)';
              width = 2.15;
              opacity = 0.88;
            } else {
              stroke = 'var(--edge-error)';
              marker = 'url(#arrow-error)';
              width = 2.0;
              opacity = 0.74;
              dash = '6 5';
            }
          } else if (eventEvaluation.kind === 'blocked') {
            stroke = 'var(--edge-error)';
            marker = 'url(#arrow-error)';
            width = 2.0;
            opacity = 0.74;
            dash = '5 4';
          }
        }

        return { stroke, marker, width, opacity, dash };
      }

      function easeInOut(progress) {
        if (progress <= 0) return 0;
        if (progress >= 1) return 1;
        return progress < 0.5
          ? 4 * progress * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 3) / 2;
      }

      const isAnimationPhase = stateChangeAnimation !== null;
      if (isAnimationPhase) {
        const progress = Math.max(0, Math.min(1, stateChangeAnimation.progress ?? 0));
        const eased = easeInOut(progress);
        const fromState = stateChangeAnimation.from;
        const toState = stateChangeAnimation.to;
        const FADE_START = stateChangeAnimation.fadeFraction;
        const fadeOpacity = progress < FADE_START ? 1 : Math.max(0, 1 - (progress - FADE_START) / (1 - FADE_START));

        // Build edge geometry
        const edgeSegments = transitions.map((transition, index) => {
          if (transition.kind !== 'transition') return null;
          const from = statePositions[transition.from];
          const to = statePositions[transition.to];
          const pathD = buildEdgePath(transition, from, to, index);
          return { index, transition, pathD };
        }).filter(Boolean);
        const laneBiasByIndex = buildParallelLaneBiasByIndex(edgeSegments);

        // Active transition edge fades out; all other from-state edges stay muted
        const fromEdgeSvg = edgeSegments
          .map((segment) => {
            if (segment.transition.from !== fromState) return '';
            const isActive = segment.transition.to === toState && segment.transition.event === stateChangeAnimation.eventName;
            if (!isActive) return `<path class="diagram-edge" d="${segment.pathD}" fill="none" stroke="var(--edge-muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-muted)" opacity="0.16"></path>`;
            const opacity = fadeOpacity;
            if (opacity <= 0.02) return '';
            return `<path class="diagram-edge" d="${segment.pathD}" fill="none" stroke="var(--edge)" stroke-width="2.15" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" opacity="${opacity}"></path>`;
          })
          .join('');

        const mutedEdgeSvg = edgeSegments
          .map((segment) => segment.transition.from === fromState
            ? ''
            : `<path class="diagram-edge" d="${segment.pathD}" fill="none" stroke="var(--edge-muted)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-muted)" opacity="0.16"></path>`)
          .join('');

        // Only the active transition's annotation fades out
        const annotationItems = edgeSegments
          .filter((segment) =>
            segment.transition.from === fromState &&
            segment.transition.to === toState &&
            segment.transition.event === stateChangeAnimation.eventName
          )
          .map((segment) => {
            const annotation = getEdgeAnnotation(
              segment.transition, segment.pathD, null, {},
              laneBiasByIndex.get(segment.index) ?? 0
            );
            if (!annotation) return null;
            const chipWidth = annotation.event.length * 7 + 32;
            return { segment, annotation, stroke: 'var(--edge)', chipWidth, opacity: fadeOpacity * 0.92 };
          })
          .filter(Boolean);

        const annotationYByIndex = deconflictAnnotationYs(
          annotationItems.map((item) => ({
            index: item.segment.index,
            x: item.annotation.position.x,
            y: item.annotation.position.y - 8,
            width: item.chipWidth
          }))
        );

        const annotationSvg = annotationItems
          .map((item) => {
            const chipY = annotationYByIndex.get(item.segment.index) ?? (item.annotation.position.y - 8);
            const chipHeight = 16;
            const textY = chipY + chipHeight / 2;
            const guardX = item.annotation.position.x;
            const guardY = chipY + chipHeight + 10;
            return `
              <g class="edge-annotation" opacity="${item.opacity}">
                <path class="edge-chip" d="${parallelogramChipPath(item.annotation.position.x, chipY, item.chipWidth, chipHeight)}" fill="rgba(30,30,30,0.88)" stroke="${item.stroke}" stroke-width="1.1"/>
                <text class="edge-label" x="${item.annotation.position.x}" y="${textY}" fill="${item.stroke}">${item.annotation.event}</text>
                ${item.annotation.guard ? `<line x1="${item.annotation.position.x}" y1="${chipY + chipHeight}" x2="${item.annotation.position.x}" y2="${guardY - 6}" stroke="${item.stroke}" stroke-width="1" opacity="0.9"></line><text class="edge-guard" x="${guardX}" y="${guardY}" fill="${item.stroke}">[${item.annotation.guard}]</text>` : ''}
              </g>
            `;
          })
          .join('');

        // Travelling dot along the active transition path
        const transitionSegment = edgeSegments.find((segment) =>
          segment.transition.from === fromState && segment.transition.to === toState);
        const selfLoopPathD = fromState === toState ? buildNoTransitionLoopPath(fromState) : null;
        const activePathD = selfLoopPathD ?? (transitionSegment ? transitionSegment.pathD : null);

        const selfLoopSvg = selfLoopPathD
          ? `<path d="${selfLoopPathD}" fill="none" stroke="var(--ok)" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round" opacity="0.52"></path>`
          : '';

        // Dot travels during the first FADE_START fraction of the animation, then holds at destination
        const dotProgress = Math.min(0.985, Math.max(0.001, 0.01 + (Math.min(progress, FADE_START) / FADE_START) * 0.975));
        const dotPoint = activePathD ? getPointOnPath(activePathD, dotProgress) : null;
        const dotSvg = dotPoint
          ? `<g filter="url(#transition-glow-strong)"><circle cx="${dotPoint.x}" cy="${dotPoint.y}" r="5.5" fill="var(--ok)" opacity="0.92"></circle><circle cx="${dotPoint.x}" cy="${dotPoint.y}" r="2.4" fill="#d6ffe8" opacity="0.96"></circle></g>`
          : '';

        // Nodes: from-state fades, to-state highlighted, others default
        const nodeSvg = Object.entries(statePositions).map(([name, pos]) => {
          const ns = nodeSizes[name] ?? { width: 112, height: 44 };
          const halfW = ns.width / 2;
          const halfH = ns.height / 2;
          const rx = halfH;
          let stroke = 'var(--border)';
          let strokeOpacity = 1;
          let strokeWidth = 1.6;
          let textFill = 'var(--border)';
          let textOpacity = 1;
          let fontWeight = 500;
          let overlayRect = '';
          let glow = '';

          if (name === fromState) {
            // Interior and border both hold full, then fade together after dot arrives
            overlayRect = `<rect x="${pos.x - halfW}" y="${pos.y - halfH}" width="${ns.width}" height="${ns.height}" rx="${rx}" fill="var(--ok)" fill-opacity="${(fadeOpacity * 0.9).toFixed(3)}" stroke="none"></rect>`;
            stroke = 'var(--ok)';
            strokeOpacity = Math.max(0.4, fadeOpacity);
            strokeWidth = 2.4;
            // Text: light on green while fill is still visible, green on dark once it's gone
            textFill = fadeOpacity > 0.5 ? 'var(--bg)' : 'var(--ok)';
            fontWeight = 700;
            glow = 'filter="drop-shadow(0 0 5px rgba(31,255,122,.45))"';
          } else if (name === toState) {
            const arrivalFill = 1 - fadeOpacity;
            overlayRect = `<rect x="${pos.x - halfW}" y="${pos.y - halfH}" width="${ns.width}" height="${ns.height}" rx="${rx}" fill="var(--ok)" fill-opacity="${(arrivalFill * 0.9).toFixed(3)}" stroke="none"></rect>`;
            stroke = 'var(--ok)';
            strokeOpacity = 1;
            strokeWidth = 2.0;
            textFill = 'var(--ok)';
            textOpacity = 1;
            fontWeight = 600;
            glow = 'filter="drop-shadow(0 0 5px rgba(31,255,122,.45))"';
          }

          return `
            <g ${glow}>
              <rect x="${pos.x - halfW}" y="${pos.y - halfH}" width="${ns.width}" height="${ns.height}" rx="${rx}" fill="var(--node)" fill-opacity="1" stroke="${stroke}" stroke-opacity="${strokeOpacity}" stroke-width="${strokeWidth}"></rect>
              ${overlayRect}
              <text x="${pos.x}" y="${pos.y + 5}" text-anchor="middle" fill="${textFill}" fill-opacity="${textOpacity}" font-size="14" font-weight="${fontWeight}">${name}</text>
            </g>
          `;
        }).join('');

        diagram.innerHTML = `${defs}${mutedEdgeSvg}${fromEdgeSvg}${selfLoopSvg}${dotSvg}${annotationSvg}${nodeSvg}`;
        return;
      }

      const selectedTransition = getSelectedTransition();
      const selectedEventName = getSelectedEventName();
      const activeHoverEventName = selectedEventName;
      const eventEvaluations = Object.fromEntries(
        getUniqueOutgoingEvents(diagramState).map((eventName) => [eventName, evaluateEvent(diagramState, eventName)])
      );
      const hoveredEvaluation = !isAnimationPhase && activeHoverEventName !== null
        ? evaluateEvent(diagramState, activeHoverEventName)
        : null;
      const hoveredActualDestination = hoveredEvaluation && hoveredEvaluation.kind === 'enabled'
        ? hoveredEvaluation.to
        : null;
      const hoveredStateVisual = new Map();
      const hoveredEventDestinationStates = new Set();
      const setStateVisual = (stateName, visual) => {
        const existing = hoveredStateVisual.get(stateName);
        if (!existing) {
          hoveredStateVisual.set(stateName, visual);
          return;
        }

        const rank = {
          actual: 3,
          alternate: 2,
          blocked: 2
        };

        if ((rank[visual] ?? 0) >= (rank[existing] ?? 0)) {
          hoveredStateVisual.set(stateName, visual);
        }
      };

      if (!isAnimationPhase) {
        Object.entries(eventEvaluations).forEach(([eventName, evaluation]) => {
          const family = transitions
            .filter((transition) => transition.from === diagramState && transition.event === eventName);

          if (evaluation.kind === 'enabled' && evaluation.to) {
            family.forEach((transition) => {
              setStateVisual(transition.to, transition.to === evaluation.to ? 'actual' : 'alternate');
            });
          } else if (evaluation.kind === 'blocked') {
            family.forEach((transition) => {
              setStateVisual(transition.to, 'blocked');
            });
          }
        });
      }

      if (!isAnimationPhase && activeHoverEventName !== null) {
        const hoveredEvaluation = evaluateEvent(diagramState, activeHoverEventName);
        const hoveredFamily = transitions
          .filter((transition) => transition.from === diagramState && transition.event === activeHoverEventName);

        hoveredFamily.forEach((transition) => {
          hoveredEventDestinationStates.add(transition.to);
        });

        if (hoveredEvaluation.kind === 'enabled' && hoveredEvaluation.to) {
          hoveredFamily.forEach((transition) => {
            setStateVisual(transition.to, transition.to === hoveredEvaluation.to ? 'actual' : 'alternate');
          });
        } else if (hoveredEvaluation.kind === 'blocked') {
          hoveredFamily.forEach((transition) => {
            setStateVisual(transition.to, 'blocked');
          });
        }
      }

      const edgeSegments = transitions.map((t, index) => {
        if (t.kind !== 'transition') {
          return null;
        }
        const from = statePositions[t.from];
        const to = statePositions[t.to];
        const visual = getEdgeVisual(t, index, selectedTransition, selectedEventName, eventEvaluations);

        const pathD = buildEdgePath(t, from, to, index);
        return {
          index,
          transition: t,
          pathD,
          visual,
          svg: `<path class="diagram-edge" data-index="${index}" d="${pathD}" fill="none" stroke="${visual.stroke}" stroke-width="${visual.width}" stroke-linecap="round" stroke-linejoin="round" marker-end="${visual.marker}" stroke-dasharray="${visual.dash}" opacity="${visual.opacity}"></path>`
        };
      }).filter(Boolean);
      const laneBiasByIndex = buildParallelLaneBiasByIndex(edgeSegments);

      const edgeSvg = edgeSegments.map((segment) => segment.svg).join('');

      const annotationItems = edgeSegments
        .map((segment) => {
          const { transition, index, pathD, visual } = segment;
          const annotation = getEdgeAnnotation(
            transition,
            pathD,
            selectedEventName,
            eventEvaluations,
            laneBiasByIndex.get(index) ?? 0
          );
          if (!annotation) {
            return null;
          }

          const isCurrentStateEvent = transition.from === diagramState && eventEvaluations[transition.event]?.kind !== 'undefined';
          const isHoveredEvent = activeHoverEventName !== null && transition.event === activeHoverEventName && transition.from === diagramState;
          const annotationOpacity = isCurrentStateEvent
            ? activeHoverEventName === null
              ? 0.62
              : isHoveredEvent
                ? 1
                : 0.2
            : Math.max(visual.opacity, 0.9);

          return {
            segment,
            transition,
            annotation,
            visual,
            index,
            opacity: annotationOpacity,
            chipWidth: annotation.event.length * 7 + 32
          };
        })
        .filter((value) => value !== null);

      const annotationYByIndex = deconflictAnnotationYs(
        annotationItems.map((item) => ({
          index: item.index,
          x: item.annotation.position.x,
          y: item.annotation.position.y - 8,
          width: item.chipWidth
        }))
      );

      const annotationSvg = annotationItems.map((item) => {
        const chipY = annotationYByIndex.get(item.index) ?? (item.annotation.position.y - 8);
        const chipHeight = 16;
        const textY = chipY + chipHeight / 2;
        const guardX = item.annotation.position.x;
        const guardY = chipY + chipHeight + 10;

        return `
          <g class="edge-annotation clickable" data-index="${item.index}" opacity="${item.opacity}">
            <path class="edge-chip" d="${parallelogramChipPath(item.annotation.position.x, chipY, item.chipWidth, chipHeight)}" fill="rgba(30,30,30,0.88)" stroke="${item.visual.stroke}" stroke-width="1.1"/>
            <text class="edge-label" x="${item.annotation.position.x}" y="${textY}" fill="${item.visual.stroke}">${item.annotation.event}</text>
            ${item.annotation.guard ? `<line x1="${item.annotation.position.x}" y1="${chipY + chipHeight}" x2="${item.annotation.position.x}" y2="${guardY - 6}" stroke="${item.visual.stroke}" stroke-width="1" opacity="0.9"></line><text class="edge-guard" x="${guardX}" y="${guardY}" fill="${item.visual.stroke}">[${item.annotation.guard}]</text>` : ''}
          </g>
        `;
      }).join('');

      const nodeSvg = Object.entries(statePositions).map(([name, pos]) => {
        const ns = nodeSizes[name] || { width: 112, height: 44 };
        const halfW = ns.width / 2;
        const halfH = ns.height / 2;
        const rx = Math.min(halfH, 22);
        const isActive = name === diagramState;
        const hoveredVisual = hoveredStateVisual.get(name);
        const isDestinationVisual = !isActive && (hoveredVisual === 'actual' || hoveredVisual === 'alternate' || hoveredVisual === 'blocked');
        const isActualDestination = !isActive && hoveredVisual === 'actual';
        const isHoveredEventDestination = hoveredEventDestinationStates.has(name);
        const destinationOutlineOpacity = isDestinationVisual
          ? activeHoverEventName === null
            ? 0.58
            : isActualDestination && isHoveredEventDestination
              ? 1
              : isHoveredEventDestination
              ? 0.72
              : 0.18
          : 1;
        const destinationTextOpacity = isDestinationVisual
          ? activeHoverEventName === null
            ? 0.66
            : isActualDestination && isHoveredEventDestination
              ? 1
              : isHoveredEventDestination
              ? 0.74
              : 0.24
          : 1;
        const stroke = isActive
          ? 'var(--ok)'
          : hoveredVisual === 'actual'
            ? 'var(--ok)'
            : hoveredVisual === 'alternate' || hoveredVisual === 'blocked'
              ? 'var(--edge-error)'
            : 'var(--border)';
        const glow = isActive
          ? 'filter="drop-shadow(0 0 5px rgba(31,255,122,.45))"'
          : hoveredVisual === 'actual' && isHoveredEventDestination
            ? 'filter="drop-shadow(0 0 5px rgba(31,255,122,.36))"'
            : hoveredVisual === 'actual'
              ? 'filter="drop-shadow(0 0 3px rgba(31,255,122,.22))"'
            : hoveredVisual === 'alternate' || hoveredVisual === 'blocked'
              ? 'filter="drop-shadow(0 0 3px rgba(255,42,87,.2))"'
            : '';
        const fill = isActive
          ? 'var(--ok)'
          : 'var(--node)';
        const textFill = isActive
          ? 'var(--bg)'
          : isDestinationVisual
            ? stroke
            : 'var(--border)';
        const fontWeight = isActive ? 700 : isActualDestination && isHoveredEventDestination ? 700 : isDestinationVisual ? 600 : 500;
        return `
          <g ${glow}>
            <rect x="${pos.x - halfW}" y="${pos.y - halfH}" width="${ns.width}" height="${ns.height}" rx="${rx}" fill="${fill}" stroke="${stroke}" stroke-opacity="${destinationOutlineOpacity}" stroke-width="${isActive ? 2.6 : isDestinationVisual ? 2.0 : 1.6}"></rect>
            <text x="${pos.x}" y="${pos.y + 5}" text-anchor="middle" fill="${textFill}" fill-opacity="${destinationTextOpacity}" font-size="14" font-weight="${fontWeight}">${name}</text>
          </g>
        `;
      }).join('');

      let selfLoopSvg = '';
      if (hoveredEvaluation !== null && hoveredEvaluation.kind === 'noTransition' && activeHoverEventName !== null) {
        const loopPathD = buildNoTransitionLoopPath(diagramState);
        if (loopPathD) {
          const loopPos = statePositions[diagramState];
          const ns = nodeSizes[diagramState] ?? { width: 112, height: 44 };
          const halfW = ns.width / 2;
          const halfH = ns.height / 2;
          const ctrl = (loopPos.y - halfH) - 48;
          const labelX = loopPos.x;
          const chipHeight = 16;
          const chipWidth = activeHoverEventName.length * 7 + 32;
          const chipY = ctrl - chipHeight - 4;
          const textY = chipY + chipHeight / 2;
          selfLoopSvg = `<g opacity="0.72"><path d="${loopPathD}" fill="none" stroke="var(--ok)" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round"></path><path class="edge-chip" d="${parallelogramChipPath(labelX, chipY, chipWidth, chipHeight)}" fill="rgba(30,30,30,0.88)" stroke="var(--ok)" stroke-width="1.1"/><text class="edge-label" x="${labelX}" y="${textY}" fill="var(--ok)">${activeHoverEventName}</text></g>`;
        }
      }

      diagram.innerHTML = `${defs}${edgeSvg}${selfLoopSvg}${annotationSvg}${nodeSvg}`;
    }

    function renderEventBar() {
      const selectedEventName = getSelectedEventName();
      const events = getOrderedCurrentEvents();

      if (events.length === 0) {
        eventBar.innerHTML = '<span class="muted">No events available from current state.</span>';
        return;
      }

      eventBar.innerHTML = events
        .map((eventName) => {
          const evaluation = evaluateEvent(currentState, eventName);
          const activeClass = eventName === selectedEventName ? ' active' : '';
          const stateClass = evaluation.kind === 'enabled'
            ? ' enabled'
            : evaluation.kind === 'noTransition'
            ? ' noTransition'
            : evaluation.kind === 'blocked'
            ? ' blocked'
            : evaluation.kind === 'undefined'
              ? ' undefined'
              : '';
          const glyph = evaluation.kind === 'enabled'
            ? '✔'
            : evaluation.kind === 'noTransition'
            ? '⏸'
            : evaluation.kind === 'blocked'
              ? '✖'
              : '∅';
          const argDefs = getEventArgDefinitions(eventName);
          const inlineArgs = argDefs.length > 0
            ? `<span class="event-args-inline">${argDefs.map((arg) => {
                const userVal = eventArgValues[eventName + ':' + arg.name];
                const displayVal = userVal !== undefined ? userVal : (arg.hasDefaultValue ? formatArgDefault(arg.defaultValue) : '');
                const placeholder = arg.hasDefaultValue
                  ? formatArgDefault(arg.defaultValue)
                  : arg.isNullable
                    ? 'optional'
                    : '';
                const isNull = arg.isNullable && (userVal === null || (userVal === undefined && !arg.hasDefaultValue));
                const nullClass = isNull ? ' is-null' : '';
                const nullBtn = arg.isNullable
                  ? `<button class="arg-null-btn" data-event="${eventName}" data-event-arg="${arg.name}" type="button" title="Set to null">×</button>`
                  : '';
                if (arg.type === 'boolean' && !arg.isNullable) {
                  const trueActive = displayVal === 'true' || displayVal === true ? ' active' : '';
                  const falseActive = displayVal === 'false' || displayVal === false ? ' active' : '';
                  return `<span class="arg-field boolean"><span class="arg-label">${arg.name}</span><button class="bool-seg${trueActive}" data-event="${eventName}" data-event-arg="${arg.name}" data-val="true" type="button">true</button><button class="bool-seg${falseActive}" data-event="${eventName}" data-event-arg="${arg.name}" data-val="false" type="button">false</button></span>`;
                }
                if (arg.type === 'boolean' && arg.isNullable) {
                  const trueActive = !isNull && (displayVal === 'true' || displayVal === true) ? ' active' : '';
                  const falseActive = !isNull && (displayVal === 'false' || displayVal === false) ? ' active' : '';
                  return `<span class="arg-field boolean${nullClass}"><span class="arg-label">${arg.name}</span><button class="bool-seg${trueActive}" data-event="${eventName}" data-event-arg="${arg.name}" data-val="true" type="button">true</button><button class="bool-seg${falseActive}" data-event="${eventName}" data-event-arg="${arg.name}" data-val="false" type="button">false</button>${nullBtn}</span>`;
                }
                const textVal = isNull ? '' : displayVal.toString();
                return `<span class="arg-field${nullClass}"><span class="arg-label">${arg.name}</span><input data-event="${eventName}" data-event-arg="${arg.name}" type="text" placeholder="${isNull ? 'null' : placeholder}" value="${textVal.replace(/"/g, '&quot;')}">${nullBtn}</span>`;
              }).join('')}</span>`
            : '';
          const reasonText = getEvaluationReason(evaluation);
          const escapedReason = reasonText
            ? reasonText
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
            : '';
          const inlineReason = reasonText
            ? `<div class="event-reason">${escapedReason}</div>`
            : '';
          const selectedEntryClass = eventName === selectedEventName ? ' is-selected' : '';

          const contentInner = `${inlineArgs}${inlineReason}`;
          return `<span class="event-entry${selectedEntryClass}"><button class="event-btn${activeClass}${stateClass}" data-event="${eventName}" type="button"><span class="event-label">${eventName}</span><span class="event-glyph">${glyph}</span></button><span class="event-content">${contentInner}</span></span>`;
        })
        .join('');

      eventBar.querySelectorAll('.event-btn').forEach((button) => {
        const eventName = button.dataset.event;
        applyEventButtonState(button, eventName);

        button.addEventListener('mouseenter', () => {
          if (suppressHoverUntilAnimationComplete) {
            return;
          }

          hoveredEventName = eventName;
          drawDiagram();
        });

        button.addEventListener('mouseleave', () => {
          hoveredEventName = null;
          drawDiagram();
        });

        button.addEventListener('click', () => {
          selectEvent(eventName);

          const evaluation = evaluateEvent(currentState, eventName);
          if (evaluation.kind === 'undefined') {
            renderAll();
            return;
          }

          fireCurrentSelection(eventName);
        });
      });

      eventBar.querySelectorAll('.arg-null-btn').forEach((btn) => {
        const ownerEventName = btn.dataset.event;
        const argName = btn.dataset.eventArg;
        btn.addEventListener('click', (event) => {
          event.stopPropagation();
          eventArgValues[ownerEventName + ':' + argName] = null;
          hoveredEventName = ownerEventName;
          inspectEventOnServer(ownerEventName);
          suppressArgBlur = true;
          renderEventBar();
          suppressArgBlur = false;
        });
      });

      eventBar.querySelectorAll('.bool-seg').forEach((seg) => {
        const ownerEventName = seg.dataset.event;
        const argName = seg.dataset.eventArg;
        seg.addEventListener('click', (event) => {
          event.stopPropagation();
          eventArgValues[ownerEventName + ':' + argName] = seg.dataset.val === 'true';
          hoveredEventName = ownerEventName;
          inspectEventOnServer(ownerEventName);
          suppressArgBlur = true;
          renderEventBar();
          suppressArgBlur = false;
        });
      });

      eventBar.querySelectorAll('input[type="text"][data-event-arg]').forEach((input) => {
        const ownerEventName = input.dataset.event;

        input.addEventListener('mouseenter', (event) => {
          event.stopPropagation();
        });

        input.addEventListener('focus', () => {
          if (suppressHoverUntilAnimationComplete) {
            return;
          }

          hoveredEventName = ownerEventName;
          drawDiagram();
        });

        input.addEventListener('click', (event) => {
          event.stopPropagation();
        });

        input.addEventListener('blur', () => {
          if (suppressArgBlur) {
            return;
          }
          const ownerButton = eventBar.querySelector(`button[data-event="${ownerEventName}"]`);
          const ownerEntry = ownerButton?.closest('.event-entry');
          const activeElement = document.activeElement;
          if (!ownerEntry || !activeElement || !ownerEntry.contains(activeElement)) {
            hoveredEventName = null;
            drawDiagram();
          }
        });

        input.addEventListener('input', () => {
          const argName = input.dataset.eventArg;
          eventArgValues[ownerEventName + ':' + argName] = input.value;

          // Ask the server to re-evaluate with the current arg values
          inspectEventOnServer(ownerEventName);

          // Pin hover so the blur from DOM rebuild doesn't clear it
          hoveredEventName = ownerEventName;
          suppressArgBlur = true;

          renderEventBar();
          suppressArgBlur = false;

          // Restore focus to the same input field after re-render
          const refocusInput = eventBar.querySelector(`input[data-event="${ownerEventName}"][data-event-arg="${argName}"]`);
          if (refocusInput) {
            refocusInput.focus();
            const len = refocusInput.value.length;
            refocusInput.setSelectionRange(len, len);
          }

          drawDiagram();
        });
      });

      if (pendingFocusEventName) {
        const focusTarget = eventBar.querySelector(`button[data-event="${pendingFocusEventName}"]`);
        if (focusTarget) {
          focusTarget.focus();
        }

        pendingFocusEventName = null;
      }
    }

    async function fireCurrentSelection(explicitEventName = null) {
      const eventName = explicitEventName ?? getSelectedEventName();
      if (!eventName) {
        return;
      }

      const beforeState = currentState;
      const beforeData = snapshotData();

      const args = collectEventArgs(eventName);

      const response = await sendHostRequest('fire', { eventName, args });
      if (!response.success || !response.snapshot) {
        const allErrors = response.errors ?? response.Errors;
        const errMsg = Array.isArray(allErrors) && allErrors.length > 1
          ? `✖ ${allErrors.join(' · ')}`
          : `✖ ${response.error || `Event '${eventName}' did not fire.`}`;
        showRowFeedback(eventName, errMsg, 'err');
        renderAll();
        return;
      }

      const newSnapshot = response.snapshot;
      const newState = String(newSnapshot.currentState ?? newSnapshot.CurrentState ?? beforeState);

      // Start animation first — commit state changes when the dot reaches the target
      triggerStateChangeAnimation(beforeState, newState, eventName, () => {
        applySnapshot(newSnapshot);
        const afterData = snapshotData();
        const changedKeys = getChangedDataKeys(beforeData, afterData);
        showDataFieldToasts(changedKeys, beforeData, afterData);
        hoveredEventName = null;
        clearEventArgs();
        void refreshCurrentEventStatusesFromInspect();
        showRowFeedback(eventName, `✔ ${beforeState} → ${newState}`, 'ok');
      });

      drawDiagram();
    }

    function formatValue(value) {
      if (value === null) return 'null';
      if (typeof value === 'string') return `"${value}"`;
      return String(value);
    }

    function renderData() {
      const violationsBanner = document.getElementById('rule-violations-banner');
      if (violationsBanner) {
        if (currentActiveRuleViolations.length > 0) {
          const items = currentActiveRuleViolations
            .map((v) => `<li>${v.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</li>`)
            .join('');
          violationsBanner.innerHTML = `<strong>⚠ Rule violations:</strong><ul>${items}</ul>`;
          violationsBanner.removeAttribute('hidden');
        } else {
          violationsBanner.innerHTML = '';
          violationsBanner.setAttribute('hidden', '');
        }
      }

      const stateRulesIndicator = document.getElementById('state-rules-indicator');
      if (stateRulesIndicator) {
        const stateRules = currentRuleDefinitions.filter((r) => r.scope === `state:${currentState}`);
        if (stateRules.length > 0) {
          const tooltip = stateRules.map((r) => r.reason).join('; ').replace(/"/g, '&quot;');
          stateRulesIndicator.innerHTML = `<span class="state-rules-badge" title="${tooltip}">⚠ ${stateRules.length} state rule${stateRules.length !== 1 ? 's' : ''} on entry</span>`;
          stateRulesIndicator.removeAttribute('hidden');
        } else {
          stateRulesIndicator.innerHTML = '';
          stateRulesIndicator.setAttribute('hidden', '');
        }
      }

      dataList.innerHTML = Object.entries(data)
        .map(([key, value]) => {
          const hasToast = dataFieldToasts.has(key);
          const detail = dataFieldToastDetails.get(key);
          const fieldRules = currentRuleDefinitions.filter((r) => r.scope === `field:${key}`);
          const hasFieldRule = fieldRules.length > 0;
          const ruleTooltip = hasFieldRule
            ? fieldRules.map((r) => `expr: ${r.expression}\nreason: ${r.reason}`).join('\n---\n').replace(/"/g, '&quot;')
            : '';
          const ruleIcon = hasFieldRule
            ? `<span class="data-rule-icon" title="${ruleTooltip}">⚠</span>`
            : '';

          return `
            <li>
              <span class="data-key">${key}${ruleIcon}</span>
              <span class="data-value-stack">
                ${hasToast && detail
                  ? `<span class="data-value-toast show">${detail.before} → ${detail.after}</span>`
                  : `<span class="muted">${formatValue(value)}</span>`}
              </span>
            </li>
          `;
        })
        .join('');
    }

    function renderAll() {
      syncSelectionToCurrentState();

      drawDiagram();
      renderEventBar();

      renderData();
    }

    document.addEventListener('keydown', (event) => {
      const target = event.target;
      const targetTag = target?.tagName;
      const isInput = targetTag === 'INPUT' || targetTag === 'TEXTAREA';

      if (isInput) {
        return;
      }

      const events = getOrderedCurrentEvents();
      if (events.length === 0) {
        return;
      }

      if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
        event.preventDefault();
        const currentEvent = getSelectedEventName();
        const currentIndex = events.indexOf(currentEvent);
        let nextIndex;

        if (currentIndex < 0) {
          nextIndex = event.key === 'ArrowDown' ? 0 : events.length - 1;
        } else {
          nextIndex = event.key === 'ArrowDown'
            ? (currentIndex + 1) % events.length
            : (currentIndex - 1 + events.length) % events.length;
        }

        const nextEvent = events[nextIndex];
        hoveredEventName = nextEvent;
        selectEvent(nextEvent);
        pendingFocusEventName = nextEvent;
        renderAll();
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();
        fireCurrentSelection();
      }
    });

    if (resetButton) {
      resetButton.addEventListener('click', () => {
        resetButton.classList.add('is-clicked');
        if (resetButtonFeedbackTimer) {
          window.clearTimeout(resetButtonFeedbackTimer);
        }

        resetButtonFeedbackTimer = window.setTimeout(() => {
          resetButton.classList.remove('is-clicked');
          resetButtonFeedbackTimer = null;
        }, 140);

        void resetSnapshot();
      });
    }

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (!message || typeof message !== 'object') {
        return;
      }

      if (message.type === 'previewResponse') {
        const resolver = previewPendingRequests.get(message.requestId);
        if (resolver) {
          previewPendingRequests.delete(message.requestId);
          resolver(message);
        }
        return;
      }

      if (message.type === 'snapshot') {
        if (typeof message.snapshotSequence === 'number') {
          if (message.snapshotSequence < latestSnapshotSequence) {
            return;
          }

          latestSnapshotSequence = message.snapshotSequence;
        }

        if (!message.success || !message.snapshot) {
          showRowFeedback('Snapshot', `✖ ${message.error || 'Snapshot failed'}`, 'err');
          renderAll();
          return;
        }

        applySnapshot(message.snapshot);
        renderAll();
        void refreshCurrentEventStatusesFromInspect();
      }
    });

    vscodeApi.postMessage({ type: 'ready' });
    void reloadSnapshot();

    renderAll();
  </script>
</body>
