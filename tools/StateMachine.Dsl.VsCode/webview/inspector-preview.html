<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State Diagram Inspector Mockup</title>
  <style>
    :root {
      color-scheme: dark;
      --feedback-ms: 2200ms;
      --bg: #1e1e1e;
      --panel: #252526;
      --meta: #59657A;
      --info: #FFFFFF;
      --success: #1FFF7A;
      --warning: #FFF12A;
      --error: #FF2A57;
      --state: #6D7F9B;
      --event: #8573A8;
      --preview-event: #1FFF7A;
      --preview-state: #7F92AF;
      --border: #59657A;
      --text: #FFFFFF;
      --muted: #59657A;
      --ok: #1FFF7A;
      --warn: #FFF12A;
      --err: #FF2A57;
      --accent: #8573A8;
      --node: #24262b;
      --edge: #1FFF7A;
      --edge-warn: #FFF12A;
      --edge-error: #FF2A57;
      --edge-muted: #6D7F9B;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      font: 13px/1.4 "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header,
    .layout {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .status {
      color: var(--state);
      font-weight: 600;
    }

    .muted { color: var(--muted); }

    .actions button {
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      padding: 4px 8px;
      cursor: pointer;
    }

    #reload-btn {
      border-radius: 999px;
      background: #242730;
      transition: border-color 120ms ease, background 120ms ease, transform 90ms ease, box-shadow 120ms ease;
    }

    #reload-btn:hover,
    #reload-btn:focus-visible {
      border-color: var(--event);
      box-shadow: 0 0 0 1px rgba(133, 115, 168, 0.26);
      outline: none;
    }

    #reload-btn:active,
    #reload-btn.is-clicked {
      border-color: var(--event);
      background: rgba(133, 115, 168, 0.22);
      transform: translateY(1px);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mode-select {
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #1f2125;
      color: var(--text);
      padding: 4px 8px;
      font: inherit;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0;
      padding: 12px;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 0;
    }

    .left-stack {
      min-width: 0;
      min-height: 0;
      display: grid;
      gap: 10px;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .diagram-canvas {
      grid-row: 1;
      min-height: 220px;
      overflow: hidden;
      background: transparent;
      border: none;
      border-radius: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(190px, 32%, 280px);
      grid-template-rows: minmax(0, 1fr);
      gap: 8px;
      padding: 0;
      align-items: stretch;
    }

    .diagram-scroll {
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      border: 1px solid #34363a;
      border-radius: 8px;
      background: #1d1f23;
      display: grid;
      place-items: stretch;
    }

    .events-pane {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .data-overlay {
      position: relative;
      width: 100%;
      max-width: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 0;
      align-self: stretch;
    }

    .data-overlay .section-label {
      margin: 0 0 6px;
    }

    .meta-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(31, 33, 37, 0.9);
      padding: 7px 8px;
      min-width: 0;
      min-height: 0;
    }

    .meta-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .meta-card .section-label {
      margin: 0;
    }

    .event-bar {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
      overflow: auto;
      max-height: clamp(120px, 30vh, 260px);
    }

    .event-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #242730;
      color: var(--text);
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 120px;
    }

    .event-btn:hover {
      border-color: var(--event);
    }

    .event-btn.active {
      border-color: var(--event);
      background: rgba(133, 115, 168, 0.22);
    }

    .event-btn.enabled {
      border-color: var(--ok);
      color: var(--ok);
      background: rgba(31, 255, 122, 0.14);
    }

    .event-btn.undefined {
      border-color: var(--err);
      color: var(--err);
      background: rgba(255, 42, 87, 0.12);
      opacity: 0.72;
      cursor: not-allowed;
    }

    .event-btn.blocked {
      border-color: var(--err);
      color: var(--err);
      background: rgba(255, 42, 87, 0.12);
    }

    .event-entry {
      display: grid;
      grid-template-columns: 160px 1fr;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .event-reason {
      grid-column: 1 / -1;
      color: var(--err);
      font-size: 11px;
      line-height: 1.25;
      margin-top: -1px;
      opacity: 0.7;
      transition: opacity 120ms ease;
    }

    .event-entry.is-selected .event-reason,
    .event-entry:hover .event-reason {
      opacity: 0.98;
    }

    .event-result-chip {
      justify-self: start;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 10px;
      line-height: 1;
      padding: 3px 8px;
      opacity: 0;
      transform: translateY(2px);
      transition: opacity 130ms ease, transform 130ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .event-result-chip.show {
      opacity: 0.98;
      transform: translateY(0);
    }

    .event-result-chip.ok {
      border-color: var(--ok);
      color: var(--ok);
      background: rgba(31, 255, 122, 0.12);
    }

    .event-result-chip.err {
      border-color: var(--err);
      color: var(--err);
      background: rgba(255, 42, 87, 0.12);
    }

    .event-label {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      opacity: 0.86;
      transition: opacity 120ms ease;
    }

    .event-entry.is-selected .event-label,
    .event-entry:hover .event-label {
      opacity: 1;
    }

    .event-glyph {
      font-size: 11px;
      font-weight: 700;
      min-width: 10px;
      text-align: center;
    }

    .event-args-inline {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .event-args-inline input {
      width: 120px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #1f2125;
      color: var(--text);
      padding: 3px 10px;
      font: inherit;
      font-size: 11px;
      outline: none;
    }

    .section-label {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    #diagram-container {
      width: 100%;
      min-width: 0;
      height: clamp(340px, 62vh, 620px);
      display: block;
      overflow: auto;
    }

    #diagram-container svg {
      width: 100%;
      height: auto;
    }

    /* --- Active-state highlight (current state node) --- */
    #diagram-container .active-state rect.basic,
    #diagram-container .active-state > rect {
      stroke: var(--ok) !important;
      stroke-width: 2.5px !important;
      filter: drop-shadow(0 0 6px var(--ok));
    }

    #diagram-container .active-state .nodeLabel {
      font-weight: 700 !important;
      color: var(--ok) !important;
    }

    /* --- Highlighted edge (matching transition path + label) --- */
    #diagram-container .highlighted-edge path {
      stroke: var(--event) !important;
      stroke-width: 2.2px !important;
      filter: drop-shadow(0 0 3px var(--event));
    }

    #diagram-container .highlighted-edge text {
      fill: var(--event) !important;
      font-weight: 600 !important;
    }

    #diagram-container .highlighted-edge .edgeLabel,
    #diagram-container .highlighted-edge .nodeLabel {
      color: var(--event) !important;
      font-weight: 600 !important;
    }

    #diagram-container .highlighted-edge marker path {
      fill: var(--event) !important;
    }

    /* --- Destination state (dashed purple border) --- */
    #diagram-container .destination-state rect.basic,
    #diagram-container .destination-state > rect {
      stroke: var(--event) !important;
      stroke-width: 2px !important;
      stroke-dasharray: 6 3;
    }

    /* --- Muted edges (non-matching transitions) --- */
    #diagram-container .muted-edge path,
    #diagram-container .muted-edge text,
    #diagram-container .muted-edge .edgeLabel,
    #diagram-container .muted-edge foreignObject {
      opacity: 0.25 !important;
    }

    .data-list {
      margin: 0 0 12px;
      padding: 0;
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #1f2125;
      max-height: 180px;
      overflow: auto;
    }

    .data-overlay .data-list {
      margin: 0;
      max-height: clamp(84px, 20vh, 170px);
      background: rgba(20, 21, 26, 0.85);
      flex: 1 1 auto;
    }

    .data-list li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px;
      border-bottom: 1px solid #3a3a3a;
      font-size: 12px;
    }

    .data-key {
      display: inline-flex;
      align-items: center;
      gap: 0;
      min-width: 0;
    }

    .data-value-stack {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
    }

    .data-list li:last-child {
      border-bottom: none;
    }

    .data-value-toast {
      color: var(--ok);
      font-weight: 600;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 130ms ease, transform 130ms ease;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
      line-height: 1.2;
      font-size: 11px;
      pointer-events: none;
    }

    .data-value-toast.show {
      opacity: 0.98;
      transform: translateY(0);
    }

    .diagram-edge {
      cursor: default;
      transition: opacity 120ms ease, stroke-width 120ms ease;
    }

    .edge-annotation {
      user-select: none;
    }

    .edge-annotation.clickable {
      pointer-events: none;
      cursor: default;
    }

    .edge-chip {
      font-size: 11px;
    }

    .edge-annotation.clickable:hover .edge-chip {
      stroke-width: 1.6;
      filter: drop-shadow(0 0 2px rgba(133,115,168,.45));
    }

    .edge-label {
      font-size: 10px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
    }

    .edge-guard {
      font-size: 9px;
      text-anchor: middle;
      dominant-baseline: central;
    }


    @media (max-width: 1180px) {
      .diagram-canvas {
        grid-template-columns: minmax(0, 1fr) clamp(176px, 30%, 260px);
      }

      .event-entry {
        grid-template-columns: 146px 1fr;
      }

      .event-args-inline {
        flex-wrap: wrap;
        overflow: visible;
      }
    }

    @media (max-width: 900px) {
      .diagram-canvas {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
      }

      .data-overlay {
        width: 100%;
      }

      .event-bar {
        max-height: clamp(112px, 26vh, 220px);
      }
    }

    @media (max-height: 860px) {
      .data-list {
        max-height: 140px;
      }

      .diagram-canvas {
        min-height: 200px;
      }

      #diagram-container {
        height: clamp(250px, 46vh, 360px);
      }

      .data-overlay .data-list {
        max-height: clamp(78px, 20vh, 124px);
      }

      .event-bar {
        max-height: clamp(104px, 24vh, 192px);
      }
    }

    @media (max-height: 740px) {
      body {
        font-size: 12px;
      }

      .header {
        padding: 8px 10px;
        margin-bottom: 8px;
      }

      .layout {
        gap: 8px;
        padding: 8px;
      }

      .event-btn {
        padding: 3px 9px;
        font-size: 11px;
      }

      .event-result-chip {
        font-size: 9px;
      }

      .diagram-canvas {
        min-height: 170px;
      }

      #diagram-container {
        height: 200px;
      }

      .data-overlay .data-list {
        max-height: 82px;
      }

      .event-bar {
        max-height: clamp(96px, 22vh, 164px);
      }
    }

    @media (max-height: 660px) {
      .diagram-canvas {
        min-height: 150px;
      }

      #diagram-container {
        height: 170px;
      }

      .data-overlay {
        padding: 6px 7px;
      }

      .data-overlay .data-list {
        max-height: 68px;
      }

      .event-bar {
        max-height: clamp(88px, 20vh, 136px);
      }
    }

  </style>
  <script src="__MERMAID_URI__"></script>
</head>
<body>
  <div class="header">
    <div>
      <strong>State Diagram Inspector</strong>
      <span class="muted"> · trafficlight.sm</span>
      <span id="header-state" class="status"> · Current: Red</span>
    </div>
    <div class="actions">
      <button id="reload-btn" type="button">Reload</button>
    </div>
  </div>

  <div class="layout">
    <div class="left-stack">
      <div class="diagram-canvas">
        <div class="diagram-scroll" aria-label="diagram scroll area">
          <div id="diagram-container" aria-label="state diagram" style="width:100%;min-height:340px;"></div>
        </div>
        <div class="data-overlay" aria-label="data overlay">
          <ul id="data-list" class="data-list"></ul>
        </div>
      </div>
      <div class="meta-card events-pane" aria-label="event dock">
        <div id="event-bar" class="event-bar"></div>
      </div>
    </div>
  </div>

  <script>
    let stateOrder = ['Red', 'Green', 'Yellow', 'FlashingGreen', 'FlashingRed'];
    let mermaidText = '';
    let transitions = [
      { from: 'Red', event: 'Advance', to: 'FlashingGreen' },
      { from: 'Red', event: 'Advance', to: 'Green' },
      { from: 'FlashingGreen', event: 'Advance', to: 'Green' },
      { from: 'Green', event: 'Advance', to: 'Yellow' },
      { from: 'Yellow', event: 'Advance', to: 'Red' },
      { from: 'FlashingRed', event: 'ClearEmergency', to: 'Red' },
      { from: 'Red', event: 'Emergency', to: 'FlashingRed' },
      { from: 'FlashingGreen', event: 'Emergency', to: 'FlashingRed' },
      { from: 'Green', event: 'Emergency', to: 'FlashingRed' },
      { from: 'Yellow', event: 'Emergency', to: 'FlashingRed' },
      { from: 'FlashingRed', event: 'Emergency', to: 'FlashingRed' }
    ];
    let eventDefinitionOrder = ['Advance', 'Emergency', 'ClearEmergency'];
    const FEEDBACK_DURATION_MS = 2200;

    let initialState = 'Red';
    let initialData = {
      CycleCount: 0,
      VehiclesWaiting: 0,
      LeftTurnQueued: true,
      EmergencyReason: null
    };
    let currentState = initialState;
    const data = {
      ...initialData
    };
    const mockEmergencyArgs = {
      AuthorizedBy: '',
      Reason: ''
    };

    const diagramContainer = document.getElementById('diagram-container');
    const headerState = document.getElementById('header-state');
    const dataList = document.getElementById('data-list');
    const eventBar = document.getElementById('event-bar');
    const reloadButton = document.getElementById('reload-btn');
    let selectedTransitionIndex = transitions.findIndex((t) => t.from === 'Red' && t.event === 'Advance' && t.to === 'FlashingGreen');
    let hoveredEventName = null;
    let rowFeedbackTimer = null;
    let rowFeedback = null;
    let dataFieldToastTimer = null;
    let stateChangeAnimationFrame = null;
    let pendingFocusEventName = null;
    let dataFieldToasts = new Set();
    let dataFieldToastDetails = new Map();
    let stateChangeAnimation = null;
    let suppressHoverUntilAnimationComplete = false;
    let reloadButtonFeedbackTimer = null;
    let currentEventStatuses = [];

    const vscodeApi = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;
    let previewRequestId = 1;
    const previewPendingRequests = new Map();
    let latestSnapshotSequence = 0;

    function toHostEventStatus(raw) {
      if (!raw || typeof raw !== 'object') {
        return null;
      }

      return {
        name: String(raw.name ?? raw.Name ?? ''),
        outcome: String(raw.outcome ?? raw.Outcome ?? 'undefined').toLowerCase(),
        targetState: raw.targetState ?? raw.TargetState ?? null,
        reasons: Array.isArray(raw.reasons ?? raw.Reasons)
          ? (raw.reasons ?? raw.Reasons).map((reason) => String(reason))
          : []
      };
    }

    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    function applySnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== 'object') {
        return;
      }

      const snapshotStates = snapshot.states ?? snapshot.States;
      const snapshotTransitions = snapshot.transitions ?? snapshot.Transitions;
      const snapshotEvents = snapshot.events ?? snapshot.Events;
      const snapshotData = snapshot.data ?? snapshot.Data;
      const snapshotCurrentState = snapshot.currentState ?? snapshot.CurrentState;

      transitions = Array.isArray(snapshotTransitions)
        ? snapshotTransitions.map((transition) => ({
          from: String(transition.from ?? transition.From ?? ''),
          event: String(transition.event ?? transition.Event ?? ''),
          to: String(transition.to ?? transition.To ?? '')
        }))
        : [];

      if (Array.isArray(snapshotStates) && snapshotStates.length > 0) {
        stateOrder = snapshotStates.map((value) => String(value));
      }

      mermaidText = snapshot.mermaidText ?? snapshot.MermaidText ?? '';

      eventDefinitionOrder = Array.from(new Set(
        (Array.isArray(snapshotEvents) ? snapshotEvents : [])
          .map((eventStatus) => String(eventStatus.name ?? eventStatus.Name ?? ''))
          .filter((name) => name.length > 0)
      ));

      const incomingData = (snapshotData && typeof snapshotData === 'object') ? snapshotData : {};
      initialData = { ...incomingData };

      Object.keys(data).forEach((key) => {
        delete data[key];
      });
      Object.entries(incomingData).forEach(([key, value]) => {
        data[key] = value;
      });

      initialState = snapshotCurrentState ? String(snapshotCurrentState) : (stateOrder[0] ?? 'State');
      currentState = initialState;

      currentEventStatuses = (Array.isArray(snapshotEvents) ? snapshotEvents : [])
        .map(toHostEventStatus)
        .filter((status) => status !== null);

      selectedTransitionIndex = transitions.findIndex((transition) => transition.from === currentState);
      if (selectedTransitionIndex < 0) {
        selectedTransitionIndex = 0;
      }
    }

    function sendHostRequest(action, payload = {}) {
      if (!vscodeApi) {
        return Promise.resolve({ success: false, error: 'VS Code bridge unavailable.' });
      }

      const requestId = previewRequestId++;
      return new Promise((resolve) => {
        previewPendingRequests.set(requestId, resolve);
        vscodeApi.postMessage({
          type: 'previewRequest',
          requestId,
          action,
          ...payload
        });
      });
    }

    function snapshotData() {
      return {
        CycleCount: data.CycleCount,
        VehiclesWaiting: data.VehiclesWaiting,
        LeftTurnQueued: data.LeftTurnQueued,
        EmergencyReason: data.EmergencyReason
      };
    }

    function getChangedDataKeys(beforeSnapshot, afterSnapshot) {
      return Object.keys(afterSnapshot).filter((key) => !Object.is(beforeSnapshot[key], afterSnapshot[key]));
    }

    function showDataFieldToasts(changedKeys, beforeSnapshot, afterSnapshot) {
      dataFieldToasts = new Set(changedKeys);
      dataFieldToastDetails = new Map(
        changedKeys.map((key) => [
          key,
          {
            before: formatValue(beforeSnapshot[key]),
            after: formatValue(afterSnapshot[key])
          }
        ])
      );

      if (dataFieldToastTimer) {
        window.clearTimeout(dataFieldToastTimer);
      }

      if (dataFieldToasts.size === 0) {
        dataFieldToastDetails.clear();
        return;
      }

      dataFieldToastTimer = window.setTimeout(() => {
        dataFieldToasts.clear();
        dataFieldToastDetails.clear();
        renderData();
      }, FEEDBACK_DURATION_MS);
    }

    function resetDataToInitial() {
      Object.keys(data).forEach((key) => {
        delete data[key];
      });

      Object.entries(initialData).forEach(([key, value]) => {
        data[key] = value;
      });
    }

    async function reloadMockup() {
      if (vscodeApi) {
        let response = await sendHostRequest('snapshot');
        if ((!response.success || !response.snapshot) && vscodeApi) {
          await new Promise((resolve) => window.setTimeout(resolve, 250));
          response = await sendHostRequest('snapshot');
        }

        if (response.success && response.snapshot) {
          applySnapshot(response.snapshot);
          hoveredEventName = null;
          pendingFocusEventName = null;
          rowFeedback = null;
          stateChangeAnimation = null;
          suppressHoverUntilAnimationComplete = false;
          renderAll();
        } else {
          showRowFeedback('Reload', `✖ ${response.error || 'Snapshot failed'}`, 'err');
        }

        return;
      }

      currentState = initialState;
      hoveredEventName = null;
      pendingFocusEventName = null;
      rowFeedback = null;
      stateChangeAnimation = null;
      suppressHoverUntilAnimationComplete = false;
      resetDataToInitial();

      mockEmergencyArgs.AuthorizedBy = '';
      mockEmergencyArgs.Reason = '';

      dataFieldToasts.clear();
      dataFieldToastDetails.clear();

      if (rowFeedbackTimer) {
        window.clearTimeout(rowFeedbackTimer);
        rowFeedbackTimer = null;
      }

      if (dataFieldToastTimer) {
        window.clearTimeout(dataFieldToastTimer);
        dataFieldToastTimer = null;
      }

      if (stateChangeAnimationFrame !== null) {
        window.cancelAnimationFrame(stateChangeAnimationFrame);
        stateChangeAnimationFrame = null;
      }

      renderAll();
    }

    function stepStateChangeAnimation(timestamp) {
      if (!stateChangeAnimation) {
        stateChangeAnimationFrame = null;
        return;
      }

      const elapsed = Math.max(0, timestamp - stateChangeAnimation.startedAt);
      const progress = Math.min(1, elapsed / stateChangeAnimation.duration);
      stateChangeAnimation.progress = progress;

      if (progress < 1) {
        stateChangeAnimationFrame = window.requestAnimationFrame(stepStateChangeAnimation);
        return;
      }

      stateChangeAnimation = null;
      suppressHoverUntilAnimationComplete = false;
      stateChangeAnimationFrame = null;
      updateDiagramHighlights();
    }

    function triggerStateChangeAnimation(fromState, toState, eventName, fromDataSnapshot = null, fromArgsSnapshot = null) {
      suppressHoverUntilAnimationComplete = true;
      hoveredEventName = null;
      pendingFocusEventName = null;

      if (stateChangeAnimationFrame !== null) {
        window.cancelAnimationFrame(stateChangeAnimationFrame);
        stateChangeAnimationFrame = null;
      }

      stateChangeAnimation = {
        from: fromState,
        to: toState,
        eventName,
        fromDataSnapshot: fromDataSnapshot ?? snapshotData(),
        fromArgsSnapshot: fromArgsSnapshot ?? {
          AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
          Reason: mockEmergencyArgs.Reason
        },
        startedAt: performance.now(),
        duration: FEEDBACK_DURATION_MS,
        progress: 0
      };

      stateChangeAnimationFrame = window.requestAnimationFrame(stepStateChangeAnimation);
    }

    function getSelectedTransition() {
      const selectedEventName = getSelectedEventName();
      if (!selectedEventName) {
        return null;
      }

      const preferredIndex = getPreferredTransitionIndex(currentState, selectedEventName);
      if (preferredIndex < 0 || preferredIndex >= transitions.length) {
        return null;
      }

      return transitions[preferredIndex];
    }

    function getSelectedEventName() {
      if (suppressHoverUntilAnimationComplete) {
        return null;
      }

      return hoveredEventName;
    }

    function getStateIndex(stateName) {
      return stateOrder.indexOf(stateName);
    }

    function getFamilyTransitions(fromState, eventName) {
      return transitions
        .filter((transition) => transition.from === fromState && transition.event === eventName)
        .sort((left, right) => getStateIndex(left.to) - getStateIndex(right.to));
    }

    function getUniqueOutgoingEvents(state) {
      return Array.from(new Set(
        transitions
          .filter((transition) => transition.from === state)
          .map((transition) => transition.event)
      ));
    }

    function getOrderedCurrentEvents() {
      return getUniqueOutgoingEvents(currentState)
        .sort((left, right) => {
          const leftOrder = eventDefinitionOrder.indexOf(left);
          const rightOrder = eventDefinitionOrder.indexOf(right);
          const leftRank = leftOrder >= 0 ? leftOrder : Number.MAX_SAFE_INTEGER;
          const rightRank = rightOrder >= 0 ? rightOrder : Number.MAX_SAFE_INTEGER;
          return leftRank - rightRank || left.localeCompare(right);
        });
    }

    function getPreferredTransitionIndex(state, eventName) {
      const familyIndexes = transitions
        .map((transition, index) => ({ transition, index }))
        .filter((entry) => entry.transition.from === state && entry.transition.event === eventName)
        .map((entry) => entry.index);

      if (familyIndexes.length === 0) {
        return -1;
      }

      const evaluation = evaluateEvent(state, eventName);
      if (evaluation.kind === 'enabled' && evaluation.to) {
        const matched = familyIndexes.find((index) => transitions[index].to === evaluation.to);
        if (typeof matched === 'number') {
          return matched;
        }
      }

      return familyIndexes[0];
    }

    function syncSelectionToCurrentState() {
      const selectedTransition = getSelectedTransition();
      if (selectedTransition && selectedTransition.from === currentState) {
        return;
      }

      const preferredBySameEvent = selectedTransition
        ? getPreferredTransitionIndex(currentState, selectedTransition.event)
        : -1;
      if (preferredBySameEvent >= 0) {
        selectedTransitionIndex = preferredBySameEvent;
        return;
      }

      const outgoingEvents = getUniqueOutgoingEvents(currentState);
      for (const eventName of outgoingEvents) {
        const evaluation = evaluateEvent(currentState, eventName);
        if (evaluation.kind === 'undefined') {
          continue;
        }

        const preferred = getPreferredTransitionIndex(currentState, eventName);
        if (preferred >= 0) {
          selectedTransitionIndex = preferred;
          return;
        }
      }

      const firstFromState = transitions.findIndex((transition) => transition.from === currentState);
      if (firstFromState >= 0) {
        selectedTransitionIndex = firstFromState;
      }
    }

    function selectEvent(eventName) {
      const preferred = getPreferredTransitionIndex(currentState, eventName);
      if (preferred >= 0) {
        selectedTransitionIndex = preferred;
      }
    }

    function evaluateEventWithContext(state, eventName, dataContext, argsContext) {
      if (vscodeApi && state === currentState) {
        const liveStatus = currentEventStatuses.find((status) => status.name === eventName);
        if (liveStatus) {
          const reason = liveStatus.reasons.length > 0 ? liveStatus.reasons[0] : undefined;
          if (liveStatus.outcome === 'enabled') {
            return {
              kind: 'enabled',
              to: liveStatus.targetState ? String(liveStatus.targetState) : null,
              meta: liveStatus.targetState ? `runtime target: ${liveStatus.targetState}` : 'runtime enabled'
            };
          }

          if (liveStatus.outcome === 'blocked') {
            return {
              kind: 'blocked',
              reason: reason ?? 'blocked',
              meta: 'runtime blocked'
            };
          }

          return {
            kind: 'undefined',
            reason: reason ?? `no transition from ${state}`,
            meta: 'runtime undefined'
          };
        }
      }

      if (!eventName) {
        return { kind: 'undefined', reason: 'select an event' };
      }

      if (eventName === 'Advance') {
        if (state === 'Red') {
          if (dataContext.LeftTurnQueued) {
            return {
              kind: 'enabled',
              to: 'FlashingGreen',
              meta: 'if LeftTurnQueued (alternate: Green when VehiclesWaiting > 0)'
            };
          }

          if (dataContext.VehiclesWaiting > 0) {
            return {
              kind: 'enabled',
              to: 'Green',
              meta: 'if VehiclesWaiting > 0'
            };
          }

          return {
            kind: 'blocked',
            reason: 'No demand detected at red',
            meta: 'else reject'
          };
        }

        if (state === 'FlashingGreen') {
          return { kind: 'enabled', to: 'Green', meta: 'protected left-turn rejoins cycle' };
        }

        if (state === 'Green') {
          return { kind: 'enabled', to: 'Yellow', meta: 'standard cycle' };
        }

        if (state === 'Yellow') {
          return { kind: 'enabled', to: 'Red', meta: 'standard cycle' };
        }

        if (state === 'FlashingRed') {
          return { kind: 'undefined', reason: 'no transition from FlashingRed' };
        }
      }

      if (eventName === 'Emergency') {
        const authorizedBy = String(argsContext.AuthorizedBy ?? '').trim();
        const reason = String(argsContext.Reason ?? '').trim();
        const hasArgs = authorizedBy !== '' && reason !== '';
        if (!hasArgs) {
          return {
            kind: 'blocked',
            reason: 'AuthorizedBy and Reason are required to activate emergency mode',
            meta: 'requires event args'
          };
        }

        return {
          kind: 'enabled',
          to: 'FlashingRed',
          meta: `any -> FlashingRed as ${authorizedBy}`
        };
      }

      if (eventName === 'ClearEmergency') {
        if (state === 'FlashingRed') {
          return { kind: 'enabled', to: 'Red', meta: 'resume normal cycle' };
        }

        return { kind: 'undefined', reason: `no transition from ${state}` };
      }

      return { kind: 'undefined', reason: `unknown event ${eventName}` };
    }

    function evaluateEvent(state, eventName) {
      return evaluateEventWithContext(state, eventName, data, mockEmergencyArgs);
    }

    function applyTransition(from, eventName, to) {
      if (eventName === 'Advance') {
        if (from === 'Red' && to === 'FlashingGreen') {
          data.LeftTurnQueued = false;
          data.CycleCount += 1;
        } else if (from === 'Red' && to === 'Green') {
          data.CycleCount += 1;
        } else if (from === 'FlashingGreen' || from === 'Green' || from === 'Yellow') {
          data.CycleCount += 1;
        }
      }

      if (eventName === 'Emergency') {
        data.EmergencyReason = `${mockEmergencyArgs.AuthorizedBy.trim()}: ${mockEmergencyArgs.Reason.trim()}`;
      }

      if (eventName === 'ClearEmergency') {
        data.EmergencyReason = null;
      }
    }

    function applyEventButtonState(button, eventName) {
      const evaluation = evaluateEvent(currentState, eventName);
      button.classList.remove('enabled', 'blocked', 'undefined');
      const glyph = button.querySelector('.event-glyph');
      button.removeAttribute('title');

      if (evaluation.kind === 'enabled') {
        button.classList.add('enabled');
        if (glyph) {
          glyph.textContent = '✔';
        }
      } else if (evaluation.kind === 'blocked') {
        button.classList.add('blocked');
        if (glyph) {
          glyph.textContent = '✖';
        }
      } else if (evaluation.kind === 'undefined') {
        button.classList.add('undefined');
        if (glyph) {
          glyph.textContent = '∅';
        }
      }
    }

    function getEvaluationReason(evaluation) {
      if (evaluation.kind !== 'blocked' && evaluation.kind !== 'undefined') {
        return '';
      }

      if (evaluation.reason && evaluation.reason.trim().length > 0) {
        return evaluation.reason;
      }

      return evaluation.kind === 'blocked'
        ? 'Blocked by guard or reject condition.'
        : 'No transition is available from the current state.';
    }

    function applyEventReasonState(eventEntry, evaluation) {
      if (!eventEntry) {
        return;
      }

      const reasonText = getEvaluationReason(evaluation);
      let reasonEl = eventEntry.querySelector('.event-reason');

      if (!reasonText) {
        if (reasonEl) {
          reasonEl.remove();
        }
        return;
      }

      if (!reasonEl) {
        reasonEl = document.createElement('div');
        reasonEl.className = 'event-reason';
        eventEntry.appendChild(reasonEl);
      }

      reasonEl.textContent = reasonText;
    }

    function showRowFeedback(eventName, message, tone) {
      rowFeedback = {
        eventName,
        message,
        tone: tone === 'ok' ? 'ok' : 'err'
      };

      if (rowFeedbackTimer) {
        window.clearTimeout(rowFeedbackTimer);
      }

      rowFeedbackTimer = window.setTimeout(() => {
        rowFeedback = null;
        renderEventBar();
      }, FEEDBACK_DURATION_MS);

      renderEventBar();
    }

    let lastRenderedMermaidText = '';

    async function drawDiagram() {
      if (!mermaidText) {
        diagramContainer.innerHTML = '<p style="color:var(--muted)">No diagram data.</p>';
        lastRenderedMermaidText = '';
        return;
      }

      if (mermaidText === lastRenderedMermaidText && diagramContainer.querySelector('svg')) {
        updateDiagramHighlights();
        return;
      }

      const id = 'mermaid-diagram-' + Date.now();
      try {
        const { svg } = await mermaid.render(id, mermaidText);
        diagramContainer.innerHTML = svg;
        lastRenderedMermaidText = mermaidText;
        updateDiagramHighlights();
      } catch (err) {
        diagramContainer.innerHTML = `<pre style="color:var(--err)">${String(err.message ?? err)}</pre>`;
      }
    }

    function updateDiagramHighlights() {
      const svgEl = diagramContainer.querySelector('svg');
      if (!svgEl) {
        return;
      }

      // Build a map of label text → node element
      // Mermaid v2 state nodes: <g class="node statediagram-state"> with <span class="nodeLabel">
      const nodesByLabel = new Map();
      svgEl.querySelectorAll('g.node').forEach((node) => {
        const label = node.querySelector('.nodeLabel');
        if (label) {
          nodesByLabel.set(label.textContent.trim(), node);
        }
      });

      // Clear all highlight classes
      svgEl.querySelectorAll('.active-state').forEach((el) => el.classList.remove('active-state'));
      svgEl.querySelectorAll('.destination-state').forEach((el) => el.classList.remove('destination-state'));
      svgEl.querySelectorAll('.highlighted-edge').forEach((el) => el.classList.remove('highlighted-edge'));
      svgEl.querySelectorAll('.muted-edge').forEach((el) => el.classList.remove('muted-edge'));

      // Highlight current state
      if (currentState && nodesByLabel.has(currentState)) {
        nodesByLabel.get(currentState).classList.add('active-state');
      }

      // Determine the hovered/selected event name
      const selectedEvent = getSelectedEventName();
      if (!selectedEvent) {
        return;
      }

      // Find destination states for this event from the current state
      const destinationStates = new Set(
        transitions
          .filter((t) => t.from === currentState && t.event === selectedEvent)
          .map((t) => t.to)
      );

      // Highlight destination state nodes
      for (const dest of destinationStates) {
        if (dest !== currentState && nodesByLabel.has(dest)) {
          nodesByLabel.get(dest).classList.add('destination-state');
        }
      }

      // Edge paths and edge labels are in SEPARATE containers in Mermaid:
      //   <g class="edgePaths"> → <g class="transition"> (path lines)
      //   <g class="edgeLabels"> → <g class="edgeLabel"> (label text)
      // They correspond 1:1 by child index.
      const edgePathsContainer = svgEl.querySelector('g.edgePaths');
      const edgeLabelsContainer = svgEl.querySelector('g.edgeLabels');
      if (!edgePathsContainer || !edgeLabelsContainer) {
        return;
      }

      const transitionEls = Array.from(edgePathsContainer.children);
      const labelEls = Array.from(edgeLabelsContainer.children);
      const edgeCount = Math.min(transitionEls.length, labelEls.length);

      for (let i = 0; i < edgeCount; i++) {
        const labelEl = labelEls[i];
        const transitionEl = transitionEls[i];
        const labelText = (labelEl.textContent || '').trim();

        // An edge label may be "Event1 / Event2" (deduped), check if selectedEvent is one of them
        const labelEvents = labelText.split(/\s*\/\s*/).map((s) => s.trim());

        if (labelEvents.includes(selectedEvent)) {
          transitionEl.classList.add('highlighted-edge');
          labelEl.classList.add('highlighted-edge');
        } else if (labelText) {
          transitionEl.classList.add('muted-edge');
          labelEl.classList.add('muted-edge');
        }
      }
    }

    function renderEventBar() {
      const selectedEventName = getSelectedEventName();
      const events = getOrderedCurrentEvents();

      if (events.length === 0) {
        eventBar.innerHTML = '<span class="muted">No events available from current state.</span>';
        return;
      }

      eventBar.innerHTML = events
        .map((eventName) => {
          const evaluation = evaluateEvent(currentState, eventName);
          const family = getFamilyTransitions(currentState, eventName);
          const activeClass = eventName === selectedEventName ? ' active' : '';
          const stateClass = evaluation.kind === 'enabled'
            ? ' enabled'
            : evaluation.kind === 'blocked'
            ? ' blocked'
            : evaluation.kind === 'undefined'
              ? ' undefined'
              : '';
          const glyph = evaluation.kind === 'enabled'
            ? '✔'
            : evaluation.kind === 'blocked'
              ? '✖'
              : '∅';
          const inlineArgs = eventName === 'Emergency'
            ? `<span class="event-args-inline"><input data-event-arg="AuthorizedBy" type="text" placeholder="AuthorizedBy" value="${mockEmergencyArgs.AuthorizedBy.replace(/"/g, '&quot;')}"><input data-event-arg="Reason" type="text" placeholder="Reason" value="${mockEmergencyArgs.Reason.replace(/"/g, '&quot;')}"></span>`
            : '';
          const reasonText = getEvaluationReason(evaluation);
          const escapedReason = reasonText
            ? reasonText
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
            : '';
          const inlineReason = reasonText
            ? `<div class="event-reason">${escapedReason}</div>`
            : '';
          const inlineResult = rowFeedback && rowFeedback.eventName === eventName
            ? `<span class="event-result-chip ${rowFeedback.tone} show">${rowFeedback.message.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>`
            : '';

          const selectedEntryClass = eventName === selectedEventName ? ' is-selected' : '';

          return `<span class="event-entry${selectedEntryClass}"><button class="event-btn${activeClass}${stateClass}" data-event="${eventName}" type="button"><span class="event-label">${eventName}</span><span class="event-glyph">${glyph}</span></button>${inlineArgs}${inlineResult}${inlineReason}</span>`;
        })
        .join('');

      eventBar.querySelectorAll('.event-btn').forEach((button) => {
        const eventName = button.dataset.event;
        applyEventButtonState(button, eventName);

        button.addEventListener('mouseenter', () => {
          if (suppressHoverUntilAnimationComplete) {
            return;
          }

          hoveredEventName = eventName;
          updateDiagramHighlights();
        });

        button.addEventListener('mouseleave', () => {
          hoveredEventName = null;
          updateDiagramHighlights();
        });

        button.addEventListener('click', () => {
          selectEvent(eventName);

          const evaluation = evaluateEvent(currentState, eventName);
          if (evaluation.kind === 'undefined') {
            renderAll();
            return;
          }

          fireCurrentSelection(eventName);
        });
      });

      eventBar.querySelectorAll('input[data-event-arg]').forEach((input) => {
        input.addEventListener('mouseenter', (event) => {
          event.stopPropagation();
        });

        input.addEventListener('focus', () => {
          if (suppressHoverUntilAnimationComplete) {
            return;
          }

          hoveredEventName = 'Emergency';
          updateDiagramHighlights();
        });

        input.addEventListener('click', (event) => {
          event.stopPropagation();
        });

        input.addEventListener('blur', () => {
          const emergencyButton = eventBar.querySelector('button[data-event="Emergency"]');
          const emergencyEntry = emergencyButton?.closest('.event-entry');
          const activeElement = document.activeElement;
          if (!emergencyEntry || !activeElement || !emergencyEntry.contains(activeElement)) {
            hoveredEventName = null;
            updateDiagramHighlights();
          }
        });

        input.addEventListener('input', () => {
          const argName = input.dataset.eventArg;
          if (argName === 'AuthorizedBy') {
            mockEmergencyArgs.AuthorizedBy = input.value;
          } else if (argName === 'Reason') {
            mockEmergencyArgs.Reason = input.value;
          }

          const emergencyButton = eventBar.querySelector('button[data-event="Emergency"]');
          if (emergencyButton) {
            applyEventButtonState(emergencyButton, 'Emergency');
            const emergencyEvaluation = evaluateEvent(currentState, 'Emergency');
            const emergencyEntry = emergencyButton.closest('.event-entry');
            applyEventReasonState(emergencyEntry, emergencyEvaluation);
          }

          updateDiagramHighlights();
        });
      });

      if (pendingFocusEventName) {
        const focusTarget = eventBar.querySelector(`button[data-event="${pendingFocusEventName}"]`);
        if (focusTarget) {
          focusTarget.focus();
        }

        pendingFocusEventName = null;
      }
    }

    async function fireCurrentSelection(explicitEventName = null) {
      const eventName = explicitEventName ?? getSelectedEventName();
      if (!eventName) {
        return;
      }

      if (vscodeApi) {
        const beforeState = currentState;
        const beforeData = snapshotData();
        const beforeArgs = {
          AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
          Reason: mockEmergencyArgs.Reason
        };

        const args = eventName === 'Emergency'
          ? {
            AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
            Reason: mockEmergencyArgs.Reason
          }
          : undefined;

        const response = await sendHostRequest('fire', { eventName, args });
        if (!response.success || !response.snapshot) {
          showRowFeedback(eventName, `✖ ${response.error || `Event '${eventName}' did not fire.`}`, 'err');
          renderAll();
          return;
        }

        applySnapshot(response.snapshot);
        const afterData = snapshotData();
        const changedKeys = getChangedDataKeys(beforeData, afterData);
        showDataFieldToasts(changedKeys, beforeData, afterData);
        triggerStateChangeAnimation(beforeState, currentState, eventName, beforeData, beforeArgs);
        hoveredEventName = null;
        mockEmergencyArgs.AuthorizedBy = '';
        mockEmergencyArgs.Reason = '';
        showRowFeedback(eventName, `✔ ${beforeState} → ${currentState}`, 'ok');
        renderAll();
        return;
      }

      const evaluation = evaluateEvent(currentState, eventName);
      const failureReason = evaluation.reason && evaluation.reason.trim().length > 0
        ? evaluation.reason
        : evaluation.kind === 'blocked'
          ? 'Blocked by guard or reject condition.'
          : 'No transition is available from the current state.';

      if (evaluation.kind === 'undefined') {
        showRowFeedback(eventName, `∅ ${failureReason}`, 'err');
        return;
      }

      if (evaluation.kind === 'blocked') {
        showRowFeedback(eventName, `✖ ${failureReason}`, 'err');

        renderAll();
        return;
      }

      if (evaluation.kind !== 'enabled' || !evaluation.to) {
        return;
      }

      const from = currentState;
      const beforeData = snapshotData();
      const beforeArgs = {
        AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
        Reason: mockEmergencyArgs.Reason
      };
      currentState = evaluation.to;
      applyTransition(from, eventName, currentState);
      triggerStateChangeAnimation(from, currentState, eventName, beforeData, beforeArgs);
      const afterData = snapshotData();
      const changedKeys = getChangedDataKeys(beforeData, afterData);
      showDataFieldToasts(changedKeys, beforeData, afterData);
      hoveredEventName = null;
      mockEmergencyArgs.AuthorizedBy = '';
      mockEmergencyArgs.Reason = '';
      showRowFeedback(eventName, `✔ ${from} → ${currentState}`, 'ok');

      renderAll();
    }

    function formatValue(value) {
      if (value === null) return 'null';
      if (typeof value === 'string') return `"${value}"`;
      return String(value);
    }

    function renderData() {
      dataList.innerHTML = Object.entries(data)
        .map(([key, value]) => {
          const hasToast = dataFieldToasts.has(key);
          const detail = dataFieldToastDetails.get(key);

          return `
            <li>
              <span class="data-key">${key}</span>
              <span class="data-value-stack">
                ${hasToast && detail
                  ? `<span class="data-value-toast show">${detail.before} → ${detail.after}</span>`
                  : `<span class="muted">${formatValue(value)}</span>`}
              </span>
            </li>
          `;
        })
        .join('');
    }

    function renderAll() {
      syncSelectionToCurrentState();

      headerState.textContent = ` · Current: ${currentState}`;
      void drawDiagram();
      renderEventBar();

      renderData();
    }

    document.addEventListener('keydown', (event) => {
      const target = event.target;
      const targetTag = target?.tagName;
      const isInput = targetTag === 'INPUT' || targetTag === 'TEXTAREA';

      if (isInput) {
        return;
      }

      const events = getOrderedCurrentEvents();
      if (events.length === 0) {
        return;
      }

      if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
        event.preventDefault();
        const currentEvent = getSelectedEventName();
        const currentIndex = events.indexOf(currentEvent);
        let nextIndex;

        if (currentIndex < 0) {
          nextIndex = event.key === 'ArrowDown' ? 0 : events.length - 1;
        } else {
          nextIndex = event.key === 'ArrowDown'
            ? (currentIndex + 1) % events.length
            : (currentIndex - 1 + events.length) % events.length;
        }

        const nextEvent = events[nextIndex];
        hoveredEventName = nextEvent;
        selectEvent(nextEvent);
        pendingFocusEventName = nextEvent;
        renderAll();
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();
        fireCurrentSelection();
      }
    });

    if (reloadButton) {
      reloadButton.addEventListener('click', () => {
        reloadButton.classList.add('is-clicked');
        if (reloadButtonFeedbackTimer) {
          window.clearTimeout(reloadButtonFeedbackTimer);
        }

        reloadButtonFeedbackTimer = window.setTimeout(() => {
          reloadButton.classList.remove('is-clicked');
          reloadButtonFeedbackTimer = null;
        }, 140);

        void reloadMockup();
      });
    }

    if (vscodeApi) {
      window.addEventListener('message', (event) => {
        const message = event.data;
        if (!message || typeof message !== 'object') {
          return;
        }

        if (message.type === 'previewResponse') {
          const resolver = previewPendingRequests.get(message.requestId);
          if (resolver) {
            previewPendingRequests.delete(message.requestId);
            resolver(message);
          }
          return;
        }

        if (message.type === 'snapshot') {
          if (typeof message.snapshotSequence === 'number') {
            if (message.snapshotSequence < latestSnapshotSequence) {
              return;
            }

            latestSnapshotSequence = message.snapshotSequence;
          }

          if (!message.success || !message.snapshot) {
            showRowFeedback('Snapshot', `✖ ${message.error || 'Snapshot failed'}`, 'err');
            renderAll();
            return;
          }

          applySnapshot(message.snapshot);
          renderAll();
        }
      });

      vscodeApi.postMessage({ type: 'ready' });
      void reloadMockup();
    }

    renderAll();
  </script>
</body>
</html>
