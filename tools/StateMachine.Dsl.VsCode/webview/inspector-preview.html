        const halfW = ns.width / 2;
        const halfH = ns.height / 2;
        const rx = Math.min(halfH, 22);
        const isActive = name === diagramState;
        const hoveredVisual = hoveredStateVisual.get(name);
        const isDestinationVisual = !isActive && (hoveredVisual === 'actual' || hoveredVisual === 'alternate' || hoveredVisual === 'blocked');
        const isActualDestination = !isActive && hoveredVisual === 'actual';
        const isHoveredEventDestination = hoveredEventDestinationStates.has(name);
        const destinationOutlineOpacity = isDestinationVisual
          ? activeHoverEventName === null
            ? 0.58
            : isActualDestination && isHoveredEventDestination
              ? 1
              : isHoveredEventDestination
              ? 0.72
              : 0.18
          : 1;
        const destinationTextOpacity = isDestinationVisual
          ? activeHoverEventName === null
            ? 0.66
            : isActualDestination && isHoveredEventDestination
              ? 1
              : isHoveredEventDestination
              ? 0.74
              : 0.24
          : 1;
        const stroke = isActive
          ? 'var(--ok)'
          : hoveredVisual === 'actual'
            ? 'var(--ok)'
            : hoveredVisual === 'alternate' || hoveredVisual === 'blocked'
              ? 'var(--edge-error)'
            : 'var(--border)';
        const glow = isActive
          ? 'filter="drop-shadow(0 0 5px rgba(31,255,122,.45))"'
          : hoveredVisual === 'actual' && isHoveredEventDestination
            ? 'filter="drop-shadow(0 0 5px rgba(31,255,122,.36))"'
            : hoveredVisual === 'actual'
              ? 'filter="drop-shadow(0 0 3px rgba(31,255,122,.22))"'
            : hoveredVisual === 'alternate' || hoveredVisual === 'blocked'
              ? 'filter="drop-shadow(0 0 3px rgba(255,42,87,.2))"'
            : '';
        const fill = isActive
          ? 'var(--ok)'
          : 'var(--node)';
        const textFill = isActive
          ? 'var(--bg)'
          : isDestinationVisual
            ? stroke
            : 'var(--border)';
        const fontWeight = isActive ? 700 : isActualDestination && isHoveredEventDestination ? 700 : isDestinationVisual ? 600 : 500;
        return `
          <g ${glow}>
            <rect x="${pos.x - halfW}" y="${pos.y - halfH}" width="${ns.width}" height="${ns.height}" rx="${rx}" fill="${fill}" stroke="${stroke}" stroke-opacity="${destinationOutlineOpacity}" stroke-width="${isActive ? 2.6 : isDestinationVisual ? 2.0 : 1.6}"></rect>
            <text x="${pos.x}" y="${pos.y + 5}" text-anchor="middle" fill="${textFill}" fill-opacity="${destinationTextOpacity}" font-size="14" font-weight="${fontWeight}">${name}</text>
          </g>
        `;
      }).join('');

      let selfLoopSvg = '';
      if (hoveredEvaluation !== null && hoveredEvaluation.kind === 'noTransition' && activeHoverEventName !== null) {
        const loopPos = statePositions[diagramState];
        if (loopPos) {
          const ns = nodeSizes[diagramState] ?? { width: 112, height: 44 };
          const halfW = ns.width / 2;
          const halfH = ns.height / 2;
          const x0 = loopPos.x - halfW * 0.42;
          const x1 = loopPos.x + halfW * 0.42;
          const top = loopPos.y - halfH;
          const ctrl = top - 48;
          const pathD = `M ${x0} ${top} C ${x0} ${ctrl}, ${x1} ${ctrl}, ${x1} ${top}`;
          const labelX = loopPos.x;
          const chipHeight = 16;
          const chipWidth = activeHoverEventName.length * 7 + 16;
          const chipY = ctrl - chipHeight - 4;
          const textY = chipY + chipHeight / 2;
          selfLoopSvg = `<g opacity="0.72"><path d="${pathD}" fill="none" stroke="var(--ok)" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round"></path><rect class="edge-chip" x="${labelX - chipWidth / 2}" y="${chipY}" width="${chipWidth}" height="${chipHeight}" fill="rgba(30,30,30,0.88)" stroke="var(--ok)" stroke-width="1.1"></rect><text class="edge-label" x="${labelX}" y="${textY}" fill="var(--ok)">${activeHoverEventName}</text></g>`;
        }
      }

      diagram.innerHTML = `${defs}${edgeSvg}${selfLoopSvg}${annotationSvg}${nodeSvg}`;
    }

    function renderEventBar() {
      const selectedEventName = getSelectedEventName();
      const events = getOrderedCurrentEvents();

      if (events.length === 0) {
        eventBar.innerHTML = '<span class="muted">No events available from current state.</span>';
        return;
      }

      eventBar.innerHTML = events
        .map((eventName) => {
          const evaluation = evaluateEvent(currentState, eventName);
          const family = getFamilyTransitions(currentState, eventName);
          const activeClass = eventName === selectedEventName ? ' active' : '';
          const stateClass = evaluation.kind === 'enabled'
            ? ' enabled'
            : evaluation.kind === 'noTransition'
            ? ' noTransition'
            : evaluation.kind === 'blocked'
            ? ' blocked'
            : evaluation.kind === 'undefined'
              ? ' undefined'
              : '';
          const glyph = evaluation.kind === 'enabled'
            ? '✔'
            : evaluation.kind === 'noTransition'
            ? '⏸'
            : evaluation.kind === 'blocked'
              ? '✖'
              : '∅';
          const inlineArgs = eventName === 'Emergency'
            ? `<span class="event-args-inline"><input data-event-arg="AuthorizedBy" type="text" placeholder="AuthorizedBy" value="${mockEmergencyArgs.AuthorizedBy.replace(/"/g, '&quot;')}"><input data-event-arg="Reason" type="text" placeholder="Reason" value="${mockEmergencyArgs.Reason.replace(/"/g, '&quot;')}"></span>`
            : '';
          const reasonText = getEvaluationReason(evaluation);
          const escapedReason = reasonText
            ? reasonText
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
            : '';
          const inlineReason = reasonText
            ? `<div class="event-reason">${escapedReason}</div>`
            : '';
          const inlineResult = rowFeedback && rowFeedback.eventName === eventName
            ? `<span class="event-result-chip ${rowFeedback.tone} show">${rowFeedback.message.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>`
            : '';

          const selectedEntryClass = eventName === selectedEventName ? ' is-selected' : '';

          return `<span class="event-entry${selectedEntryClass}"><button class="event-btn${activeClass}${stateClass}" data-event="${eventName}" type="button"><span class="event-label">${eventName}</span><span class="event-glyph">${glyph}</span></button>${inlineArgs}${inlineResult}${inlineReason}</span>`;
        })
        .join('');

      eventBar.querySelectorAll('.event-btn').forEach((button) => {
        const eventName = button.dataset.event;
        applyEventButtonState(button, eventName);

        button.addEventListener('mouseenter', () => {
          if (suppressHoverUntilAnimationComplete) {
            return;
          }

          hoveredEventName = eventName;
          drawDiagram();
        });

        button.addEventListener('mouseleave', () => {
          hoveredEventName = null;
          drawDiagram();
        });

        button.addEventListener('click', () => {
          selectEvent(eventName);

          const evaluation = evaluateEvent(currentState, eventName);
          if (evaluation.kind === 'undefined') {
            renderAll();
            return;
          }

          fireCurrentSelection(eventName);
        });
      });

      eventBar.querySelectorAll('input[data-event-arg]').forEach((input) => {
        input.addEventListener('mouseenter', (event) => {
          event.stopPropagation();
        });

        input.addEventListener('focus', () => {
          if (suppressHoverUntilAnimationComplete) {
            return;
          }

          hoveredEventName = 'Emergency';
          drawDiagram();
        });

        input.addEventListener('click', (event) => {
          event.stopPropagation();
        });

        input.addEventListener('blur', () => {
          if (suppressArgBlur) {
            return;
          }
          const emergencyButton = eventBar.querySelector('button[data-event="Emergency"]');
          const emergencyEntry = emergencyButton?.closest('.event-entry');
          const activeElement = document.activeElement;
          if (!emergencyEntry || !activeElement || !emergencyEntry.contains(activeElement)) {
            hoveredEventName = null;
            drawDiagram();
          }
        });

        input.addEventListener('input', () => {
          const argName = input.dataset.eventArg;
          const focusedArgName = argName; // remember which field to re-focus
          if (argName === 'AuthorizedBy') {
            mockEmergencyArgs.AuthorizedBy = input.value;
          } else if (argName === 'Reason') {
            mockEmergencyArgs.Reason = input.value;
          }

          const emergencyEvaluation = evaluateEvent(currentState, 'Emergency');
          if (emergencyEvaluation.kind === 'enabled') {
            selectEvent('Emergency');
          } else {
            syncSelectionToCurrentState();
          }

          // Pin hover to Emergency so the blur from DOM rebuild doesn't clear it
          hoveredEventName = 'Emergency';
          suppressArgBlur = true;

          // Full re-render so button state, glyph, reason text and diagram all update together
          renderEventBar();
          suppressArgBlur = false;

          // Restore focus to the same input field after re-render
          const refocusInput = eventBar.querySelector(`input[data-event-arg="${focusedArgName}"]`);
          if (refocusInput) {
            refocusInput.focus();
            const len = refocusInput.value.length;
            refocusInput.setSelectionRange(len, len);
          }

          // Draw after focus so hoveredEventName is still 'Emergency'
          drawDiagram();
        });
      });

      if (pendingFocusEventName) {
        const focusTarget = eventBar.querySelector(`button[data-event="${pendingFocusEventName}"]`);
        if (focusTarget) {
          focusTarget.focus();
        }

        pendingFocusEventName = null;
      }
    }

    async function fireCurrentSelection(explicitEventName = null) {
      const eventName = explicitEventName ?? getSelectedEventName();
      if (!eventName) {
        return;
      }

      if (vscodeApi) {
        const beforeState = currentState;
        const beforeData = snapshotData();
        const beforeArgs = {
          AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
          Reason: mockEmergencyArgs.Reason
        };

        const args = eventName === 'Emergency'
          ? {
            AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
            Reason: mockEmergencyArgs.Reason
          }
          : undefined;

        const response = await sendHostRequest('fire', { eventName, args });
        if (!response.success || !response.snapshot) {
          showRowFeedback(eventName, `✖ ${response.error || `Event '${eventName}' did not fire.`}`, 'err');
          renderAll();
          return;
        }

        // Capture the new state but don't commit UI yet — animate first
        const newSnapshot = response.snapshot;
        const newState = String(newSnapshot.currentState ?? newSnapshot.CurrentState ?? beforeState);

        triggerStateChangeAnimation(beforeState, newState, eventName, beforeData, beforeArgs, () => {
          // Commit all state changes after animation completes
          applySnapshot(newSnapshot);
          const afterData = snapshotData();
          const changedKeys = getChangedDataKeys(beforeData, afterData);
          showDataFieldToasts(changedKeys, beforeData, afterData);
          hoveredEventName = null;
          mockEmergencyArgs.AuthorizedBy = '';
          mockEmergencyArgs.Reason = '';
          showRowFeedback(eventName, `✔ ${beforeState} → ${newState}`, 'ok');
        });
        drawDiagram();
        return;
      }

      const evaluation = evaluateEvent(currentState, eventName);
      const failureReason = evaluation.reason && evaluation.reason.trim().length > 0
        ? evaluation.reason
        : evaluation.kind === 'blocked'
          ? 'Blocked by guard or reject condition.'
          : 'No transition is available from the current state.';

      if (evaluation.kind === 'undefined') {
        showRowFeedback(eventName, `∅ ${failureReason}`, 'err');
        return;
      }

      if (evaluation.kind === 'blocked') {
        showRowFeedback(eventName, `✖ ${failureReason}`, 'err');

        renderAll();
        return;
      }

      if (evaluation.kind === 'noTransition') {
        showRowFeedback(eventName, `⏸ No transition (state unchanged)`, 'ok');
        renderAll();
        return;
      }

      if (evaluation.kind !== 'enabled' || !evaluation.to) {
        return;
      }

      const from = currentState;
      const beforeData = snapshotData();
      const beforeArgs = {
        AuthorizedBy: mockEmergencyArgs.AuthorizedBy,
        Reason: mockEmergencyArgs.Reason
      };

      // Start animation first, commit state changes in onComplete callback
      triggerStateChangeAnimation(from, evaluation.to, eventName, beforeData, beforeArgs, () => {
        currentState = evaluation.to;
        applyTransition(from, eventName, currentState);
        const afterData = snapshotData();
        const changedKeys = getChangedDataKeys(beforeData, afterData);
        showDataFieldToasts(changedKeys, beforeData, afterData);
        hoveredEventName = null;
        mockEmergencyArgs.AuthorizedBy = '';
        mockEmergencyArgs.Reason = '';
        showRowFeedback(eventName, `✔ ${from} → ${currentState}`, 'ok');
      });
      drawDiagram();
    }

    function formatValue(value) {
      if (value === null) return 'null';
      if (typeof value === 'string') return `"${value}"`;
      return String(value);
    }

    function renderData() {
      dataList.innerHTML = Object.entries(data)
        .map(([key, value]) => {
          const hasToast = dataFieldToasts.has(key);
          const detail = dataFieldToastDetails.get(key);

          return `
            <li>
              <span class="data-key">${key}</span>
              <span class="data-value-stack">
                ${hasToast && detail
                  ? `<span class="data-value-toast show">${detail.before} → ${detail.after}</span>`
                  : `<span class="muted">${formatValue(value)}</span>`}
              </span>
            </li>
          `;
        })
        .join('');
    }

    function renderAll() {
      syncSelectionToCurrentState();

      headerState.textContent = ` · Current: ${currentState}`;
      drawDiagram();
      renderEventBar();

      renderData();
    }

    document.addEventListener('keydown', (event) => {
      const target = event.target;
      const targetTag = target?.tagName;
      const isInput = targetTag === 'INPUT' || targetTag === 'TEXTAREA';

      if (isInput) {
        return;
      }

      const events = getOrderedCurrentEvents();
      if (events.length === 0) {
        return;
      }

      if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
        event.preventDefault();
        const currentEvent = getSelectedEventName();
        const currentIndex = events.indexOf(currentEvent);
        let nextIndex;

        if (currentIndex < 0) {
          nextIndex = event.key === 'ArrowDown' ? 0 : events.length - 1;
        } else {
          nextIndex = event.key === 'ArrowDown'
            ? (currentIndex + 1) % events.length
            : (currentIndex - 1 + events.length) % events.length;
        }

        const nextEvent = events[nextIndex];
        hoveredEventName = nextEvent;
        selectEvent(nextEvent);
        pendingFocusEventName = nextEvent;
        renderAll();
        return;
      }

      if (event.key === 'Enter') {
        event.preventDefault();
        fireCurrentSelection();
      }
    });

    if (reloadButton) {
      reloadButton.addEventListener('click', () => {
        reloadButton.classList.add('is-clicked');
        if (reloadButtonFeedbackTimer) {
          window.clearTimeout(reloadButtonFeedbackTimer);
        }

        reloadButtonFeedbackTimer = window.setTimeout(() => {
          reloadButton.classList.remove('is-clicked');
          reloadButtonFeedbackTimer = null;
        }, 140);

        void reloadMockup();
      });
    }

    if (vscodeApi) {
      window.addEventListener('message', (event) => {
        const message = event.data;
        if (!message || typeof message !== 'object') {
          return;
        }

        if (message.type === 'previewResponse') {
          const resolver = previewPendingRequests.get(message.requestId);
          if (resolver) {
            previewPendingRequests.delete(message.requestId);
            resolver(message);
          }
          return;
        }

        if (message.type === 'snapshot') {
          if (typeof message.snapshotSequence === 'number') {
            if (message.snapshotSequence < latestSnapshotSequence) {
              return;
            }

            latestSnapshotSequence = message.snapshotSequence;
          }

          if (!message.success || !message.snapshot) {
            showRowFeedback('Snapshot', `✖ ${message.error || 'Snapshot failed'}`, 'err');
            renderAll();
            return;
          }

          applySnapshot(message.snapshot);
          renderAll();
        }
      });

      vscodeApi.postMessage({ type: 'ready' });
      void reloadMockup();
    }

    renderAll();
  </script>
</body>
</html>
