        body: 'The right panel maps the full state machine. Nodes light up as you visit them and edges glow when traversed — a minimap for your journey.',
        target: () => document.querySelector('.state-diagram-rail'),
        position: 'left',
      },
      {
        title: 'Undo & Reset',
        body: '<kbd>← Undo</kbd> takes back one step. <kbd>↺ Reset</kbd> returns to the start. Experiment freely.',
        target: () => document.querySelector('.header-actions'),
        position: 'below',
      },
      {
        title: 'Follow the Blue Hints',
        body: 'Look for the <span style="color:var(--cyan);">suggested next</span> badge on event cards — it traces the recommended journey through the full lifecycle.',
        target: () => document.querySelector('.event-card.suggested-next') || document.querySelector('.event-card.can-fire'),
        position: 'above',
      },
    ];

    function getSuggestedEvent() {
      // Find where we are in the suggested journey
      for (const step of SUGGESTED_JOURNEY) {
        if (step.state === sim.currentState) {
          // Check if this event is actually available
          const events = getAvailableEvents(sim.currentState, sim.data);
          if (events.some(e => e.name === step.event)) {
            return step;
          }
        }
      }
      return null;
    }

    function getStepHintText() {
      const suggested = getSuggestedEvent();
      if (!suggested) return null;
      return suggested.hint;
    }

    function getJourneyProgress() {
      // How far along the suggested journey are we?
      const stateIndex = SUGGESTED_JOURNEY.findIndex(s => s.state === sim.currentState);
      if (stateIndex === -1) return { current: -1, total: SUGGESTED_JOURNEY.length };
      return { current: stateIndex, total: SUGGESTED_JOURNEY.length };
    }

    // — Coach marks —

    function startCoach() {
      guidanceState.coachActive = true;
      guidanceState.coachStep = 0;
      guidanceState.welcomeDismissed = true;
      renderCoachStep();
    }

    function nextCoach() {
      guidanceState.coachStep++;
      if (guidanceState.coachStep >= COACH_STEPS.length) {
        dismissCoach();
        return;
      }
      renderCoachStep();
    }

    function prevCoach() {
      if (guidanceState.coachStep > 0) {
        guidanceState.coachStep--;
        renderCoachStep();
      }
    }

    function dismissCoach() {
      guidanceState.coachActive = false;
      const overlay = document.getElementById('coachOverlay');
      overlay.style.display = 'none';
      overlay.innerHTML = '';
    }

    function renderCoachStep() {
      const overlay = document.getElementById('coachOverlay');
      const step = COACH_STEPS[guidanceState.coachStep];
      const target = step.target();

      if (!target) {
        nextCoach();
        return;
      }

      overlay.style.display = 'block';

      const rect = target.getBoundingClientRect();
      const pad = 8;

      // Step indicators
      const dots = COACH_STEPS.map((_, i) => {
        const cls = i < guidanceState.coachStep ? 'coach-dot done' :
                    i === guidanceState.coachStep ? 'coach-dot active' : 'coach-dot';
        return `<div class="${cls}"></div>`;
      }).join('');

      // Position the card
      let cardStyle = '';
      if (step.position === 'below') {
        cardStyle = `top: ${rect.bottom + 12}px; left: ${Math.max(16, rect.left)}px;`;
      } else if (step.position === 'above') {
        cardStyle = `bottom: ${window.innerHeight - rect.top + 12}px; left: ${Math.max(16, rect.left)}px;`;
      } else if (step.position === 'right') {
        cardStyle = `top: ${rect.top}px; left: ${rect.right + 12}px;`;
      } else if (step.position === 'left') {
        cardStyle = `top: ${rect.top}px; right: ${window.innerWidth - rect.left + 12}px;`;
      }

      const isLast = guidanceState.coachStep === COACH_STEPS.length - 1;
      const isFirst = guidanceState.coachStep === 0;

      overlay.innerHTML = `
        <div class="coach-spotlight" style="
          top: ${rect.top - pad}px;
          left: ${rect.left - pad}px;
          width: ${rect.width + pad * 2}px;
          height: ${rect.height + pad * 2}px;
        "></div>
        <div class="coach-card" style="${cardStyle}">
          <div class="coach-step-indicator">${dots}</div>
          <div class="coach-title">${step.title}</div>
          <div class="coach-body">${step.body}</div>
          <div class="coach-actions">
            ${!isFirst ? '<button class="coach-btn secondary" onclick="prevCoach()">← Back</button>' : ''}
            <button class="coach-btn primary" onclick="${isLast ? 'dismissCoach()' : 'nextCoach()'}">
              ${isLast ? 'Got it ✓' : 'Next →'}
            </button>
            <span class="coach-skip" onclick="dismissCoach()">Skip tour</span>
          </div>
        </div>
      `;
    }

    function dismissWelcome() {
      guidanceState.welcomeDismissed = true;
      render();
    }

    function dismissHints() {
      guidanceState.hintsDismissed = true;
      render();
    }

    // ================================================================
    // INIT
    // ================================================================

    render();
  </script>

</body>
</html>
