    function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function renderStateDiagram() {
      const el = document.getElementById('stateDiagram');
      if (!el) return;

      const isFlow = panelUi.layout === 'flow';
      const nW = 82, nH = 24, nR = 12, xS = 120, yM = 40, yC = 90;
      const nodes = isFlow
        ? [
            { id: 'Draft', x: 96, y: 48 },
            { id: 'Open', x: 96, y: 124 },
            { id: 'Scheduled', x: 96, y: 200 },
            { id: 'InProgress', x: 96, y: 276 },
            { id: 'Completed', x: 96, y: 352 },
            { id: 'Cancelled', x: 214, y: 200 },
          ]
        : [
            { id: 'Draft', x: 60, y: yM },
            { id: 'Open', x: 60 + xS, y: yM },
            { id: 'Scheduled', x: 60 + xS * 2, y: yM },
            { id: 'InProgress', x: 60 + xS * 3, y: yM },
            { id: 'Completed', x: 60 + xS * 4, y: yM },
            { id: 'Cancelled', x: 60 + xS * 2, y: yC },
          ];
      const edges = isFlow
        ? [
            { from: 'Draft', to: 'Open', label: 'Submit', labelDx: 34, labelDy: -4 },
            { from: 'Open', to: 'Scheduled', label: 'Assign', labelDx: 34, labelDy: -4 },
            { from: 'Open', to: 'Cancelled', label: 'Cancel', labelDx: 14, labelDy: -12 },
            { from: 'Scheduled', to: 'InProgress', label: 'StartWork', labelDx: 40, labelDy: -4 },
            { from: 'Scheduled', to: 'Cancelled', label: 'Cancel', labelDx: 16, labelDy: -12 },
            { from: 'InProgress', to: 'Completed', label: 'Complete', labelDx: 38, labelDy: -4 },
          ]
        : [
            { from: 'Draft', to: 'Open', label: 'Submit' },
            { from: 'Open', to: 'Scheduled', label: 'Assign' },
            { from: 'Open', to: 'Cancelled', label: 'Cancel' },
            { from: 'Scheduled', to: 'InProgress', label: 'StartWork' },
            { from: 'Scheduled', to: 'Cancelled', label: 'Cancel' },
            { from: 'InProgress', to: 'Completed', label: 'Complete' },
          ];
      const selfLoops = { Scheduled: ['ApproveParts'], InProgress: ['RecordProgress'] };

      const nMap = {}; nodes.forEach(n => nMap[n.id] = n);
      const lastStep = sim.history.length > 0 ? sim.history[sim.history.length - 1] : null;
      const lastEdge = lastStep && lastStep.fromState !== lastStep.toState ? { from: lastStep.fromState, to: lastStep.toState } : null;
      const lastSelf = lastStep && lastStep.fromState === lastStep.toState && !lastStep.event.startsWith('edit') ? lastStep.fromState : null;
      const selectedMeta = getSelectedEventMeta();
      const selectedName = selectedMeta?.evt.name || null;
      const selectedTarget = selectedMeta?.targetState || null;

      const svgW = isFlow ? 280 : 60 + xS * 4 + nW / 2 + 20;
      const svgH = isFlow ? 392 : yC + nH / 2 + 20;
      function ap(x1, y1, x2, y2, s) { const a = Math.atan2(y2 - y1, x2 - x1); return `M${x2.toFixed(1)},${y2.toFixed(1)} L${(x2 - s * Math.cos(a - 0.45)).toFixed(1)},${(y2 - s * Math.sin(a - 0.45)).toFixed(1)} L${(x2 - s * Math.cos(a + 0.45)).toFixed(1)},${(y2 - s * Math.sin(a + 0.45)).toFixed(1)} Z`; }

      let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

      edges.forEach(e => {
        const f = nMap[e.from], t = nMap[e.to];
        let x1, y1, x2, y2;
        if (isFlow) {
          const isMostlyVertical = Math.abs(t.y - f.y) >= Math.abs(t.x - f.x);
          if (isMostlyVertical) {
            x1 = f.x;
            y1 = t.y > f.y ? f.y + nH / 2 : f.y - nH / 2;
            x2 = t.x;
            y2 = t.y > f.y ? t.y - nH / 2 : t.y + nH / 2;
          } else {
            x1 = t.x > f.x ? f.x + nW / 2 : f.x - nW / 2;
            y1 = f.y;
            x2 = t.x > f.x ? t.x - nW / 2 : t.x + nW / 2;
            y2 = t.y;
          }
        } else if (t.y > f.y) {
          x1 = f.x;
          y1 = f.y + nH / 2;
          x2 = t.x;
          y2 = t.y - nH / 2;
        } else {
          x1 = f.x + nW / 2;
          y1 = f.y;
          x2 = t.x - nW / 2;
          y2 = t.y;
        }
        const isT = sim.history.some(h => h.fromState === e.from && h.toState === e.to);
        const isA = lastEdge && lastEdge.from === e.from && lastEdge.to === e.to;
        const isSelected = !!selectedName && sim.currentState === e.from && selectedName === e.label;
        let lC = 'sd-edge', aC = 'sd-arrow', tC = 'sd-edge-label';
        if (isSelected) { lC += ' sd-edge-selected'; aC += ' sd-arrow-selected'; tC += ' sd-edge-label-selected'; }
        else if (isA) { lC += ' sd-edge-active'; aC += ' sd-arrow-active'; tC += ' sd-edge-label-active'; }
        else if (isT) { lC += ' sd-edge-traced'; aC += ' sd-arrow-traced'; tC += ' sd-edge-label-traced'; }
        svg += `<line class="${lC}" data-event="${e.label}" data-from-state="${e.from}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" onmouseenter="setHoverEvent('${e.label}', '${e.from}')" onmouseleave="clearHoverEvent()"/>`;
        svg += `<path class="${aC}" d="${ap(x1, y1, x2, y2, 5)}"/>`;
        let mx = (x1 + x2) / 2 + (e.labelDx || 0), my = (y1 + y2) / 2 + (e.labelDy || 0);
        if (!isFlow) {
          if (t.y > f.y) mx += 30;
          else my -= 8;
        }
        svg += `<text class="${tC} sd-edge-label" data-event="${e.label}" data-from-state="${e.from}" x="${mx}" y="${my}" onmouseenter="setHoverEvent('${e.label}', '${e.from}')" onmouseleave="clearHoverEvent()">${e.label}</text>`;
      });

      for (const [sid, evts] of Object.entries(selfLoops)) {
        const n = nMap[sid]; let cls = 'sd-self-loop'; if (lastSelf === sid) cls += ' sd-self-flash'; if (selectedName === evts[0] && sid === sim.currentState) cls += ' sd-self-selected';
        const labelClass = selectedName === evts[0] && sid === sim.currentState ? 'sd-self-label sd-edge-label sd-edge-label-selected' : 'sd-self-label sd-edge-label';
        const ty = n.y - nH / 2 - 1;
        if (isFlow) {
          svg += `<path class="${cls}" data-event="${evts[0]}" data-from-state="${sid}" d="M${n.x + 10},${ty + 3} C${n.x + 24},${ty + 3} ${n.x + 24},${ty - 14} ${n.x + 10},${ty - 14}" onmouseenter="setHoverEvent('${evts[0]}', '${sid}')" onmouseleave="clearHoverEvent()"/>`;
          svg += `<text class="${labelClass}" data-event="${evts[0]}" data-from-state="${sid}" x="${n.x + 28}" y="${ty - 12}" text-anchor="start" style="font-size:6.5px" onmouseenter="setHoverEvent('${evts[0]}', '${sid}')" onmouseleave="clearHoverEvent()">${evts.join(', ')}</text>`;
        } else {
          svg += `<path class="${cls}" data-event="${evts[0]}" data-from-state="${sid}" d="M${n.x - 10},${ty} C${n.x - 10},${ty - 16} ${n.x + 10},${ty - 16} ${n.x + 10},${ty}" onmouseenter="setHoverEvent('${evts[0]}', '${sid}')" onmouseleave="clearHoverEvent()"/>`;
          svg += `<text class="${labelClass}" data-event="${evts[0]}" data-from-state="${sid}" x="${n.x}" y="${ty - 16}" text-anchor="middle" style="font-size:6.5px" onmouseenter="setHoverEvent('${evts[0]}', '${sid}')" onmouseleave="clearHoverEvent()">${evts.join(', ')}</text>`;
        }
      }

      nodes.forEach(n => {
        const isCur = sim.currentState === n.id, isVis = sim.visitedStates.has(n.id), meta = STATE_META[n.id];
        const hA = `data-state="${n.id}" onmouseenter="setHoverState('${n.id}')" onmouseleave="clearHoverState()"`;
        const selectedNodeClass = selectedTarget === n.id ? ' sd-node-selected-target' : '';
        let nc = 'sd-node'; if (isCur) nc = 'sd-node-current'; else if (isVis) nc = 'sd-node-visited';
        if (meta.initial) { svg += `<circle class="${nc} sd-node-initial${selectedNodeClass}" cx="${n.x}" cy="${n.y}" r="${nR}" ${isCur ? 'style="stroke-width:2.5"' : ''} ${hA}/>`; svg += `<circle class="sd-initial-dot" cx="${n.x}" cy="${n.y}" r="4" opacity="${isCur ? 1 : 0.5}"/>`; }
        else if (meta.terminal) { svg += `<rect class="sd-node-terminal-outer" x="${n.x - nW / 2 - 3}" y="${n.y - nH / 2 - 3}" width="${nW + 6}" height="${nH + 6}" rx="${nR + 2}"/>`; svg += `<rect class="${nc} sd-node-terminal${selectedNodeClass}" x="${n.x - nW / 2}" y="${n.y - nH / 2}" width="${nW}" height="${nH}" rx="${nR}" ${hA}/>`; }
        else { svg += `<rect class="${nc}${selectedNodeClass}" x="${n.x - nW / 2}" y="${n.y - nH / 2}" width="${nW}" height="${nH}" rx="${nR}" ${hA}/>`; }
        let lc = 'sd-label'; if (isCur) lc = 'sd-label sd-label-current'; else if (isVis) lc = 'sd-label sd-label-visited';
        svg += `<text class="${lc}" x="${n.x}" y="${n.y + 3.5}">${n.id}</text>`;
      });

      svg += '</svg>';
      el.innerHTML = svg;
    }

    function renderTimelineStateTile(state, options = {}) {
      const meta = STATE_META[state] || {};
      const classes = ['timeline-state-tile'];
      if (meta.initial) classes.push('is-initial');
      if (meta.terminal) classes.push('is-terminal');
      if (options.current) classes.push('is-current');
      const badges = [];
      if (options.origin) badges.push(renderBadge('origin', 'violet'));
      if (options.current) badges.push(renderBadge('current', 'neutral'));
      if (meta.terminal) badges.push(renderBadge('terminal', 'dim'));
      return `<div class="${classes.join(' ')}" data-state="${state}" onmouseenter="setHoverState('${state}')" onmouseleave="clearHoverState()">
        <div class="timeline-state-head">
          <div class="timeline-state-name">${escHtml(state)}</div>
          <div class="timeline-state-badges">${badges.join('')}</div>
        </div>
        <div class="timeline-state-copy">${escHtml(getStateDescription(state))}</div>
      </div>`;
    }

    function renderTimelineEventCard(model) {
      const classes = ['timeline-event-card'];
      if (model.selectable) classes.push('selectable');
      if (model.selected) classes.push('is-selected');
      if (model.blocked) classes.push('blocked');
      if (model.history) classes.push('history');
      if (model.transitioned) classes.push('transitioned');
      if (model.editCard) classes.push('edit-card');
      const interactionAttrs = model.selectable
        ? ` data-event="${escHtml(model.eventName)}" data-from-state="${escHtml(model.fromState || sim.currentState)}" onmouseenter="setHoverEvent('${model.eventName}', '${model.fromState || sim.currentState}')" onmouseleave="clearHoverEvent()" onclick="selectEvent('${model.eventName}')"`
        : '';
      return `<div class="${classes.join(' ')}"${interactionAttrs}>
        <div class="timeline-event-head">
          <div>
            <div class="timeline-event-name">${escHtml(model.eventName)}</div>
            <div class="timeline-event-subtitle">${escHtml(model.subtitle)}</div>
          </div>
          <span class="timeline-event-effect">${escHtml(model.effectLabel)}</span>
        </div>
        <div class="timeline-event-meta">${model.badges.join('')}</div>
        ${renderTimelineArgFields(model)}
        ${model.selectable ? `<button class="timeline-fire-btn${model.blocked ? ' blocked' : ''}" onclick="event.stopPropagation(); ${model.blocked ? '' : `fireEvent('${model.eventName}')`}" ${model.blocked ? 'disabled' : ''}>${escHtml(model.eventName)}</button>` : ''}
        <div class="timeline-event-note">${escHtml(model.note)}</div>
      </div>`;
    }

    function buildTimelineColumns(events) {
      const columns = [];

      function ensureColumn(state) {
        const last = columns[columns.length - 1];
        if (last && last.state === state) return last;
        const column = { state, historyCards: [], futureCards: [], current: false };
        columns.push(column);
        return column;
      }

      if (sim.history.length === 0) {
        ensureColumn(sim.currentState);
      } else {
        sim.history.forEach(entry => {
          const column = ensureColumn(entry.fromState);
          const historyBadges = [renderBadge(`#${entry.stepNum}`, 'neutral')];
          if (entry.event.startsWith('edit ')) historyBadges.push(renderBadge('edit', 'indigo'));
          else historyBadges.push(renderBadge(entry.outcome === 'transition' ? 'fired' : 'stayed', entry.outcome === 'transition' ? 'enabled' : 'slate'));

          column.historyCards.push({
            eventName: entry.event,
            subtitle: entry.outcome === 'transition' ? `${entry.fromState} to ${entry.toState}` : `Within ${entry.fromState}`,
            effectLabel: entry.outcome === 'transition' ? `→ ${entry.toState}` : 'stays',
            note: formatDeltaSummary(entry),
            badges: historyBadges,
            argDefs: Object.keys(entry.args || {}).map(name => ({ name, type: inferValueType(entry.args[name]) })),
            argValues: entry.args || {},
            editableArgs: false,
            history: true,
            transitioned: entry.outcome === 'transition',
            editCard: entry.event.startsWith('edit '),
            blocked: false,
            selectable: false,
            selected: false,
            fromState: entry.fromState,
          });

          if (entry.outcome === 'transition') ensureColumn(entry.toState);
        });
      }

      const currentColumn = ensureColumn(sim.currentState);
      currentColumn.current = true;

      if (STATE_META[sim.currentState].terminal) {
        currentColumn.futureCards.push({
          empty: true,
          copy: 'Terminal state reached. No further events are available from this state.',
        });
      } else {
        events.forEach(evt => {
          const preview = getEventPreview(evt);
          const futureBadges = [renderBadge(preview.blocked ? 'blocked' : 'ready', preview.blocked ? 'blocked' : 'enabled')];
          if (preview.primaryRow.outcome === 'no-transition') futureBadges.push(renderBadge('stays', 'slate'));
          else if (preview.primaryRow.target) futureBadges.push(renderBadge(preview.primaryRow.target, 'violet'));

          currentColumn.futureCards.push({
            eventName: evt.name,
            subtitle: preview.primaryRow.outcome === 'transition' ? `From ${sim.currentState} to ${preview.targetState}` : `Within ${sim.currentState}`,
            effectLabel: preview.effectLabel,
            note: preview.blocked
              ? preview.reason
              : (preview.primaryRow.mutations?.length ? formatMutationSummary(preview.primaryRow.mutations) : (preview.primaryRow.guardDisplay || 'No data consequence')),
            badges: futureBadges,
            argDefs: evt.args,
            argValues: ensureEventDraft(evt),
            editableArgs: evt.args.length > 0,
            history: false,
            transitioned: false,
            editCard: false,
            blocked: preview.blocked,
            selectable: true,
            selected: selectedEvent === evt.name,
            fromState: sim.currentState,
          });
        });
      }

      return columns;
    }

    function renderTimeline() {
      const el = document.getElementById('timeline');
      const events = getAvailableEvents(sim.currentState, sim.data);
      let html = `<div class="timeline-lane">`;

      if (sim.history.length > 0) {
        html += `<div class="timeline-history-rail">`;
        sim.history.forEach((entry, index) => {
          const historyBadges = [renderBadge(`#${entry.stepNum}`, 'neutral')];
          if (entry.event.startsWith('edit ')) historyBadges.push(renderBadge('edit', 'indigo'));
          else historyBadges.push(renderBadge(entry.outcome === 'transition' ? 'fired' : 'stayed', entry.outcome === 'transition' ? 'enabled' : 'slate'));

          html += renderTimelineEventCard({
            eventName: entry.event,
            subtitle: entry.outcome === 'transition' ? `${entry.fromState} to ${entry.toState}` : `Within ${entry.fromState}`,
            effectLabel: entry.outcome === 'transition' ? `→ ${entry.toState}` : 'stays',
            note: formatDeltaSummary(entry),
            badges: historyBadges,
            argDefs: Object.keys(entry.args || {}).map(name => ({ name, type: inferValueType(entry.args[name]) })),
            argValues: entry.args || {},
            editableArgs: false,
            history: true,
            transitioned: entry.outcome === 'transition',
            editCard: entry.event.startsWith('edit '),
            blocked: false,
            selectable: false,
            selected: false,
            fromState: entry.fromState,
          });

          if (index < sim.history.length - 1) html += `<div class="timeline-connector" aria-hidden="true"></div>`;
        });
        html += `</div><div class="timeline-connector major" aria-hidden="true"></div>`;
      }

      html += `<div class="timeline-current-cluster">`;
      html += renderTimelineStateTile(sim.currentState, {
        current: true,
        origin: sim.history.length === 0 && STATE_META[sim.currentState].initial,
      });
      html += `</div><div class="timeline-connector major" aria-hidden="true"></div>`;

      if (STATE_META[sim.currentState].terminal) {
        html += `<div class="timeline-future-rail"><div class="timeline-empty-card">Terminal state reached. No further events are available from this state.</div></div>`;
      } else {
        html += `<div class="timeline-future-rail">`;
        events.forEach((evt, index) => {
          const preview = getEventPreview(evt);
          const futureBadges = [renderBadge(preview.blocked ? 'blocked' : 'ready', preview.blocked ? 'blocked' : 'enabled')];
          if (preview.primaryRow.outcome === 'no-transition') futureBadges.push(renderBadge('stays', 'slate'));
          else if (preview.primaryRow.target) futureBadges.push(renderBadge(preview.primaryRow.target, 'violet'));

          html += renderTimelineEventCard({
            eventName: evt.name,
            subtitle: preview.primaryRow.outcome === 'transition' ? `${sim.currentState} to ${preview.targetState}` : `Within ${sim.currentState}`,
            effectLabel: preview.effectLabel,
            note: preview.blocked
              ? preview.reason
              : (preview.primaryRow.mutations?.length ? formatMutationSummary(preview.primaryRow.mutations) : (preview.primaryRow.guardDisplay || 'No data consequence')),
            badges: futureBadges,
            argDefs: evt.args,
            argValues: ensureEventDraft(evt),
            editableArgs: evt.args.length > 0,
            history: false,
            transitioned: false,
            editCard: false,
            blocked: preview.blocked,
            selectable: true,
            selected: selectedEvent === evt.name,
            fromState: sim.currentState,
          });

          // future events stack vertically — no connectors needed
        });
        html += `</div>`;
      }

      html += `</div>`;
      el.innerHTML = html;
      requestAnimationFrame(() => {
        const focusTarget = el.querySelector('.timeline-event-card.is-selected') || el.querySelector('.timeline-current-cluster') || el.querySelector('.timeline-future-rail');
        if (focusTarget && typeof focusTarget.scrollIntoView === 'function') {
          focusTarget.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
        } else {
          el.scrollLeft = Math.max(0, el.scrollWidth - el.clientWidth);
        }
      });
    }

    function formatVal(v) { if (v === null || v === undefined) return 'null'; if (typeof v === 'boolean') return String(v); return escHtml(String(v)); }

    function getStateDescription(state) {
      return { Draft: 'New work order — fill in details and submit.', Open: 'Submitted and awaiting assignment.', Scheduled: 'Technician assigned — approve parts or start work.', InProgress: 'Work underway — record progress or complete.', Completed: 'Work finished and closed.', Cancelled: 'Work order cancelled.' }[state] || '';
    }

    function renderStatus() {
      document.getElementById('statusStep').textContent = `Step ${sim.stepCount}`;
      const ok = INVARIANTS.every(i => i.check(sim.data));
      const invEl = document.getElementById('statusInvariants');
      if (ok) { invEl.className = 'status-ok'; invEl.textContent = `✓ ${INVARIANTS.length} invariants ok`; }
      else { invEl.className = 'status-warn'; invEl.textContent = '⚠ invariant violated'; }
    }

    render();
    applyLayoutState();
    queueAutoPanelSizing();
    window.addEventListener('resize', () => {
      applyLayoutState();
      queueAutoPanelSizing();
    });
  </script>
</body>
</html>
