<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concept 19: Horizontal Flow — Precept Preview Reimagined</title>
  <link rel="stylesheet" href="preview-reimagined-shared.css" />
  <style>
    /* ================================================================
       CONCEPT 19 — HORIZONTAL FLOW
       ================================================================
       Three dedicated surface areas, stacked vertically:
         1. DATA PANEL — wide top band, front and center
         2. STATE DIAGRAM — horizontal left-to-right banner
         3. EVENT TIMELINE — horizontal left-to-right scrolling flow

       The event timeline is the key differentiator from Concept 18:
       past events flow left-to-right, present state in the middle,
       future events branch to the right.
       ================================================================ */

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* — Header — */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .header-file { color: var(--dusk); font-size: 11px; }

    .header-actions { display: flex; gap: 6px; }
    .header-actions button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font: inherit;
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 120ms;
    }
    .header-actions button:hover { border-color: var(--indigo); color: var(--indigo); }
    .header-actions button:active { transform: scale(0.96); }

    /* — Main stacked layout — */
    .main-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===============================================================
       SURFACE 1: DATA PANEL (wide top band — primary surface)
       =============================================================== */

    .data-panel {
      background: var(--bg);
      border-bottom: 1.5px solid var(--border);
      overflow-y: auto;
      padding: 14px 24px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 38vh;
      min-height: 160px;
      flex-shrink: 0;
    }

    .dp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }

    .dp-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
    }

    .dp-count {
      font-size: 9px;
      color: var(--dim);
    }

    /* 2-column grid for field cards */
    .dp-field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
    }

    .dp-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 8px 12px;
      background: rgba(17, 17, 20, 0.4);
      border: 1px solid rgba(39, 39, 42, 0.5);
      border-radius: 6px;
      transition: all 300ms ease;
    }

    .dp-field.recently-changed {
      border-color: rgba(52, 211, 153, 0.30);
      background: rgba(52, 211, 153, 0.04);
      animation: dataFlash 800ms ease-out;
    }

    .dp-field.editable {
      border-color: rgba(99, 102, 241, 0.25);
      cursor: pointer;
    }

    .dp-field.editable:hover {
      border-color: rgba(99, 102, 241, 0.45);
      background: rgba(99, 102, 241, 0.04);
    }

    .dp-field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .dp-field-name {
      font-size: 11px;
      color: var(--slate);
      font-weight: 500;
    }

    .dp-field-type {
      font-size: 9px;
      color: var(--slate-type);
      opacity: 0.7;
    }

    .dp-field-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--slate-val);
    }

    .dp-field-value.null {
      color: var(--muted);
      font-style: italic;
      font-size: 11px;
      font-weight: 400;
    }

    .dp-field-value.bool-true { color: var(--enabled); }
    .dp-field-value.bool-false { color: var(--blocked); opacity: 0.6; }

    .dp-edit-badge {
      font-size: 7px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--indigo);
      background: rgba(99, 102, 241, 0.10);
      border: 1px solid rgba(99, 102, 241, 0.20);
      border-radius: 3px;
      padding: 1px 5px;
    }

    /* Inline edit controls */
    .dp-edit-input {
      width: 100%;
      background: rgba(12, 12, 15, 0.7);
      border: 1px solid var(--indigo);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      padding: 4px 7px;
      border-radius: 4px;
      outline: none;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.12);
    }

    .dp-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
    }

    .dp-toggle .toggle-track {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: rgba(251, 113, 133, 0.15);
      border: 1px solid rgba(251, 113, 133, 0.30);
      position: relative;
      transition: all 200ms;
    }

    .dp-toggle .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blocked);
      opacity: 0.5;
      transition: all 200ms;
    }

    .dp-toggle.on .toggle-track {
      background: rgba(52, 211, 153, 0.20);
      border-color: rgba(52, 211, 153, 0.35);
    }

    .dp-toggle.on .toggle-track::after {
      left: 17px;
      background: var(--enabled);
      opacity: 1;
    }

    .dp-toggle-label {
      font-size: 11px;
      font-weight: 600;
    }

    /* Invariants + assertions in a horizontal strip below the field grid */
    .dp-constraints-strip {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .dp-constraint-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .dp-constraint-group-title {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 2px;
    }

    .dp-inv-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      padding: 2px 0;
    }

    .dp-inv-icon { font-size: 8px; }
    .dp-inv-item.ok .dp-inv-icon { color: var(--enabled); }
    .dp-inv-item.violated .dp-inv-icon { color: var(--blocked); }
    .dp-inv-item .dp-inv-msg { color: var(--gold); font-size: 10px; }

    .dp-assert-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      padding: 2px 0;
    }

    .dp-assert-item.ok { color: var(--enabled); }
    .dp-assert-item.violated { color: var(--blocked); }
    .dp-assert-item .dp-assert-msg { color: var(--gold); }

    .dp-constraint-target {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(176, 190, 197, 0.08);
      border: 1px solid rgba(176, 190, 197, 0.18);
      color: var(--slate);
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    /* ===============================================================
       SURFACE 2: STATE DIAGRAM (horizontal banner)
       =============================================================== */

    .state-diagram-panel {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .sd-panel-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
      flex-shrink: 0;
    }

    .sd-svg-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80px;
    }

    .sd-svg-container svg {
      width: 100%;
      max-width: 720px;
      height: auto;
    }

    /* State diagram node styles */
    .sd-node {
      fill: rgba(17, 17, 20, 0.4);
      stroke: #4338CA;
      stroke-width: 1.5;
      transition: fill 400ms ease, stroke 400ms ease, stroke-width 400ms ease;
    }

    .sd-node-initial {
      fill: rgba(17, 17, 20, 0.4);
      stroke: #4338CA;
      stroke-width: 2.5;
    }

    .sd-node-visited {
      fill: rgba(144, 150, 166, 0.08);
      stroke: var(--dusk);
      stroke-width: 1.5;
    }

    .sd-node-current {
      fill: rgba(168, 152, 245, 0.14);
      stroke: rgba(168, 152, 245, 0.9);
      stroke-width: 2;
    }

    .sd-node-terminal {
      fill: rgba(17, 17, 20, 0.4);
      stroke: #6366F1;
      stroke-width: 2;
    }

    .sd-node-terminal-outer {
      fill: none;
      stroke: rgba(99, 102, 241, 0.30);
      stroke-width: 1;
    }

    .sd-glow {
      fill: none;
      stroke: rgba(168, 152, 245, 0.25);
      stroke-width: 2;
      animation: sdGlowPulse 2.4s ease-in-out infinite;
    }

    @keyframes sdGlowPulse {
      0%, 100% { stroke-opacity: 0.15; }
      50% { stroke-opacity: 0.6; }
    }

    .sd-initial-dot {
      fill: #4338CA;
    }

    .sd-label {
      fill: rgba(113, 113, 122, 0.7);
      font-size: 9px;
      text-anchor: middle;
      font-family: inherit;
      pointer-events: none;
    }

    .sd-label-visited { fill: var(--dusk); }
    .sd-label-current { fill: var(--violet); font-weight: 700; font-size: 9.5px; }

    .sd-edge {
      stroke: rgba(39, 39, 42, 0.6);
      stroke-width: 1;
      fill: none;
      transition: stroke 400ms ease;
    }

    .sd-edge-traced {
      stroke: rgba(52, 211, 153, 0.35);
      stroke-width: 1.5;
    }

    .sd-edge-active {
      stroke: var(--enabled);
      stroke-width: 2;
      animation: sdEdgeFlash 900ms ease-out;
    }

    @keyframes sdEdgeFlash {
      0% { stroke: rgba(52, 211, 153, 0.9); stroke-width: 3; }
      100% { stroke: rgba(52, 211, 153, 0.35); stroke-width: 1.5; }
    }

    .sd-arrow {
      fill: rgba(39, 39, 42, 0.5);
      transition: fill 400ms ease;
    }

    .sd-arrow-traced { fill: rgba(52, 211, 153, 0.35); }
    .sd-arrow-active { fill: var(--enabled); animation: sdArrowFlash 900ms ease-out; }

    @keyframes sdArrowFlash {
      0% { fill: rgba(52, 211, 153, 0.9); }
      100% { fill: rgba(52, 211, 153, 0.35); }
    }

    .sd-edge-label {
      fill: rgba(113, 113, 122, 0.4);
      font-size: 7.5px;
      text-anchor: middle;
      font-family: inherit;
      pointer-events: none;
      transition: fill 300ms ease;
    }

    .sd-edge-label-traced { fill: var(--cyan); opacity: 0.8; }
    .sd-edge-label-active { fill: var(--cyan); opacity: 1; }

    .sd-self-loop {
      stroke: rgba(39, 39, 42, 0.35);
      stroke-width: 1;
      fill: none;
      transition: stroke 300ms ease;
    }

    .sd-self-active { stroke: rgba(52, 211, 153, 0.3); }
    .sd-self-flash { stroke: rgba(52, 211, 153, 0.6); stroke-width: 1.5; animation: sdSelfFlash 800ms ease-out; }

    @keyframes sdSelfFlash {
      0% { stroke: rgba(52, 211, 153, 0.9); stroke-width: 2.5; }
      100% { stroke: rgba(52, 211, 153, 0.6); stroke-width: 1.5; }
    }

    .sd-self-label {
      fill: rgba(113, 113, 122, 0.35);
      font-size: 7px;
      font-family: inherit;
      pointer-events: none;
    }

    /* ===============================================================
       SURFACE 3: EVENT TIMELINE (horizontal scroll)
       =============================================================== */

    .timeline-surface {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      padding: 16px 24px;
      position: relative;
      background: var(--bg);
    }

    .tl-h-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Horizontal flow container */
    .tl-horizontal-flow {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
      min-width: min-content;
    }

    /* — Past trail (horizontal) — */
    .past-trail-h {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .past-card {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid rgba(39, 39, 42, 0.5);
      border-radius: 8px;
      min-width: 130px;
      max-width: 170px;
      flex-shrink: 0;
      transition: border-color 200ms;
    }

    .past-card:hover {
      border-color: rgba(144, 150, 166, 0.35);
    }

    .past-card .pc-step {
      font-size: 8px;
      color: var(--muted);
      font-weight: 600;
    }

    .past-card .pc-event {
      font-size: 11px;
      color: var(--cyan);
      font-weight: 600;
    }

    .past-card .pc-outcome {
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .past-card .pc-outcome.transition { color: var(--enabled); }
    .past-card .pc-outcome.no-transition { color: var(--enabled); opacity: 0.7; }

    .past-card .pc-outcome .pc-state { color: var(--violet); font-weight: 600; }

    .past-card .pc-delta {
      font-size: 9px;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .past-card .pc-delta .field { color: var(--slate); }
    .past-card .pc-delta .after { color: var(--enabled); }

    /* Origin card (Draft start) */
    .origin-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid rgba(67, 56, 202, 0.30);
      border-radius: 8px;
      min-width: 70px;
      flex-shrink: 0;
    }

    .origin-card .oc-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4338CA;
      margin-bottom: 4px;
    }

    .origin-card .oc-label {
      font-size: 10px;
      color: var(--violet);
      font-weight: 600;
    }

    .origin-card .oc-sub {
      font-size: 8px;
      color: var(--muted);
    }

    /* Horizontal connector line between cards */
    .h-connector {
      width: 28px;
      height: 2px;
      background: linear-gradient(to right, rgba(144, 150, 166, 0.15), rgba(168, 152, 245, 0.30));
      flex-shrink: 0;
      align-self: center;
      border-radius: 1px;
    }

    .h-connector.past-to-present {
      width: 36px;
      background: linear-gradient(to right, rgba(168, 152, 245, 0.30), rgba(168, 152, 245, 0.50));
    }

    .h-connector.present-to-future {
      width: 36px;
      background: linear-gradient(to right, rgba(168, 152, 245, 0.50), rgba(48, 184, 232, 0.30));
    }

    /* — Present marker (horizontal) — */
    .present-marker-h {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 22px;
      background: var(--card);
      border: 1.5px solid rgba(168, 152, 245, 0.40);
      border-radius: 12px;
      flex-shrink: 0;
      min-width: 150px;
      position: relative;
      animation: spotlightIn 400ms ease-out;
    }

    .present-marker-h::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      pointer-events: none;
      box-shadow: 0 0 28px rgba(168, 152, 245, 0.08), 0 0 56px rgba(168, 152, 245, 0.04);
    }

    .present-marker-h.terminal-state { border-color: rgba(113, 113, 122, 0.35); }
    .present-marker-h.terminal-state::before { box-shadow: 0 0 28px rgba(113, 113, 122, 0.06); }

    .pm-h-state-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--violet);
      letter-spacing: -0.01em;
    }

    .pm-h-badges { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; justify-content: center; }

    .pm-h-badge {
      font-size: 7px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .pm-h-badge.current {
      border: 1px solid rgba(168, 152, 245, 0.40);
      color: var(--violet);
      background: rgba(168, 152, 245, 0.10);
    }

    .pm-h-badge.step-badge {
      border: 1px solid rgba(144, 150, 166, 0.25);
      color: var(--dusk);
      background: rgba(144, 150, 166, 0.06);
    }

    .pm-h-badge.terminal {
      border: 1px solid rgba(113, 113, 122, 0.30);
      color: var(--dim);
      background: rgba(113, 113, 122, 0.06);
    }

    .pm-h-subtitle {
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      max-width: 180px;
    }

    /* — Future events (stacked vertically to the right of present) — */
    .future-events-h {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
      padding-left: 10px;
    }

    .future-events-h::before {
      content: '';
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 2px;
      background: linear-gradient(to bottom, rgba(48, 184, 232, 0.25), rgba(48, 184, 232, 0.06));
      border-radius: 1px;
    }

    .future-card-h {
      display: flex;
      gap: 12px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 200ms, background 200ms, transform 200ms;
      cursor: default;
      min-width: 300px;
      max-width: 420px;
      position: relative;
    }

    .future-card-h::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 18px;
      width: 8px;
      height: 2px;
      background: rgba(48, 184, 232, 0.20);
    }

    .future-card-h::after {
      content: '';
      position: absolute;
      left: -14px;
      top: 14px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 2px solid rgba(48, 184, 232, 0.30);
      background: var(--bg);
    }

    .future-card-h.can-fire { cursor: pointer; }

    .future-card-h.can-fire:hover {
      border-color: rgba(48, 184, 232, 0.30);
      background: var(--card-hover);
      transform: translateX(3px);
    }

    .future-card-h.blocked-card { opacity: 0.60; }

    .future-card-h.blocked-card:hover {
      border-color: rgba(251, 113, 133, 0.15);
    }

    .ec-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .ec-icon.transition {
      background: rgba(52, 211, 153, 0.10);
      border: 1px solid rgba(52, 211, 153, 0.20);
      color: var(--enabled);
    }

    .ec-icon.no-transition {
      background: rgba(52, 211, 153, 0.06);
      border: 1px dashed rgba(52, 211, 153, 0.20);
      color: var(--enabled);
    }

    .ec-icon.blocked {
      background: rgba(251, 113, 133, 0.06);
      border: 1px solid rgba(251, 113, 133, 0.20);
      color: var(--blocked);
    }

    .ec-body { flex: 1; display: flex; flex-direction: column; gap: 3px; }

    .ec-name { font-size: 12px; font-weight: 600; color: var(--cyan); }

    .ec-outcome { font-size: 10px; display: flex; align-items: center; gap: 5px; }
    .ec-outcome.transition { color: var(--enabled); }
    .ec-outcome.no-transition { color: var(--enabled); opacity: 0.7; }
    .ec-outcome.rejected { color: var(--blocked); }

    .ec-guard { font-size: 9px; color: var(--dusk); }
    .ec-guard-status { font-size: 8px; padding: 1px 5px; border-radius: 3px; }
    .ec-guard-status.pass { color: var(--enabled); background: rgba(52, 211, 153, 0.08); border: 1px solid rgba(52, 211, 153, 0.20); }
    .ec-guard-status.fail { color: var(--blocked); background: rgba(251, 113, 133, 0.08); border: 1px solid rgba(251, 113, 133, 0.20); }

    .ec-mutations { font-size: 9px; color: var(--dim); line-height: 1.5; }
    .ec-rejection-msg { font-size: 9px; color: var(--gold); font-style: italic; }

    .ec-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .ec-arg { display: flex; align-items: center; gap: 3px; }

    .ec-arg label {
      font-size: 7px;
      color: var(--dusk);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .ec-arg input, .ec-arg select {
      width: 90px;
      background: rgba(12, 12, 15, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: var(--text);
      font: inherit;
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 3px;
      transition: border-color 150ms, box-shadow 150ms;
    }

    .ec-arg input::placeholder { color: var(--muted); font-style: italic; opacity: 0.7; }

    .ec-arg input:focus, .ec-arg select:focus {
      outline: none;
      border-color: var(--indigo);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.12);
    }

    .ec-fire-btn {
      font: inherit;
      font-size: 9px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      background: rgba(48, 184, 232, 0.08);
      white-space: nowrap;
      transition: all 150ms;
      position: relative;
    }

    .ec-fire-btn:hover { background: rgba(48, 184, 232, 0.22); }

    .ec-fire-btn:not(.blocked)::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 6px;
      border: 1.5px solid var(--cyan);
      opacity: 0;
      animation: btnPulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes btnPulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.40; transform: scale(1.06); }
    }

    .ec-fire-btn.blocked {
      border-color: var(--blocked);
      color: var(--blocked);
      background: rgba(251, 113, 133, 0.06);
      cursor: not-allowed;
      opacity: 0.6;
    }

    .ec-fire-btn.blocked::after { display: none; }

    /* — Terminal state message — */
    .terminal-message-h {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      color: var(--dim);
      font-size: 11px;
      flex-shrink: 0;
    }

    .terminal-message-h .tm-icon { font-size: 20px; margin-bottom: 6px; }

    /* — No past — */
    .no-past-h {
      display: flex;
      align-items: center;
      padding: 8px 14px;
      color: var(--muted);
      font-size: 10px;
      font-style: italic;
      flex-shrink: 0;
    }

    /* — Toast — */
    .toast {
      position: fixed;
      top: 50px;
      right: 20px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      z-index: 100;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 300ms ease;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    .toast.transition-toast {
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.35);
      color: var(--enabled);
    }

    .toast.no-transition-toast {
      background: rgba(52, 211, 153, 0.10);
      border: 1px solid rgba(52, 211, 153, 0.25);
      color: var(--enabled);
      opacity: 0.85;
    }

    .toast.rejected-toast {
      background: rgba(251, 113, 133, 0.12);
      border: 1px solid rgba(251, 113, 133, 0.30);
      color: var(--blocked);
    }

    /* — Status bar — */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
    }

    .status-left { display: flex; gap: 12px; }
    .status-ok { color: var(--enabled); }
    .status-warn { color: var(--gold); }

    /* — Animations — */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes spotlightIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes dataFlash {
      0% { background: rgba(52, 211, 153, 0.12); }
      100% { background: rgba(52, 211, 153, 0.03); }
    }

    /* — Responsive — */
    @media (max-width: 700px) {
      .dp-field-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="concept-badge">19 · HORIZONTAL FLOW</span>
      <span class="header-title">MaintenanceWorkOrder</span>
      <span class="sep">·</span>
      <span class="header-file">maintenance-work-order.precept</span>
    </div>
    <div class="header-actions">
      <button onclick="undoStep()">← Undo</button>
      <button onclick="resetSimulation()">↺ Reset</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main-layout">
    <!-- Surface 1: Data Panel (full-width top band) -->
    <div id="dataPanel" class="data-panel"></div>

    <!-- Surface 2: State Diagram (horizontal banner) -->
    <div class="state-diagram-panel">
      <div class="sd-panel-label">Topology</div>
      <div id="stateDiagram" class="sd-svg-container"></div>
    </div>

    <!-- Surface 3: Event Timeline (horizontal scroll) -->
    <div class="timeline-surface" id="timeline"></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-left">
      <span id="statusStep">Step 0</span>
      <span class="sep">·</span>
      <span id="statusInvariants" class="status-ok">✓ 2 invariants ok</span>
      <span class="sep">·</span>
      <span id="statusInfo">6 states · 7 events · 10 fields</span>
    </div>
    <div>
      <span><span style="color: var(--indigo);">Click</span> <span>an event name</span> to advance</span>
    </div>
  </div>

  <script>
    // ================================================================
    // MAINTENANCE WORK ORDER — Full state machine simulation
    // ================================================================

    const STATES = ['Draft', 'Open', 'Scheduled', 'InProgress', 'Completed', 'Cancelled'];

    const STATE_META = {
      Draft:      { initial: true,  terminal: false },
      Open:       { initial: false, terminal: false },
      Scheduled:  { initial: false, terminal: false },
      InProgress: { initial: false, terminal: false },
      Completed:  { initial: false, terminal: true  },
      Cancelled:  { initial: false, terminal: true  },
    };

    const FIELD_DEFS = {
      RequesterName:       { type: 'string',  nullable: true,  default: null },
      Location:            { type: 'string',  nullable: true,  default: null },
      IssueSummary:        { type: 'string',  nullable: true,  default: null },
      AssignedTechnician:  { type: 'string',  nullable: true,  default: null },
      EstimatedHours:      { type: 'number',  nullable: false, default: 0 },
      ActualHours:         { type: 'number',  nullable: false, default: 0 },
      Urgent:              { type: 'boolean', nullable: false, default: false },
      PartsApproved:       { type: 'boolean', nullable: false, default: false },
      CompletionNote:      { type: 'string',  nullable: true,  default: null },
      CancellationReason:  { type: 'string',  nullable: true,  default: null },
    };

    const INVARIANTS = [
      { expr: 'EstimatedHours >= 0', msg: 'Estimated hours cannot be negative',
        targets: ['EstimatedHours'], check: d => d.EstimatedHours >= 0 },
      { expr: 'ActualHours >= 0', msg: 'Actual hours cannot be negative',
        targets: ['ActualHours'], check: d => d.ActualHours >= 0 },
    ];

    // Editable fields per state
    const EDITABLE_FIELDS = {
      Draft: ['Location', 'IssueSummary', 'Urgent'],
    };

    // State assertions
    const STATE_ASSERTIONS = {
      Scheduled: [{ expr: 'AssignedTechnician != null', msg: 'Scheduled work must have an assigned technician',
                    targets: ['AssignedTechnician'], check: d => d.AssignedTechnician !== null }],
      Completed: [{ expr: 'CompletionNote != null', msg: 'Completed work orders need a completion note',
                    targets: ['CompletionNote'], check: d => d.CompletionNote !== null }],
    };

    // From-state assertions
    const FROM_ASSERTIONS = {
      InProgress: [{ expr: 'AssignedTechnician != null', msg: 'Active work cannot finish without a technician',
                     targets: ['AssignedTechnician'], check: d => d.AssignedTechnician !== null }],
    };

    // ================================================================
    // EVENT DEFINITIONS
    // ================================================================

    function getAvailableEvents(state, data) {
      const events = [];

      if (state === 'Draft') {
        events.push({
          name: 'Submit',
          args: [
            { name: 'Requester', type: 'string', placeholder: 'Jane Doe' },
            { name: 'WorkLocation', type: 'string', placeholder: 'Building A, Room 204' },
            { name: 'Summary', type: 'string', placeholder: 'HVAC not cooling' },
            { name: 'IsUrgent', type: 'boolean', default: false },
          ],
          rows: [{
            guard: null,
            guardDisplay: null,
            outcome: 'transition',
            target: 'Open',
            mutations: ['RequesterName = Requester', 'Location = WorkLocation', 'IssueSummary = Summary', 'Urgent = IsUrgent'],
            eventAsserts: [
              { expr: 'Requester != ""', msg: 'A requester name is required', check: (args) => args.Requester && args.Requester !== '' },
              { expr: 'WorkLocation != ""', msg: 'A location is required', check: (args) => args.WorkLocation && args.WorkLocation !== '' },
              { expr: 'Summary != ""', msg: 'An issue summary is required', check: (args) => args.Summary && args.Summary !== '' },
            ],
            canFire: (args) => {
              return args.Requester && args.Requester !== '' &&
                     args.WorkLocation && args.WorkLocation !== '' &&
                     args.Summary && args.Summary !== '';
            },
            blockReason: (args) => {
              if (!args.Requester || args.Requester === '') return 'A requester name is required';
              if (!args.WorkLocation || args.WorkLocation === '') return 'A location is required';
              if (!args.Summary || args.Summary === '') return 'An issue summary is required';
              return '';
            },
            apply: (d, args) => ({
              ...d,
              RequesterName: args.Requester,
              Location: args.WorkLocation,
              IssueSummary: args.Summary,
              Urgent: !!args.IsUrgent,
            }),
          }],
        });
      }

      if (state === 'Open') {
        events.push({
          name: 'Assign',
          args: [
            { name: 'Technician', type: 'string', placeholder: 'Bob Smith' },
            { name: 'Estimate', type: 'number', placeholder: '4' },
          ],
          rows: [{
            guard: null,
            guardDisplay: null,
            outcome: 'transition',
            target: 'Scheduled',
            mutations: ['AssignedTechnician = Technician', 'EstimatedHours = Estimate'],
            eventAsserts: [
              { expr: 'Technician != ""', msg: 'A technician is required', check: (args) => args.Technician && args.Technician !== '' },
              { expr: 'Estimate > 0', msg: 'Estimated hours must be positive', check: (args) => Number(args.Estimate) > 0 },
            ],
            canFire: (args) => {
              return args.Technician && args.Technician !== '' && Number(args.Estimate) > 0;
            },
            blockReason: (args) => {
              if (!args.Technician || args.Technician === '') return 'A technician is required';
              if (!Number(args.Estimate) || Number(args.Estimate) <= 0) return 'Estimated hours must be positive';
              return '';
            },
            apply: (d, args) => ({
              ...d,
              AssignedTechnician: args.Technician,
              EstimatedHours: Number(args.Estimate),
            }),
          }],
        });

        events.push({
          name: 'Cancel',
          args: [
            { name: 'Reason', type: 'string', placeholder: 'No longer needed', nullable: true, default: '' },
          ],
          rows: [{
            guard: null,
            guardDisplay: null,
            outcome: 'transition',
            target: 'Cancelled',
            mutations: ['CancellationReason = Reason'],
            eventAsserts: [
              { expr: 'Reason == null || Reason != ""', msg: 'A supplied cancellation reason cannot be blank',
                check: (args) => !args.Reason || args.Reason === '' || args.Reason.trim() !== '' },
            ],
            canFire: (args) => true,
            blockReason: () => '',
            apply: (d, args) => ({
              ...d,
              CancellationReason: args.Reason || null,
            }),
          }],
        });
      }

      if (state === 'Scheduled') {
        events.push({
          name: 'ApproveParts',
          args: [],
          rows: [{
            guard: null,
            guardDisplay: null,
            outcome: 'no-transition',
            target: null,
            mutations: ['PartsApproved = true'],
            eventAsserts: [],
            canFire: () => true,
            blockReason: () => '',
            apply: (d) => ({ ...d, PartsApproved: true }),
          }],
        });

        events.push({
          name: 'StartWork',
          args: [],
          rows: [
            {
              guard: '!Urgent || PartsApproved',
              guardDisplay: '!Urgent || PartsApproved',
              outcome: 'transition',
              target: 'InProgress',
              eventAsserts: [],
              canFire: (args, d) => !d.Urgent || d.PartsApproved,
              blockReason: () => 'Urgent work must have parts approved before it starts',
              apply: (d) => d,
            },
            {
              guard: null,
              guardDisplay: null,
              outcome: 'rejected',
              target: null,
              rejectMsg: 'Urgent work must have parts approved before it starts',
              eventAsserts: [],
              canFire: () => false,
              apply: (d) => d,
            },
          ],
        });

        events.push({
          name: 'Cancel',
          args: [
            { name: 'Reason', type: 'string', placeholder: 'Budget cut', nullable: true, default: '' },
          ],
          rows: [{
            guard: null,
            guardDisplay: null,
            outcome: 'transition',
            target: 'Cancelled',
            mutations: ['CancellationReason = Reason'],
            eventAsserts: [
              { expr: 'Reason == null || Reason != ""', msg: 'A supplied cancellation reason cannot be blank',
                check: (args) => !args.Reason || args.Reason === '' || args.Reason.trim() !== '' },
            ],
            canFire: (args) => true,
            blockReason: () => '',
            apply: (d, args) => ({
              ...d,
              CancellationReason: args.Reason || null,
            }),
          }],
        });
      }

      if (state === 'InProgress') {
        events.push({
          name: 'RecordProgress',
          args: [
            { name: 'Hours', type: 'number', placeholder: '2' },
          ],
          rows: [{
            guard: null,
            guardDisplay: null,
            outcome: 'no-transition',
            target: null,
            mutations: ['ActualHours = ActualHours + Hours'],
            eventAsserts: [
              { expr: 'Hours > 0', msg: 'Progress entries must be positive', check: (args) => Number(args.Hours) > 0 },
            ],
            canFire: (args) => Number(args.Hours) > 0,
            blockReason: () => 'Progress entries must be positive',
            apply: (d, args) => ({
              ...d,
              ActualHours: d.ActualHours + Number(args.Hours),
            }),
          }],
        });

        events.push({
          name: 'Complete',
          args: [
            { name: 'Note', type: 'string', placeholder: 'Fixed compressor unit' },
          ],
          rows: [
            {
              guard: 'ActualHours <= EstimatedHours + 4',
              guardDisplay: 'ActualHours <= EstimatedHours + 4',
              outcome: 'transition',
              target: 'Completed',
              mutations: ['CompletionNote = Note'],
              eventAsserts: [
                { expr: 'Note != ""', msg: 'A completion note is required', check: (args) => args.Note && args.Note !== '' },
              ],
              canFire: (args, d) => {
                return args.Note && args.Note !== '' && d.ActualHours <= d.EstimatedHours + 4;
              },
              blockReason: (args, d) => {
                if (!args.Note || args.Note === '') return 'A completion note is required';
                return 'Work orders that exceed the estimate by more than four hours need review first';
              },
              apply: (d, args) => ({
                ...d,
                CompletionNote: args.Note,
              }),
            },
            {
              guard: null,
              guardDisplay: null,
              outcome: 'rejected',
              target: null,
              rejectMsg: 'Work orders that exceed the estimate by more than four hours need review first',
              eventAsserts: [],
              canFire: () => false,
              apply: (d) => d,
            },
          ],
        });
      }

      return events;
    }

    // ================================================================
    // SIMULATION STATE
    // ================================================================

    function getDefaultData() {
      const d = {};
      for (const [k, v] of Object.entries(FIELD_DEFS)) {
        d[k] = v.default;
      }
      return d;
    }

    function getInitialSimulation() {
      return {
        currentState: 'Draft',
        data: getDefaultData(),
        history: [],
        stepCount: 0,
        visitedStates: new Set(['Draft']),
        changedFields: new Set(),
      };
    }

    let sim = getInitialSimulation();

    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

    // ================================================================
    // FIRE EVENT
    // ================================================================

    function fireEvent(eventName, rowIndex) {
      const events = getAvailableEvents(sim.currentState, sim.data);
      const evt = events.find(e => e.name === eventName);
      if (!evt) return;

      let row;
      if (rowIndex !== undefined) {
        row = evt.rows[rowIndex];
      } else {
        const args = gatherArgs(evt);
        row = evt.rows.find(r => r.canFire(args, sim.data)) || evt.rows[0];
      }

      const args = gatherArgs(evt);

      if (row.eventAsserts) {
        for (const a of row.eventAsserts) {
          if (!a.check(args)) {
            showToast(a.msg, 'rejected');
            return;
          }
        }
      }

      if (!row.canFire(args, sim.data)) {
        const reason = row.blockReason ? row.blockReason(args, sim.data) : (row.rejectMsg || 'Guard failed');
        showToast(reason, 'rejected');
        return;
      }

      const prevData = deepClone(sim.data);
      const prevState = sim.currentState;

      sim.data = row.apply(deepClone(sim.data), args);

      const deltas = [];
      for (const key of Object.keys(FIELD_DEFS)) {
        const before = prevData[key];
        const after = sim.data[key];
        if (JSON.stringify(before) !== JSON.stringify(after)) {
          deltas.push({ field: key, before, after });
        }
      }

      sim.changedFields = new Set(deltas.map(d => d.field));

      const toState = row.target || sim.currentState;
      sim.stepCount++;

      sim.history.push({
        stepNum: sim.stepCount,
        fromState: prevState,
        event: eventName,
        args: deepClone(args),
        toState,
        outcome: row.outcome,
        deltas,
        dataSnapshot: deepClone(sim.data),
      });

      sim.currentState = toState;
      sim.visitedStates.add(toState);

      if (row.outcome === 'transition') {
        showToast(`${eventName} -> ${toState}`, 'transition');
      } else {
        showToast(`${eventName} stayed in ${sim.currentState}`, 'no-transition');
      }

      render();

      // Scroll timeline to the right to show latest state
      const tl = document.getElementById('timeline');
      setTimeout(() => tl.scrollLeft = tl.scrollWidth, 50);
    }

    function gatherArgs(evt) {
      const args = {};
      evt.args.forEach(a => {
        const el = document.getElementById(`arg-${evt.name}-${a.name}`);
        if (el) {
          if (a.type === 'boolean') {
            args[a.name] = el.checked || el.value === 'true';
          } else if (a.type === 'number') {
            args[a.name] = el.value ? Number(el.value) : 0;
          } else {
            args[a.name] = el.value || '';
          }
        } else {
          args[a.name] = a.default !== undefined ? a.default : '';
        }
      });
      return args;
    }

    function resetSimulation() {
      sim = getInitialSimulation();
      render();
      showToast('Reset to Draft', 'transition');
    }

    function undoStep() {
      if (sim.history.length === 0) return;
      sim.history.pop();
      sim.stepCount = sim.history.length;

      if (sim.history.length > 0) {
        const last = sim.history[sim.history.length - 1];
        sim.currentState = last.toState;
        sim.data = deepClone(last.dataSnapshot);
      } else {
        sim.currentState = 'Draft';
        sim.data = getDefaultData();
      }

      sim.visitedStates = new Set(['Draft']);
      sim.history.forEach(h => {
        sim.visitedStates.add(h.fromState);
        sim.visitedStates.add(h.toState);
      });
      sim.visitedStates.add(sim.currentState);
      sim.changedFields = new Set();

      render();
      showToast(`Undid back to ${sim.currentState}`, 'no-transition');
    }

    // ================================================================
    // FIELD EDITING (in Draft state)
    // ================================================================

    function editField(fieldName, value) {
      const prevVal = sim.data[fieldName];
      sim.data[fieldName] = value;

      sim.stepCount++;
      sim.history.push({
        stepNum: sim.stepCount,
        fromState: sim.currentState,
        event: `edit ${fieldName}`,
        args: {},
        toState: sim.currentState,
        outcome: 'no-transition',
        deltas: [{ field: fieldName, before: prevVal, after: value }],
        dataSnapshot: deepClone(sim.data),
      });

      sim.changedFields = new Set([fieldName]);
      render();
    }

    function toggleUrgent() {
      if (sim.currentState !== 'Draft') return;
      editField('Urgent', !sim.data.Urgent);
      showToast(`Urgent changed to ${sim.data.Urgent}`, 'no-transition');
    }

    function commitEditField(fieldName) {
      const el = document.getElementById(`edit-${fieldName}`);
      if (!el) return;
      const val = el.value || null;
      if (val !== sim.data[fieldName]) {
        editField(fieldName, val);
        showToast(`${fieldName} updated`, 'no-transition');
      }
    }

    // ================================================================
    // TOAST
    // ================================================================

    let toastTimer = null;

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.className = `toast ${type}-toast show`;
      toast.textContent = type === 'transition' ? `> ${message}` :
                          type === 'rejected' ? `X ${message}` :
                          `~ ${message}`;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ================================================================
    // RENDER
    // ================================================================

    function render() {
      renderDataPanel();
      renderStateDiagram();
      renderTimeline();
      renderStatus();
    }

    // --- DATA PANEL (same as Concept 18 — verbatim) ---
    function renderDataPanel() {
      const el = document.getElementById('dataPanel');
      const editableSet = new Set(EDITABLE_FIELDS[sim.currentState] || []);

      let html = `<div class="dp-header">
        <span class="dp-title">Data</span>
        <span class="dp-count">${Object.keys(FIELD_DEFS).length} fields · ${sim.currentState}</span>
      </div>`;

      html += `<div class="dp-field-grid">`;
      for (const [name, def] of Object.entries(FIELD_DEFS)) {
        const val = sim.data[name];
        const isEditable = editableSet.has(name);
        const wasChanged = sim.changedFields.has(name);
        let cls = 'dp-field';
        if (wasChanged) cls += ' recently-changed';
        if (isEditable) cls += ' editable';

        html += `<div class="${cls}">`;
        html += `<div class="dp-field-header">`;
        html += `<span class="dp-field-name">${name}</span>`;
        html += `<span class="dp-field-type">${def.type}${def.nullable ? '?' : ''}</span>`;
        if (isEditable) html += `<span class="dp-edit-badge">editable</span>`;
        html += `</div>`;

        if (isEditable && def.type === 'boolean') {
          const onCls = val ? 'dp-toggle on' : 'dp-toggle';
          html += `<div class="${onCls}" onclick="toggleUrgent()">
            <div class="toggle-track"></div>
            <span class="dp-toggle-label" style="color: ${val ? 'var(--enabled)' : 'var(--blocked); opacity: 0.6'}">${val}</span>
          </div>`;
        } else if (isEditable && def.type === 'string') {
          html += `<input class="dp-edit-input" id="edit-${name}" type="text"
            value="${val !== null ? escHtml(String(val)) : ''}"
            placeholder="${def.nullable ? 'null' : ''}"
            onblur="commitEditField('${name}')"
            onkeydown="if(event.key==='Enter')this.blur()" />`;
        } else {
          html += renderFieldValue(val, def);
        }

        html += `</div>`;
      }
      html += `</div>`;

      // Constraints strip
      html += `<div class="dp-constraints-strip">`;

      html += `<div class="dp-constraint-group">`;
      html += `<div class="dp-constraint-group-title">Invariants</div>`;
      for (const inv of INVARIANTS) {
        const ok = inv.check(sim.data);
        html += `<div class="dp-inv-item ${ok ? 'ok' : 'violated'}">
          <span class="dp-inv-icon">${ok ? '\u2713' : '\u2715'}</span>
          <span class="dp-inv-msg">${inv.msg}</span>
          ${inv.targets ? inv.targets.map(t => `<span class="dp-constraint-target">${t}</span>`).join('') : ''}
        </div>`;
      }
      html += `</div>`;

      const stateAsserts = STATE_ASSERTIONS[sim.currentState];
      const fromAsserts = FROM_ASSERTIONS[sim.currentState];
      if (stateAsserts || fromAsserts) {
        html += `<div class="dp-constraint-group">`;
        html += `<div class="dp-constraint-group-title">State constraints · ${sim.currentState}</div>`;
        const allAsserts = [...(stateAsserts || []), ...(fromAsserts || [])];
        for (const a of allAsserts) {
          const ok = a.check(sim.data);
          html += `<div class="dp-assert-item ${ok ? 'ok' : 'violated'}">
            <span>${ok ? '\u2713' : '\u2715'}</span>
            <span class="dp-assert-msg">${a.msg}</span>
            ${a.targets ? a.targets.map(t => `<span class="dp-constraint-target">${t}</span>`).join('') : ''}
          </div>`;
        }
        html += `</div>`;
      }

      html += `</div>`;

      el.innerHTML = html;
    }

    function renderFieldValue(val, def) {
      if (val === null || val === undefined) {
        return `<span class="dp-field-value null">null</span>`;
      }
      if (def.type === 'boolean') {
        const cls = val ? 'dp-field-value bool-true' : 'dp-field-value bool-false';
        return `<span class="${cls}">${val}</span>`;
      }
      return `<span class="dp-field-value">${escHtml(String(val))}</span>`;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // --- STATE DIAGRAM (horizontal left-to-right banner) ---
    function renderStateDiagram() {
      const el = document.getElementById('stateDiagram');
      if (!el) return;

      const nW = 82, nH = 24, nR = 12;
      const xSpacing = 120;
      const yMain = 40;
      const yCancelled = 90;

      // Horizontal layout: Draft → Open → Scheduled → InProgress → Completed
      // Cancelled branches down from between Open and Scheduled
      const nodes = [
        { id: 'Draft',      x: 60,               y: yMain },
        { id: 'Open',       x: 60 + xSpacing,    y: yMain },
        { id: 'Scheduled',  x: 60 + xSpacing * 2, y: yMain },
        { id: 'InProgress', x: 60 + xSpacing * 3, y: yMain },
        { id: 'Completed',  x: 60 + xSpacing * 4, y: yMain },
        { id: 'Cancelled',  x: 60 + xSpacing * 2, y: yCancelled },
      ];

      const edges = [
        { from: 'Draft',      to: 'Open',       label: 'Submit' },
        { from: 'Open',       to: 'Scheduled',  label: 'Assign' },
        { from: 'Open',       to: 'Cancelled',  label: 'Cancel' },
        { from: 'Scheduled',  to: 'InProgress', label: 'StartWork' },
        { from: 'Scheduled',  to: 'Cancelled',  label: 'Cancel' },
        { from: 'InProgress', to: 'Completed',  label: 'Complete' },
      ];

      const selfLoops = {
        'Scheduled': ['ApproveParts'],
        'InProgress': ['RecordProgress'],
      };

      const nMap = {};
      nodes.forEach(n => nMap[n.id] = n);

      const lastStep = sim.history.length > 0 ? sim.history[sim.history.length - 1] : null;
      const lastEdge = lastStep && lastStep.fromState !== lastStep.toState
        ? { from: lastStep.fromState, to: lastStep.toState } : null;
      const lastSelfLoop = lastStep && lastStep.fromState === lastStep.toState && !lastStep.event.startsWith('edit')
        ? lastStep.fromState : null;

      const svgW = 60 + xSpacing * 4 + nW / 2 + 20;
      const svgH = yCancelled + nH / 2 + 20;

      function arrowPath(x1, y1, x2, y2, s) {
        const a = Math.atan2(y2 - y1, x2 - x1);
        return `M${x2.toFixed(1)},${y2.toFixed(1)} ` +
          `L${(x2 - s * Math.cos(a - 0.45)).toFixed(1)},${(y2 - s * Math.sin(a - 0.45)).toFixed(1)} ` +
          `L${(x2 - s * Math.cos(a + 0.45)).toFixed(1)},${(y2 - s * Math.sin(a + 0.45)).toFixed(1)} Z`;
      }

      let svg = `<svg viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

      // Draw edges
      edges.forEach(e => {
        const f = nMap[e.from], t = nMap[e.to];
        let x1, y1, x2, y2;

        if (t.y > f.y) {
          // Downward edge (to Cancelled)
          x1 = f.x; y1 = f.y + nH / 2;
          x2 = t.x; y2 = t.y - nH / 2;
        } else if (t.x > f.x && t.y === f.y) {
          // Horizontal right edge
          x1 = f.x + nW / 2; y1 = f.y;
          x2 = t.x - nW / 2; y2 = t.y;
        } else {
          x1 = f.x + nW / 2; y1 = f.y;
          x2 = t.x - nW / 2; y2 = t.y;
        }

        const isTraced = sim.history.some(h => h.fromState === e.from && h.toState === e.to);
        const isActive = lastEdge && lastEdge.from === e.from && lastEdge.to === e.to;

        let lCls = 'sd-edge', aCls = 'sd-arrow', tCls = 'sd-edge-label';
        if (isActive) { lCls += ' sd-edge-active'; aCls += ' sd-arrow-active'; tCls += ' sd-edge-label-active'; }
        else if (isTraced) { lCls += ' sd-edge-traced'; aCls += ' sd-arrow-traced'; tCls += ' sd-edge-label-traced'; }

        svg += `<line class="${lCls}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;
        svg += `<path class="${aCls}" d="${arrowPath(x1, y1, x2, y2, 5)}"/>`;

        let mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
        if (t.y > f.y) {
          mx += 30; // Label to the right of vertical edges
        } else {
          my -= 8; // Label above horizontal edges
        }
        svg += `<text class="${tCls}" x="${mx}" y="${my}">${e.label}</text>`;
      });

      // Self loops (above the node)
      for (const [sid, events] of Object.entries(selfLoops)) {
        const n = nMap[sid];
        const isFlash = lastSelfLoop === sid;
        let cls = 'sd-self-loop';
        if (isFlash) cls += ' sd-self-flash';

        const topY = n.y - nH / 2 - 1;
        svg += `<path class="${cls}" d="M${n.x - 10},${topY} C${n.x - 10},${topY - 16} ${n.x + 10},${topY - 16} ${n.x + 10},${topY}"/>`;
        svg += `<text class="sd-self-label" x="${n.x}" y="${topY - 16}" text-anchor="middle" style="font-size:6.5px">${events.join(', ')}</text>`;
      }

      // Draw nodes
      nodes.forEach(n => {
        const isCurrent = sim.currentState === n.id;
        const isVisited = sim.visitedStates.has(n.id);
        const meta = STATE_META[n.id];

        if (isCurrent) {
          if (meta.initial) {
            svg += `<circle class="sd-glow" cx="${n.x}" cy="${n.y}" r="${nR + 5}"/>`;
          } else {
            svg += `<rect class="sd-glow" x="${n.x - nW / 2 - 4}" y="${n.y - nH / 2 - 4}" width="${nW + 8}" height="${nH + 8}" rx="${nR + 3}"/>`;
          }
        }

        let nodeCls = 'sd-node';
        if (isCurrent) nodeCls = 'sd-node-current';
        else if (isVisited) nodeCls = 'sd-node-visited';

        if (meta.initial) {
          svg += `<circle class="${nodeCls}${meta.initial ? ' sd-node-initial' : ''}" cx="${n.x}" cy="${n.y}" r="${nR}" ${isCurrent ? 'style="stroke-width:2.5"' : ''}/>`;
          svg += `<circle class="sd-initial-dot" cx="${n.x}" cy="${n.y}" r="4" opacity="${isCurrent ? 1 : 0.5}"/>`;
        } else if (meta.terminal) {
          svg += `<rect class="sd-node-terminal-outer" x="${n.x - nW / 2 - 3}" y="${n.y - nH / 2 - 3}" width="${nW + 6}" height="${nH + 6}" rx="${nR + 2}"/>`;
          svg += `<rect class="${nodeCls} sd-node-terminal" x="${n.x - nW / 2}" y="${n.y - nH / 2}" width="${nW}" height="${nH}" rx="${nR}"/>`;
        } else {
          svg += `<rect class="${nodeCls}" x="${n.x - nW / 2}" y="${n.y - nH / 2}" width="${nW}" height="${nH}" rx="${nR}"/>`;
        }

        let lblCls = 'sd-label';
        if (isCurrent) lblCls = 'sd-label sd-label-current';
        else if (isVisited) lblCls = 'sd-label sd-label-visited';
        svg += `<text class="${lblCls}" x="${n.x}" y="${n.y + 3.5}">${n.id}</text>`;
      });

      svg += '</svg>';
      el.innerHTML = svg;
    }

    // --- EVENT TIMELINE (horizontal left-to-right flow) ---
    function renderTimeline() {
      const el = document.getElementById('timeline');
      const isTerminal = STATE_META[sim.currentState].terminal;

      let html = `<div class="tl-h-label">Timeline</div>`;
      html += `<div class="tl-horizontal-flow">`;

      // === PAST ===
      if (sim.history.length === 0) {
        html += `<div class="no-past-h">No events yet</div>`;
        html += `<div class="h-connector past-to-present"></div>`;
      } else {
        html += `<div class="past-trail-h">`;

        // Origin card
        html += `<div class="origin-card">
          <div class="oc-dot"></div>
          <div class="oc-label">Draft</div>
          <div class="oc-sub">origin</div>
        </div>`;

        sim.history.forEach((h, i) => {
          html += `<div class="h-connector"></div>`;

          html += `<div class="past-card" style="animation: fadeSlideIn 300ms ease-out ${i * 80}ms both">`;
          html += `<div class="pc-step">#${h.stepNum}</div>`;
          html += `<div class="pc-event">${escHtml(h.event)}</div>`;

          html += `<div class="pc-outcome ${h.outcome}">`;
          if (h.outcome === 'transition') {
            html += `\u2192 <span class="pc-state">${h.toState}</span>`;
          } else {
            html += `\u21bb <span class="pc-state">${h.fromState}</span>`;
          }
          html += `</div>`;

          // Show first delta as a compact summary
          if (h.deltas.length > 0) {
            const d = h.deltas[0];
            const suffix = h.deltas.length > 1 ? ` +${h.deltas.length - 1}` : '';
            html += `<div class="pc-delta"><span class="field">${d.field}</span> = <span class="after">${formatVal(d.after)}</span>${suffix}</div>`;
          }

          html += `</div>`; // .past-card
        });

        html += `</div>`; // .past-trail-h
        html += `<div class="h-connector past-to-present"></div>`;
      }

      // === PRESENT ===
      html += `<div class="present-marker-h ${isTerminal ? 'terminal-state' : ''}">
        <div class="pm-h-state-name">${sim.currentState}</div>
        <div class="pm-h-badges">
          <span class="pm-h-badge current">current</span>
          <span class="pm-h-badge step-badge">step ${sim.stepCount}</span>
          ${isTerminal ? '<span class="pm-h-badge terminal">terminal</span>' : ''}
          ${EDITABLE_FIELDS[sim.currentState] ? '<span class="pm-h-badge step-badge">\u270e editable</span>' : ''}
        </div>
        <div class="pm-h-subtitle">${getStateDescription(sim.currentState)}</div>
      </div>`;

      // === FUTURE ===
      if (isTerminal) {
        html += `<div class="h-connector present-to-future"></div>`;
        const icon = sim.currentState === 'Completed' ? '\u2713' : '\u2298';
        html += `<div class="terminal-message-h">
          <div class="tm-icon">${icon}</div>
          <div>${sim.currentState} — terminal, no further events.</div>
        </div>`;
      } else {
        html += `<div class="h-connector present-to-future"></div>`;

        const events = getAvailableEvents(sim.currentState, sim.data);
        html += `<div class="future-events-h">`;

        events.forEach(evt => {
          const primaryRow = evt.rows[0];
          const isBlocked = !primaryRow.canFire({}, sim.data) && primaryRow.guard;
          const outcomeType = primaryRow.outcome;

          html += `<div class="future-card-h ${isBlocked ? 'blocked-card' : 'can-fire'}">`;

          html += `<div class="ec-icon ${outcomeType === 'rejected' ? 'blocked' : outcomeType === 'no-transition' ? 'no-transition' : 'transition'}">`;
          if (outcomeType === 'transition') html += '\u2192';
          else if (outcomeType === 'no-transition') html += '\u21bb';
          else html += '\u2715';
          html += `</div>`;

          html += `<div class="ec-body">`;
          html += `<div style="display:flex;align-items:center;gap:6px;">
            <span class="ec-name">${evt.name}</span>`;

          if (outcomeType === 'transition') {
            html += `<span class="ec-outcome transition">\u2192 <span style="color:var(--violet);font-weight:600">${primaryRow.target}</span></span>`;
          } else if (outcomeType === 'no-transition') {
            html += `<span class="ec-outcome no-transition">\u21bb stays in <span style="color:var(--violet);font-weight:600">${sim.currentState}</span></span>`;
          }
          html += `</div>`;

          if (primaryRow.guardDisplay) {
            const guardPasses = primaryRow.canFire({}, sim.data);
            html += `<div style="display:flex;align-items:center;gap:5px;">
              <span class="ec-guard">guard: ${primaryRow.guardDisplay}</span>
              <span class="ec-guard-status ${guardPasses ? 'pass' : 'fail'}">${guardPasses ? '\u2713 pass' : '\u2715 blocked'}</span>
            </div>`;
          }

          if (primaryRow.mutations && primaryRow.mutations.length > 0) {
            html += `<div class="ec-mutations">${primaryRow.mutations.map(m => `<span style="color:var(--dusk)">set</span> ${m}`).join('<br>')}</div>`;
          }

          if (evt.rows.length > 1 && evt.rows[1].outcome === 'rejected') {
            const rejectRow = evt.rows[1];
            if (rejectRow.rejectMsg && isBlocked) {
              html += `<div class="ec-rejection-msg">"${rejectRow.rejectMsg}"</div>`;
            }
          }

          if (primaryRow.eventAsserts && primaryRow.eventAsserts.length > 0) {
            html += `<div style="font-size:8px;color:var(--dim);margin-top:2px;">`;
            primaryRow.eventAsserts.forEach(a => {
              html += `<span style="margin-right:6px;">assert: <span style="color:var(--gold)">${a.msg}</span></span>`;
            });
            html += `</div>`;
          }

          html += `<div class="ec-actions">`;
          evt.args.forEach(a => {
            if (a.type === 'boolean') {
              html += `<div class="ec-arg">
                <label>${a.name}</label>
                <select id="arg-${evt.name}-${a.name}">
                  <option value="false" ${!a.default ? 'selected' : ''}>false</option>
                  <option value="true" ${a.default ? 'selected' : ''}>true</option>
                </select>
              </div>`;
            } else {
              html += `<div class="ec-arg">
                <label>${a.name}</label>
                <input id="arg-${evt.name}-${a.name}" type="${a.type === 'number' ? 'number' : 'text'}"
                  placeholder="${a.placeholder || ''}" />
              </div>`;
            }
          });

          if (!isBlocked || !primaryRow.guard) {
            html += `<button class="ec-fire-btn" onclick="fireEvent('${evt.name}')">${evt.name}</button>`;
          } else {
            html += `<button class="ec-fire-btn blocked">${evt.name}</button>`;
          }

          html += `</div>`; // .ec-actions
          html += `</div>`; // .ec-body
          html += `</div>`; // .future-card-h
        });

        html += `</div>`; // .future-events-h
      }

      html += `</div>`; // .tl-horizontal-flow
      el.innerHTML = html;
    }

    function formatVal(v) {
      if (v === null || v === undefined) return 'null';
      if (typeof v === 'boolean') return String(v);
      return escHtml(String(v));
    }

    function getStateDescription(state) {
      const descs = {
        Draft: 'New work order — fill in details and submit.',
        Open: 'Submitted and awaiting assignment to a technician.',
        Scheduled: 'Technician assigned — approve parts or start work.',
        InProgress: 'Work underway — record progress or complete.',
        Completed: 'Work finished and closed.',
        Cancelled: 'Work order cancelled.',
      };
      return descs[state] || '';
    }

    // --- STATUS BAR ---
    function renderStatus() {
      document.getElementById('statusStep').textContent = `Step ${sim.stepCount}`;

      const invOk = INVARIANTS.every(i => i.check(sim.data));
      const invEl = document.getElementById('statusInvariants');
      if (invOk) {
        invEl.className = 'status-ok';
        invEl.textContent = `\u2713 ${INVARIANTS.length} invariants ok`;
      } else {
        invEl.className = 'status-warn';
        invEl.textContent = `\u26a0 invariant violated`;
      }
    }

    // --- Initial render ---
    render();
  </script>
</body>
</html>
