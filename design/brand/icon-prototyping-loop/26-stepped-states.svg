<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Five governed tiers — a stepped tower that must be ascended level by level.
    Each tier is a structurally distinct state. The definition is the geometry:
    no tier overlaps, no transition skips a step, no invalid level can exist
    between the governed steps. The structure cannot be in an intermediate
    state — it is always exactly at one tier or another, never between.
    Same definition, same steps, same summit — always.
  -->
  <defs>
    <linearGradient id="tier-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A5498"/>
      <stop offset="100%" stop-color="#1A3864"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#080A0E"/>

  <!-- Tier 1 — base (widest) -->
  <rect x="64"  y="372" width="384" height="60" rx="4" fill="url(#tier-g)"/>
  <line x1="64"  y1="372" x2="448" y2="372" stroke="#3A6AB8" stroke-width="2"/>

  <!-- Tier 2 -->
  <rect x="102" y="300" width="308" height="60" rx="4" fill="url(#tier-g)"/>
  <line x1="102" y1="300" x2="410" y2="300" stroke="#3A6AB8" stroke-width="2"/>

  <!-- Tier 3 -->
  <rect x="140" y="228" width="232" height="60" rx="4" fill="url(#tier-g)"/>
  <line x1="140" y1="228" x2="372" y2="228" stroke="#3A6AB8" stroke-width="2"/>

  <!-- Tier 4 -->
  <rect x="178" y="156" width="156" height="60" rx="4" fill="url(#tier-g)"/>
  <line x1="178" y1="156" x2="334" y2="156" stroke="#3A6AB8" stroke-width="2"/>

  <!-- Tier 5 — top (narrowest) -->
  <rect x="216" y="84"  width="80"  height="60" rx="4" fill="url(#tier-g)"/>
  <line x1="216" y1="84"  x2="296" y2="84"  stroke="#3A6AB8" stroke-width="2"/>
</svg>
