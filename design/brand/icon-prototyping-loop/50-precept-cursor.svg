<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    The first line of every Precept definition:
      precept EntityName

    This is where the contract begins. You write `precept` followed
    by the entity name, and the compiler begins building the governed
    engine. Nothing before this line exists. Everything after follows.

    At 32px: a dim block of text with a bright vertical cursor.
    The cursor IS the moment of authorship — just before the definition is complete.
    At 512px: the monospace keyword is readable; the `|` cursor blinks at the end.

    The icon captures the one instant when a Precept contract comes into existence.
  -->

  <rect width="512" height="512" fill="#1A1A1A"/>

  <defs>
    <filter id="cursor-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- The `precept` keyword — dim blue, like a keyword in a dark editor -->
  <text
    x="52" y="288"
    font-family="'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace"
    font-size="96"
    font-weight="400"
    fill="#569CD6"
    text-anchor="start"
    dominant-baseline="central"
  >precept</text>

  <!-- A space then entity name — even dimmer -->
  <text
    x="52" y="384"
    font-family="'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace"
    font-size="96"
    font-weight="400"
    fill="#DCDCAA"
    text-anchor="start"
    dominant-baseline="central"
  >Entity</text>

  <!-- Cursor | at the end — bright, glowing, the point of authorship -->
  <rect x="380" y="340" width="12" height="80" rx="3" fill="#1FFF7A" filter="url(#cursor-glow)"/>
</svg>
