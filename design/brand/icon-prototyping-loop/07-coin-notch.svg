<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    A solid disc with one precise triangular notch at the top.
    The notch is the single valid passage — everything else is material.
    Invalid states are not refused; they simply do not exist as openings.
    The disc is what Precept's compiled definition IS: a solid, single,
    complete structure with exactly one governed entry point per state.
  -->

  <rect width="512" height="512" fill="#0D1018"/>

  <!-- The solid governed disc -->
  <circle cx="256" cy="272" r="196" fill="#1E3258"/>

  <!--
    Precise triangular notch at top-center — the single valid structural opening.
    Triangle apex points down into the disc; base is flush with the top arc.
    v-cut: left edge at (216,76), right edge at (296,76), apex at (256,152).
  -->
  <polygon points="216,76 296,76 256,152" fill="#0D1018"/>

  <!--
    Bright accent ring just inside the disc edge — the "inspection boundary":
    you can always see the full governed domain from the outside.
  -->
  <circle cx="256" cy="272" r="196" stroke="#2C5FA8" stroke-width="5" fill="none"/>

  <!--
    A small bright notch highlight — the one valid path glows,
    showing it is designed and intentional, not accidental.
  -->
  <line x1="216" y1="76" x2="256" y2="152" stroke="#4A8EFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="296" y1="76" x2="256" y2="152" stroke="#4A8EFF" stroke-width="3.5" stroke-linecap="round"/>
</svg>
