<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Two dark solid blocks with a permanent glowing inspection window between them.
    The blocks are the governed contract — bounded, opaque, immovable.
    The luminous gap is Precept's Inspect operation: always available, always lit,
    impossible to close. You can look inside from any state, at any time,
    without executing anything. Prevention is the closed material;
    inspectability is the open light.
  -->
  <defs>
    <linearGradient id="slab-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3060"/>
      <stop offset="100%" stop-color="#0E1A38"/>
    </linearGradient>
    <linearGradient id="slab-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1A38"/>
      <stop offset="100%" stop-color="#1E3060"/>
    </linearGradient>
    <linearGradient id="slot-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A7AFF" stop-opacity="0.2"/>
      <stop offset="20%"  stop-color="#80BAFF"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="80%"  stop-color="#80BAFF"/>
      <stop offset="100%" stop-color="#3A7AFF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#070C14"/>

  <!-- Top governed block -->
  <rect x="72" y="136" width="368" height="100" rx="8" fill="url(#slab-t)"/>

  <!-- Bottom governed block -->
  <rect x="72" y="276" width="368" height="100" rx="8" fill="url(#slab-b)"/>

  <!-- Outer glow halo -->
  <rect x="48" y="224" width="416" height="64" fill="#3A7AFF" fill-opacity="0.06"/>

  <!-- Inner glow layer -->
  <rect x="72" y="238" width="368" height="36" fill="#5A9FFF" fill-opacity="0.12"/>

  <!-- Bright inspection slot -->
  <rect x="72" y="244" width="368" height="24" fill="url(#slot-g)"/>

  <!-- Core bright line -->
  <rect x="72" y="254" width="368" height="4" fill="#FFFFFF" fill-opacity="0.80"/>

  <!-- Inner frame — top slab -->
  <rect x="78" y="142" width="356" height="88" rx="5"
        fill="none" stroke="#2A4880" stroke-width="1.5" stroke-opacity="0.40"/>

  <!-- Inner frame — bottom slab -->
  <rect x="78" y="282" width="356" height="88" rx="5"
        fill="none" stroke="#2A4880" stroke-width="1.5" stroke-opacity="0.40"/>
</svg>
