<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" fill="#191C22"/>

  <!-- Predecessor (gray pill, top) -->
  <rect x="204" y="56" width="104" height="46" rx="23" stroke="#3F4F6B" stroke-width="5"/>

  <!-- Pred → Current -->
  <line x1="256" y1="102" x2="256" y2="158" stroke="#3F4F6B" stroke-width="5" stroke-linecap="round"/>

  <!-- Current state: circle = active decision/policy node -->
  <circle cx="256" cy="198" r="40" fill="#061510" stroke="#1FFF7A" stroke-width="6"/>
  <circle cx="256" cy="198" r="11" fill="#1FFF7A"/>

  <!-- Current → NextOpen (green) -->
  <line x1="256" y1="238" x2="256" y2="286" stroke="#1FFF7A" stroke-width="5" stroke-linecap="round"/>
  <!-- arrowhead points cleanly toward NextOpen top edge -->
  <path d="M248 278 L256 292 L264 278" fill="#1FFF7A"/>

  <!-- NextOpen (green stroke pill) -->
  <rect x="204" y="292" width="104" height="46" rx="23" stroke="#1FFF7A" stroke-width="5"/>

  <!-- Loop arc: NextOpen left → Current left -->
  <path d="M204 315C124 315 122 198 216 198" stroke="#3F4F6B" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Blocked path (dashed red): Current right → Blocked -->
  <path d="M296 198C352 198 366 283 322 283" stroke="#FF3D67" stroke-width="5" stroke-dasharray="10 10" stroke-linecap="round"/>

  <!-- Blocked node (red stroke pill) -->
  <rect x="322" y="260" width="110" height="46" rx="23" stroke="#FF3D67" stroke-width="5"/>
</svg>
