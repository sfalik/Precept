<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    The QED mark — a solid filled square placed at the end of a proof to show
    that all argument is closed. Precept's compiler walks every path from every
    state, checks every constraint and transition, and closes the proof before
    any instance can run. The outer frame is the complete governing contract;
    the inner solid mark is the certified result. When the compiler says "sound,"
    no argument remains open. Two shapes. Zero ambiguity. Complete.
  -->

  <rect width="512" height="512" fill="#07080C"/>

  <!-- Outer frame — the complete governing contract -->
  <rect x="80" y="80" width="352" height="352" rx="6"
        fill="none" stroke="#E8E0D4" stroke-width="18"/>

  <!-- Inner solid square — the QED mark: proof complete, closed, certified -->
  <rect x="168" y="168" width="176" height="176" fill="#E8E0D4"/>
</svg>
