<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Three equal standing pillars — the three unbreakable guarantees of Precept:
    1. Prevention: invalid states are structurally impossible.
    2. Inspectability: every possible outcome is always visible.
    3. Determinism: same definition + same data = same result.

    These are not principles that can be overridden at runtime.
    They are structural uprights: columns that cannot lean, bend, or fail
    without the entire definition collapsing. They hold in isolation and in union.

    Architecture of law. Stone, not software.
  -->

  <defs>
    <linearGradient id="pillar-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4900A"/>
      <stop offset="100%" stop-color="#8A5A06"/>
    </linearGradient>
    <linearGradient id="pillar-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C88008"/>
      <stop offset="100%" stop-color="#7A4E04"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="#09090E"/>

  <!-- Left pillar -->
  <rect x="104" y="90" width="72" height="332" rx="4" fill="url(#pillar-left)"/>

  <!-- Center pillar (slightly taller — the primary guarantee) -->
  <rect x="220" y="72" width="72" height="350" rx="4" fill="url(#pillar-g)"/>

  <!-- Right pillar -->
  <rect x="336" y="90" width="72" height="332" rx="4" fill="url(#pillar-left)"/>

  <!--
    Common base — all three pillars rest on one foundation.
    The foundation is the .precept definition: one file, all three guarantees.
  -->
  <rect x="88" y="422" width="336" height="24" rx="3" fill="#C48008"/>

  <!--
    Capital at top of each pillar (the weight-bearing top)
  -->
  <rect x="96" y="84" width="88" height="12" rx="2" fill="#D8940C"/>
  <rect x="212" y="64" width="88" height="12" rx="2" fill="#E0A010"/>
  <rect x="328" y="84" width="88" height="12" rx="2" fill="#D8940C"/>
</svg>
