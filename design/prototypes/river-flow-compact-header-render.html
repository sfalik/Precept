<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>River Flow Compact Header Render</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Geist:wght@400;500;600&display=swap">
<style>
  :root {
    --bg: #040506;
    --panel: #090b0e;
    --panel-2: #07090c;
    --line: rgba(255, 255, 255, 0.08);
    --line-soft: rgba(255, 255, 255, 0.04);
    --text: #eef2f6;
    --muted: #a7afbb;
    --soft: #687281;
    --state: #a898f5;
    --event: #30b8e8;
    --data: #b0bec5;
    --valid: #34d399;
    --blocked: #fb7185;
    --mono: "Geist Mono", "Cascadia Code", Consolas, monospace;
    --sans: "Geist", "Segoe UI Variable Text", "Segoe UI", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    padding: 20px;
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: min(900px, calc(100vw - 24px));
  }

  svg {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>
  <div class="frame">
    <svg viewBox="0 0 920 210" role="img" aria-labelledby="render-title render-desc">
      <title id="render-title">Compact top-right header chip render for Requested to Approved to ReadyForPickup, branching to PickedUp and Expired</title>
      <desc id="render-desc">A restrained header strip with a compact top-right river-flow chip. Requested, Approved, and ReadyForPickup form the completed path; PickUp is available to PickedUp and Expire is blocked to Expired.</desc>

      <style>
        .mono { font-family: var(--mono); }
        .sans { font-family: var(--sans); }
        .eyebrow {
          fill: var(--soft);
          font-family: var(--mono);
          font-size: 9.5px;
          letter-spacing: 0.14em;
          text-transform: uppercase;
        }
        .record-title {
          fill: var(--text);
          font-family: var(--sans);
          font-size: 23px;
          font-weight: 600;
          letter-spacing: -0.03em;
        }
        .record-meta {
          fill: var(--muted);
          font-family: var(--mono);
          font-size: 11px;
          letter-spacing: 0.04em;
        }
        .chip-text {
          fill: var(--text);
          font-family: var(--mono);
          font-size: 8px;
          font-weight: 600;
          letter-spacing: 0.03em;
        }
        .state-label {
          fill: var(--muted);
          font-family: var(--sans);
          font-size: 9.5px;
          font-weight: 500;
          letter-spacing: 0.01em;
        }
        .state-label-soft {
          fill: rgba(167, 175, 187, 0.72);
          font-family: var(--sans);
          font-size: 9px;
          font-weight: 500;
          letter-spacing: 0.01em;
        }
        .state-label-current {
          fill: rgba(232, 235, 245, 0.94);
          font-family: var(--sans);
          font-size: 9.5px;
          font-weight: 600;
          letter-spacing: 0.01em;
        }
        .surface {
          fill: var(--panel);
          stroke: var(--line);
          stroke-width: 1;
        }
        .surface-inner {
          fill: var(--panel-2);
          stroke: var(--line);
          stroke-width: 1;
        }
        .divider {
          stroke: var(--line);
          stroke-width: 1;
        }
        .divider-soft {
          stroke: var(--line-soft);
          stroke-width: 1;
        }
        .track-base {
          fill: none;
          stroke: rgba(168, 152, 245, 0.24);
          stroke-width: 1.6;
          stroke-linecap: square;
          stroke-linejoin: miter;
        }
        .track-history {
          fill: none;
          stroke: rgba(168, 152, 245, 0.94);
          stroke-width: 1.9;
          stroke-linecap: square;
          stroke-linejoin: miter;
        }
        .track-branch-available {
          fill: none;
          stroke: rgba(52, 211, 153, 0.9);
          stroke-width: 1.9;
          stroke-linecap: square;
          stroke-linejoin: miter;
        }
        .track-branch-blocked {
          fill: none;
          stroke: rgba(251, 113, 133, 0.74);
          stroke-width: 1.8;
          stroke-linecap: square;
          stroke-linejoin: miter;
          stroke-dasharray: 3 3;
        }
        .mini-chip-group {
          cursor: pointer;
          outline: none;
        }
        .mini-chip {
          stroke-linejoin: round;
          stroke-width: 1;
          transition: fill 140ms ease, stroke 140ms ease, filter 140ms ease;
        }
        .mini-chip-available {
          fill: rgba(11, 36, 29, 0.96);
          stroke: rgba(93, 233, 181, 0.78);
          filter: drop-shadow(0 1px 3px rgba(8, 20, 16, 0.42));
        }
        .mini-chip-blocked {
          fill: rgba(50, 16, 25, 0.96);
          stroke: rgba(255, 147, 164, 0.7);
          filter: drop-shadow(0 1px 3px rgba(28, 8, 13, 0.4));
        }
        .mini-chip-dot {
          transition: fill 140ms ease;
        }
        .mini-chip-group:hover .mini-chip,
        .mini-chip-group:focus-visible .mini-chip {
          filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.34));
        }
        .mini-chip-group:hover .mini-chip-available,
        .mini-chip-group:focus-visible .mini-chip-available {
          fill: rgba(14, 46, 36, 0.98);
          stroke: rgba(123, 244, 196, 0.94);
        }
        .mini-chip-group:hover .mini-chip-blocked,
        .mini-chip-group:focus-visible .mini-chip-blocked {
          fill: rgba(62, 21, 31, 0.98);
          stroke: rgba(255, 171, 184, 0.92);
        }
        .mini-chip-group:hover .mini-chip-dot.available,
        .mini-chip-group:focus-visible .mini-chip-dot.available {
          fill: rgba(145, 255, 214, 0.98);
        }
        .mini-chip-group:hover .mini-chip-dot.blocked,
        .mini-chip-group:focus-visible .mini-chip-dot.blocked {
          fill: rgba(255, 184, 195, 0.96);
        }
        .mini-chip-group:hover .chip-text,
        .mini-chip-group:focus-visible .chip-text {
          fill: rgba(255, 255, 255, 0.98);
        }
      </style>

      <rect x="80" y="54" width="760" height="104" rx="18" class="surface" />
      <line x1="526" y1="72" x2="526" y2="140" class="divider-soft" />

      <g>
        <text x="118" y="86" class="eyebrow">VisitorBadgePickup</text>
        <text x="118" y="111" class="record-title">#VBP-2847</text>
        <text x="118" y="133" class="record-meta">Ada Reyes</text>
      </g>

      <g>
        <rect x="554" y="73" width="252" height="66" rx="14" class="surface-inner" />

        <polyline points="582,108 624,108 686,108" class="track-base" />
        <polyline points="686,108 708,108 708,86 778,86" class="track-base" />
        <polyline points="686,108 708,108 708,132 778,132" class="track-base" />

        <polyline points="582,108 624,108 686,108" class="track-history" />
        <polyline points="686,108 708,108 708,86 778,86" class="track-branch-available" />
        <polyline points="686,108 708,108 708,132 778,132" class="track-branch-blocked" />

        <g class="mini-chip-group" role="button" tabindex="0" aria-label="PickUp event is available">
          <rect x="725" y="76" width="42" height="14" rx="7" class="mini-chip mini-chip-available" />
          <circle cx="734" cy="83" r="2.1" class="mini-chip-dot available" fill="rgba(96, 242, 191, 0.96)" />
          <text x="747" y="86.4" text-anchor="middle" class="chip-text">PickUp</text>
        </g>

        <g class="mini-chip-group" role="button" tabindex="0" aria-label="Expire event is blocked">
          <rect x="723" y="120" width="44" height="14" rx="7" class="mini-chip mini-chip-blocked" />
          <circle cx="732" cy="127" r="2.1" class="mini-chip-dot blocked" fill="rgba(255, 152, 169, 0.92)" />
          <text x="746" y="130.4" text-anchor="middle" class="chip-text" opacity="0.94">Expire</text>
        </g>

        <circle cx="582" cy="108" r="4.5" fill="var(--panel-2)" stroke="rgba(168, 152, 245, 0.44)" stroke-width="1.3" />
        <circle cx="582" cy="108" r="1.8" fill="rgba(168, 152, 245, 0.84)" />

        <circle cx="624" cy="108" r="4.5" fill="var(--panel-2)" stroke="rgba(168, 152, 245, 0.5)" stroke-width="1.3" />
        <circle cx="624" cy="108" r="1.9" fill="rgba(168, 152, 245, 0.9)" />

        <circle cx="686" cy="108" r="9.5" fill="#151922" stroke="var(--state)" stroke-width="1.8" />
        <circle cx="686" cy="108" r="3.5" fill="var(--state)" />

        <circle cx="778" cy="86" r="10" fill="var(--panel-2)" stroke="rgba(168, 152, 245, 0.9)" stroke-width="1.6" />
        <circle cx="778" cy="86" r="5.7" fill="none" stroke="rgba(168, 152, 245, 0.86)" stroke-width="1.1" />

        <circle cx="778" cy="132" r="10" fill="var(--panel-2)" stroke="rgba(168, 152, 245, 0.42)" stroke-width="1.6" />
        <circle cx="778" cy="132" r="5.7" fill="none" stroke="rgba(168, 152, 245, 0.3)" stroke-width="1.1" />

        <text x="582" y="94" text-anchor="middle" class="state-label-soft">Requested</text>
        <text x="624" y="94" text-anchor="middle" class="state-label-soft">Approved</text>
        <text x="686" y="126" text-anchor="middle" class="state-label-current">ReadyForPickup</text>
        <text x="778" y="73" text-anchor="middle" class="state-label">PickedUp</text>
        <text x="778" y="147" text-anchor="middle" class="state-label-soft">Expired</text>
      </g>
    </svg>
  </div>
</body>
</html>
