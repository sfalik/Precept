name: Language Proposal
description: Propose a change to the Precept DSL, runtime behavior, or language-adjacent tooling.
title: "Proposal: "
labels:
  - proposal
  - language
body:
  - type: markdown
    attributes:
      value: |
        Use this template for Precept language proposals.

        Canonical workflow:
        - Proposal body lives in the GitHub issue
        - Rationale and precedent live in `docs/research/`
        - Implementation checklist lives in the PR body
        - Spec docs in `docs/` are updated at implementation time

        See `CONTRIBUTING.md` for the full workflow.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What change is being proposed?
      placeholder: Add a new declaration form, operator, type, or runtime behavior.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What authoring problem or product gap does this solve?
      placeholder: Describe the real user problem, not just the syntax you want.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed syntax or behavior
      description: Include concrete examples.
      render: markdown
      placeholder: |
        ```precept
        precept Example
        ...
        ```
    validations:
      required: true

  - type: textarea
    id: decisions
    attributes:
      label: Locked design decisions
      description: What has already been decided? What should implementation treat as fixed?
      placeholder: List the decisions that are already locked so implementation does not drift.
    validations:
      required: true

  - type: textarea
    id: open_questions
    attributes:
      label: Open questions
      description: What still needs design discussion before implementation?
      placeholder: If none, say "None".
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: Research and rationale links
      description: Link the research docs or prior issues that explain why this proposal exists.
      placeholder: docs/research/language/...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this proposal to be considered implemented?
      placeholder: |
        - [ ] Parser accepts ...
        - [ ] Runtime returns ...
        - [ ] Docs updated ...
    validations:
      required: true

  - type: dropdown
    id: wave
    attributes:
      label: Suggested wave
      description: Which milestone wave does this belong in?
      options:
        - Wave 1: Core Expression Power
        - Wave 2: Declaration Guards + Field Constraints
        - Wave 3: Type System Expansion
        - Wave 4: Compactness + Composition
        - Wave 5: Accessors + Extensions
        - Not sure yet
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Proposal checklist
      options:
        - label: I understand the issue body is the canonical proposal and spec docs are updated at implementation time.
          required: true
        - label: I linked or referenced the research that explains the rationale for this proposal.
          required: true
